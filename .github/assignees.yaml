# .github/assignees.yaml
# ==========================================================
# Aerealith AI Default Assignee Configuration
# ==========================================================
# Purpose:
#   Central source of truth for deterministic assignment,
#   reviewer recommendations, milestone hints, ownership routing,
#   and issue / pull request relationship behavior.
#
# Used by:
#   - .github/workflows/repo-management.yaml
#   - .github/scripts/repo/assign-assignees.js
#   - .github/scripts/repo/assign-reviewers.js
#   - .github/scripts/repo/assign-milestones.js
#   - .github/scripts/repo/link-issues-prs.js
#
# Owner fields:
#   assignees:
#     - GitHub usernames only
#
#   reviewers:
#     - GitHub usernames only
#
#   team_reviewers:
#     - GitHub team slugs in owner/team format
#
# Example:
#   assignees:
#     - Sinless777
#     - AnotherUser
#
#   reviewers:
#     - Sinless777
#     - AnotherReviewer
#
#   team_reviewers:
#     - SinLess-Games/platform
#     - SinLess-Games/security
#
# Notes:
#   - GitHub issue assignees must be users, not teams.
#   - Pull request reviewers may be users or teams.
#   - If GitHub rejects a bot, user, or team assignment, scripts should warn and continue.
#   - Keep this aligned with .github/CODEOWNERS, .github/labels.yaml, and .github/milestones.yaml.
# ==========================================================

# ----------------------------------------------------------
# Core Maintainers
# ----------------------------------------------------------
maintainers:
  - Sinless777

automation_accounts:
  - github-actions[bot]
  - dependabot[bot]
  - renovate[bot]
  - mend[bot]
  - github-copilot[bot]

# ----------------------------------------------------------
# Optional Owner Groups
# ----------------------------------------------------------
# These groups are reference hints for scripts and future expansion.
# Rules below still include explicit assignees/reviewers so they remain simple.
# ----------------------------------------------------------
owner_groups:
  default:
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    team_reviewers: []

  platform:
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    team_reviewers: []

  security:
