# ----------------------------------------------------------
# Relationship Routing Hints
# ----------------------------------------------------------
# Repo-management should use these as signals when associating issues and PRs.
# ----------------------------------------------------------

relationships:
  strong_keywords:
    - fixes
    - fixed
    - closes
    - closed
    - resolves
    - resolved
    - related to
    - refs
    - references

  weak_keywords:
    - update
    - fix
    - frontend
    - workflow
    - ci
    - security
    - docs
    - config
    - build
    - cloudflare
    - release
    - dependency
    - renovate
    - dependabot
    - mend

  branch_issue_patterns:
    - "^(feature|feat|fix|bugfix|hotfix|chore|docs|refactor|test|security|ci|deploy|deployment)/(?<issue>[0-9]+)-(?<slug>.+)$"
    - "^(feature|feat|fix|bugfix|hotfix|chore|docs|refactor|test|security|ci|deploy|deployment)/issue-(?<issue>[0-9]+)-(?<slug>.+)$"
    - "^(?<issue>[0-9]+)-(?<slug>.+)$"

  require_strong_evidence: true

  create_issue_when_missing:
    enabled: true
    require_openai_review: true
    labels:
      - automation:openai
      - automation:needs-review
      - status:needs-review

  relationship_footer:
    start: "<!-- repo-management:relationships:start -->"
    end: "<!-- repo-management:relationships:end -->"

  same_repo_link_format:
    issue: "#{{number}}"
    pull_request: "#{{number}}"

# ----------------------------------------------------------
# Automation Merge Hints
# ----------------------------------------------------------
# Actual merge permissions must still be controlled by branch protection.
# ----------------------------------------------------------

automation_merge:
  dependency_prs:
    enabled: true
    allowed_labels:
      - dependencies
      - no-release
      - auto-merge

    required_absent_labels:
      - do-not-merge
      - blocked-by-security
      - needs-maintainer-review
      - needs-security-review
      - automation:needs-review
      - release:major
      - release:minor
      - release:patch

    allowed_authors:
      - dependabot[bot]
      - renovate[bot]
      - mend[bot]

  security_patch_prs:
    enabled: true
    allowed_labels:
      - security:dependency
      - dependencies
      - auto-merge
      - no-release

    required_absent_labels:
      - do-not-merge
      - blocked-by-security
      - needs-maintainer-review
      - automation:needs-review
      - release:major
      - release:minor
      - release:patch

# ----------------------------------------------------------
# Safety
# ----------------------------------------------------------
safety:
  dry_run_supported: true

  do_not_assign_without_matching_rule: true
  do_not_assign_bots_when_github_rejects: true

  # Milestones are managed by sync-milestones, not assignment scripts.
  do_not_create_milestones: true
  do_not_delete_milestones: true

  # Labels are managed by sync-labels, not assignment scripts.
  do_not_create_labels: true
  do_not_delete_labels: true

  do_not_close_issues: true
  do_not_merge_pull_requests: true
  do_not_push_to_main: true

  protected_labels:
    - security-reviewed
    - approved
    - merged
    - do-not-merge
    - blocked-by-security
    - needs-security-review
    - release:major
    - release:minor
    - release:patch

  replace_status_labels:
    - status:triage
    - status:backlog
    - status:ready
    - status:in-progress
    - status:needs-info
    - status:needs-review
    - status:changes-requested
    - status:blocked
    - status:ready-to-merge
    - status:merged

  replace_priority_labels:
    - priority:low
    - priority:medium
    - priority:high
    - priority:critical

  replace_severity_labels:
    - severity:low
    - severity:medium
    - severity:high
    - severity:critical

  release_labels:
    - release:major
    - release:minor
    - release:patch

  release_blocking_labels:
    - no-release
    - dependencies
    - security:dependency
    - do-not-merge
    - blocked-by-security
