# ----------------------------------------------------------
# 🧭 Milestone Routing Hints
# ----------------------------------------------------------
# Repo-manager and assignment scripts can use this map when
# a label or changed path does not already provide a milestone.
# ----------------------------------------------------------

milestones:
  Backlog:
    description: Future work, unclear priority, or deferred work.
    labels:
      - status:backlog
      - priority:low

  MVP:
    description: Critical MVP-facing feature work or launch blockers.
    labels:
      - priority:critical
      - priority:high
      - kind:feature

  Frontend:
    description: Frontend application, UI, pages, layout, app router, and shared UI components.
    labels:
      - area:frontend
      - area:ui

  Cloudflare Setup:
    description: Cloudflare Workers, OpenNext, Wrangler, deployment, DNS, and domain routing.
    labels:
      - area:cloudflare
      - cloudflare
      - deployment

  Infrastructure:
    description: Kubernetes, Ansible, Terraform, Proxmox, homelab, and platform infrastructure.
    labels:
      - area:kubernetes
      - area:ansible
      - area:terraform

  Security:
    description: Security scanning, CodeQL, secrets, auth, policy, permissions, and supply-chain work.
    labels:
      - area:security
      - kind:security

  Observability:
    description: Grafana, Faro, OpenTelemetry, logs, metrics, traces, alerts, and dashboards.
    labels:
      - area:observability

  Agentic Workflows:
    description: gh-aw, repo-manager, package-manager, workflow agents, and GitHub automation agents.
    labels:
      - agentic-workflow
      - repo-management

  Documentation:
    description: Docs, ADRs, README, MkDocs, and architecture documentation.
    labels:
      - area:docs
      - kind:documentation

  Release:
    description: npm publishing, GHCR publishing, versioning, changelog, and release automation.
    labels:
      - release
      - kind:release

  CI/CD:
    description: GitHub Actions, lint, tests, builds, Nx, package-manager automation, and validation pipelines.
    labels:
      - area:ci
      - area:github-actions
      - automation

# ----------------------------------------------------------
# 🔗 Relationship Routing Hints
# ----------------------------------------------------------
# Repo-manager should use these as signals when associating
# issues and pull requests.
# ----------------------------------------------------------

relationships:
  strong_keywords:
    - fixes
    - fixed
    - closes
    - closed
    - resolves
    - resolved
    - related to
    - refs
    - references

  weak_keywords:
    - update
    - fix
    - frontend
    - workflow
    - docs
    - config
    - build

  require_strong_evidence: true

  relationship_footer:
    start: "<!-- repo-manager:relationships:start -->"
    end: "<!-- repo-manager:relationships:end -->"

  same_repo_link_format:
    issue: "#{{number}}"
    pull_request: "#{{number}}"

# ----------------------------------------------------------
# 🛡️ Safety
# ----------------------------------------------------------
safety:
  do_not_assign_without_matching_rule: true
  do_not_assign_bots_when_github_rejects: true
  do_not_create_milestones: true
  do_not_delete_labels: true
  do_not_delete_milestones: true
  do_not_close_issues: true
  do_not_merge_pull_requests: true

  protected_labels:
    - security-reviewed
    - approved
    - merged
    - do-not-merge

  replace_status_labels:
    - status:needs-info
    - status:ready
    - status:backlog
    - status:blocked
    - status:in-progress

  replace_priority_labels:
    - priority:low
    - priority:medium
    - priority:high
    - priority:critical