# .github/assignees.yaml
# ==========================================================
# 👥 Helix AI Default Assignee Configuration
# ==========================================================
# Purpose:
#   Central source of truth for deterministic assignment,
#   reviewer recommendations, milestone hints, and ownership
#   routing for issues and pull requests.
#
# Used by:
#   - .github/workflows/assign.yaml
#   - .github/scripts/assign.js
#   - .github/workflows/repo-manager.md
#
# Notes:
#   - Repo-manager may recommend owners from this file.
#   - The deterministic assignment script should apply assignments.
#   - Bots are listed only where useful for automation context.
#   - If GitHub rejects a bot assignment, the script should skip it safely.
# ==========================================================

# ----------------------------------------------------------
# 🔧 Core Maintainers
# ----------------------------------------------------------
maintainers:
  - Sinless777

automation_accounts:
  - github-actions[bot]
  - dependabot[bot]
  - renovate[bot]
  - github-copilot[bot]

# ----------------------------------------------------------
# ⚙️ Global Defaults
# ----------------------------------------------------------
default:
  assignees:
    - Sinless777
  reviewers:
    - Sinless777
  labels:
    - status:backlog
  milestone: Backlog

# ----------------------------------------------------------
# 🧠 Rule Matching Strategy
# ----------------------------------------------------------
# Rules are keyed by labels or automation contexts.
#
# Recommended script behavior:
#   1. Match exact labels first.
#   2. Apply all matching area labels.
#   3. Apply one matching kind label.
#   4. Apply one matching priority label.
#   5. Apply one matching status label.
#   6. Prefer the most specific milestone.
#   7. Fall back to `default`.
#
# Labels should match the label families used by repo-manager:
#   - area:*
#   - kind:*
#   - priority:*
#   - status:*
# ----------------------------------------------------------

rules:
  # --------------------------------------------------------
  # 🧩 Kind-based ownership
  # --------------------------------------------------------

  "kind:bug":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - kind:bug
      - status:ready
    milestone: Backlog

  "kind:feature":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - kind:feature
      - status:backlog
    milestone: MVP

  "kind:chore":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - kind:chore
      - status:ready
    milestone: Backlog

  "kind:refactor":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - kind:refactor
      - status:ready
    milestone: Backlog

  "kind:security":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - kind:security
      - area:security
      - priority:high
      - status:ready
    milestone: Security

  "kind:documentation":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - kind:documentation
      - area:docs
      - status:ready
    milestone: Documentation

  "kind:test":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - kind:test
      - status:ready
    milestone: CI/CD

  "kind:release":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - kind:release
      - release
      - status:ready
    milestone: Release

  # --------------------------------------------------------
  # 🗂️ Area-based ownership
  # --------------------------------------------------------

  "area:frontend":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:frontend
    milestone: Frontend
    paths:
      - apps/frontend/**
      - apps/e2e/frontend-e2e/**

  "area:e2e":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:e2e
      - kind:test
    milestone: CI/CD
    paths:
      - apps/e2e/**
      - apps/e2e/frontend-e2e/**

  "area:integrations":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:integrations
    milestone: MVP
    paths:
      - apps/integrations/**

  "area:services":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:services
    milestone: MVP
    paths:
      - apps/services/**

  "area:ui":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:ui
      - area:frontend
    milestone: Frontend
    paths:
      - libs/ui/**

  "area:config":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:config
    milestone: MVP
    paths:
      - libs/config/**

  "area:db":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:db
    milestone: MVP
    paths:
      - libs/db/**

  "area:flags":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:flags
    milestone: MVP
    paths:
      - libs/flags/**

  "area:libs":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:libs
    milestone: MVP
    paths:
      - libs/**

  "area:github-actions":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:github-actions
      - automation
    milestone: CI/CD
    paths:
      - .github/**

  "area:cloudflare":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:cloudflare
      - cloudflare
      - deployment
    milestone: Cloudflare Setup
    paths:
      - apps/frontend/wrangler.jsonc
      - apps/frontend/open-next.config.ts
      - apps/frontend/cloudflare-env.d.ts
      - apps/frontend/public/_headers
      - wrangler.toml
      - "**/wrangler.toml"

  "area:docs":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:docs
      - kind:documentation
    milestone: Documentation
    paths:
      - docs/**
      - Docs/**
      - README.md
      - Readme.md
      - "**/*.md"

  "area:kubernetes":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:kubernetes
    milestone: Infrastructure
    paths:
      - kubernetes/**
      - Kubernetes/**

  "area:ansible":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:ansible
    milestone: Infrastructure
    paths:
      - ansible/**
      - Ansible/**

  "area:terraform":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:terraform
    milestone: Infrastructure
    paths:
      - terraform/**
      - Terraform/**

  "area:security":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:security
      - kind:security
    milestone: Security
    paths:
      - .github/workflows/codeQL.yaml
      - .github/codeql.yaml
      - "**/*security*"
      - "**/*auth*"
      - "**/*policy*"
      - "**/*secret*"

  "area:observability":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:observability
    milestone: Observability
    paths:
      - "**/*grafana*"
      - "**/*faro*"
      - "**/*otel*"
      - "**/*opentelemetry*"
      - "**/*prometheus*"
      - "**/*loki*"
      - "**/*tempo*"
      - "**/*dashboard*"

  "area:ci":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - area:ci
      - automation
    milestone: CI/CD
