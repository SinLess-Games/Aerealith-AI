# ----------------------------------------------------------
# Global Defaults
# ----------------------------------------------------------
default:
  assignees:
    - Sinless777
  reviewers:
    - Sinless777
  team_reviewers: []
  labels:
    - status:backlog
  milestone: Backlog

# ----------------------------------------------------------
# Rule Matching Strategy
# ----------------------------------------------------------
# Recommended script behavior:
#   1. Match exact labels first.
#   2. Apply all matching area labels.
#   3. Apply one matching kind label.
#   4. Apply one matching priority label.
#   5. Apply one matching status label.
#   6. Prefer the most specific milestone.
#   7. Fall back to default.
#
# Rules may include:
#   - assignees
#   - reviewers
#   - team_reviewers
#   - labels
#   - milestone
#   - paths
#   - automation_safe
# ----------------------------------------------------------

