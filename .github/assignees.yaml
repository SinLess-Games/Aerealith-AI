  # --------------------------------------------------------

  "status:blocked":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - status:blocked
    milestone: Backlog

  "status:needs-info":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - status:needs-info
    milestone: Backlog

  "status:ready":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
      - status:ready
    milestone: Backlog

  "status:backlog":
    assignees:
      - Sinless777
    reviewers:
      - Sinless777
    labels:
