name: Aerealith AI Cloudflare Staging

run-name: >-
  Cloudflare Staging / ${{ github.event_name }} / ${{ github.ref_name || github.head_ref || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Cloudflare staging mode to run."
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - discover-only
          - migrations-only
          - sync-only
          - summarize-only
      environment_name:
        description: "GitHub/Cloudflare environment name."
        required: false
        default: "staging"
        type: string
      run_cockroachdb_migrations:
        description: "Run CockroachDB staging migrations."
        required: true
        default: true
        type: boolean
      run_d1_migrations:
        description: "Run Cloudflare D1 staging migrations."
        required: true
        default: true
        type: boolean
      sync_kv:
        description: "Sync Cloudflare KV staging configuration."
        required: true
        default: true
        type: boolean
      sync_queues:
        description: "Sync Cloudflare Queues staging configuration."
        required: true
        default: true
        type: boolean
      sync_r2:
        description: "Sync Cloudflare R2 staging configuration."
        required: true
        default: true
        type: boolean
      sync_secrets:
        description: "Sync Cloudflare staging secrets."
        required: true
        default: false
        type: boolean
      dry_run:
        description: "Evaluate without changing Cloudflare resources."
        required: true
        default: false
        type: boolean

  push:
    branches:
      - main
      - staging

permissions:
  actions: read
  checks: write
  contents: read
  deployments: write
  id-token: write
  packages: read
  statuses: write

concurrency:
  group: cloudflare-staging
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PROJECT_NAME: Aerealith AI
  NODE_VERSION: ${{ vars.NODE_VERSION || '24' }}
  FORCE_COLOR: "1"
  CLOUDFLARE_ENVIRONMENT: staging
  CLOUDFLARE_DEPLOYMENT_STAGE: staging
  PROJECT_SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
  CLOUDFLARE_OUTPUT_DIR: artifacts/cloudflare/staging

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest

    outputs:
      mode: ${{ steps.context.outputs.mode }}
      dry_run: ${{ steps.context.outputs.dry_run }}
      environment_name: ${{ steps.context.outputs.environment_name }}
      deployment_ref: ${{ steps.context.outputs.deployment_ref }}
      should_discover: ${{ steps.context.outputs.should_discover }}
      should_run_cockroachdb_migrations: ${{ steps.context.outputs.should_run_cockroachdb_migrations }}
      should_run_d1_migrations: ${{ steps.context.outputs.should_run_d1_migrations }}
      should_run_migrations: ${{ steps.context.outputs.should_run_migrations }}
      should_sync_resources: ${{ steps.context.outputs.should_sync_resources }}
      should_deploy: ${{ steps.context.outputs.should_deploy }}
      should_summarize: ${{ steps.context.outputs.should_summarize }}

    steps:
      - name: Resolve Cloudflare staging context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode || 'deploy' }}
          INPUT_ENVIRONMENT_NAME: ${{ github.event.inputs.environment_name || 'staging' }}
          INPUT_RUN_COCKROACHDB_MIGRATIONS: ${{ github.event.inputs.run_cockroachdb_migrations || 'true' }}
          INPUT_RUN_D1_MIGRATIONS: ${{ github.event.inputs.run_d1_migrations || 'true' }}
          INPUT_SYNC_KV: ${{ github.event.inputs.sync_kv || 'true' }}
          INPUT_SYNC_QUEUES: ${{ github.event.inputs.sync_queues || 'true' }}
          INPUT_SYNC_R2: ${{ github.event.inputs.sync_r2 || 'true' }}
          INPUT_SYNC_SECRETS: ${{ github.event.inputs.sync_secrets || 'false' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          REF_NAME: ${{ github.ref_name || '' }}
          HEAD_REF: ${{ github.head_ref || '' }}
          SHA: ${{ github.sha || '' }}
        run: |
          set -euo pipefail

          mode="${INPUT_MODE:-deploy}"
          dry_run="${INPUT_DRY_RUN:-false}"
          environment_name="${INPUT_ENVIRONMENT_NAME:-staging}"
          deployment_ref="${REF_NAME:-${HEAD_REF:-manual}}"

          should_discover="false"
          should_run_cockroachdb_migrations="false"
          should_run_d1_migrations="false"
          should_run_migrations="false"
          should_sync_resources="false"
          should_deploy="false"
          should_summarize="true"

          case "$mode" in
            deploy)
              should_discover="true"
              should_deploy="true"

              if [[ "${INPUT_RUN_COCKROACHDB_MIGRATIONS:-true}" == "true" ]]; then
                should_run_cockroachdb_migrations="true"
              fi

              if [[ "${INPUT_RUN_D1_MIGRATIONS:-true}" == "true" ]]; then
                should_run_d1_migrations="true"
              fi

              if [[ "$should_run_cockroachdb_migrations" == "true" || "$should_run_d1_migrations" == "true" ]]; then
                should_run_migrations="true"
              fi

              if [[ "${INPUT_SYNC_KV:-true}" == "true" || "${INPUT_SYNC_QUEUES:-true}" == "true" || "${INPUT_SYNC_R2:-true}" == "true" || "${INPUT_SYNC_SECRETS:-false}" == "true" ]]; then
                should_sync_resources="true"
              fi
              ;;
            discover-only)
              should_discover="true"
              ;;
            migrations-only)
              should_discover="true"

              if [[ "${INPUT_RUN_COCKROACHDB_MIGRATIONS:-true}" == "true" ]]; then
                should_run_cockroachdb_migrations="true"
              fi

              if [[ "${INPUT_RUN_D1_MIGRATIONS:-true}" == "true" ]]; then
                should_run_d1_migrations="true"
              fi

              if [[ "$should_run_cockroachdb_migrations" == "true" || "$should_run_d1_migrations" == "true" ]]; then
                should_run_migrations="true"
              fi
              ;;
            sync-only)
              should_discover="true"
              should_sync_resources="true"
              ;;
            summarize-only)
              should_summarize="true"
              ;;
            *)
              echo "::error::Unsupported Cloudflare staging mode: $mode"
              exit 1
              ;;
          esac

          {
            echo "mode=$mode"
            echo "dry_run=$dry_run"
            echo "environment_name=$environment_name"
            echo "deployment_ref=$deployment_ref"
            echo "should_discover=$should_discover"
            echo "should_run_cockroachdb_migrations=$should_run_cockroachdb_migrations"
            echo "should_run_d1_migrations=$should_run_d1_migrations"
            echo "should_run_migrations=$should_run_migrations"
            echo "should_sync_resources=$should_sync_resources"
            echo "should_deploy=$should_deploy"
            echo "should_summarize=$should_summarize"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Aerealith AI Cloudflare Staging"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Event | \`$EVENT_NAME\` |"
            echo "| Mode | \`$mode\` |"
            echo "| Dry run | \`$dry_run\` |"
            echo "| Environment | \`$environment_name\` |"
            echo "| Deployment ref | \`${deployment_ref:-none}\` |"
            echo "| Commit | \`${SHA:-none}\` |"
            echo "| Discover | \`$should_discover\` |"
            echo "| CockroachDB migrations | \`$should_run_cockroachdb_migrations\` |"
            echo "| D1 migrations | \`$should_run_d1_migrations\` |"
            echo "| Any migrations | \`$should_run_migrations\` |"
            echo "| Resource sync | \`$should_sync_resources\` |"
            echo "| Deploy | \`$should_deploy\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  cloudflare-staging:
    name: Deploy Cloudflare staging
    runs-on: ubuntu-latest
    needs:
      - preflight

    if: >-
      needs.preflight.outputs.should_discover == 'true' ||
      needs.preflight.outputs.should_run_cockroachdb_migrations == 'true' ||
      needs.preflight.outputs.should_run_d1_migrations == 'true' ||
      needs.preflight.outputs.should_sync_resources == 'true' ||
      needs.preflight.outputs.should_deploy == 'true'

    environment:
      name: ${{ needs.preflight.outputs.environment_name }}
      url: ${{ steps.deploy.outputs.cloudflare_staging_url || steps.deploy.outputs.staging_url || steps.deploy.outputs.deployment_url || '' }}

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      REPO_AUTOMATION_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}

      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID || vars.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME || vars.CLOUDFLARE_PROJECT_NAME || 'aerealith-ai' }}
      CLOUDFLARE_SECRETS_STORE_ID: ${{ secrets.CLOUDFLARE_SECRETS_STORE_ID || vars.CLOUDFLARE_SECRETS_STORE_ID || '' }}

      CLOUDFLARE_ENVIRONMENT: ${{ needs.preflight.outputs.environment_name }}
      CLOUDFLARE_DEPLOYMENT_STAGE: staging
      CLOUDFLARE_STAGING_REF: ${{ needs.preflight.outputs.deployment_ref }}
      CLOUDFLARE_DEPLOYMENT_ALIAS: staging

      CLOUDFLARE_PREFER_WORKERS_OVER_PAGES: "true"
      CLOUDFLARE_SKIP_MISSING_PAGES_OUTPUT: "true"
      CLOUDFLARE_AUTO_CREATE_PAGES_PROJECT: "true"
      CLOUDFLARE_PAGES_PRODUCTION_BRANCH: "main"
      CLOUDFLARE_STAGING_REQUIRE_WORKER_ENV: "true"
      CLOUDFLARE_STAGING_ALLOW_WORKER_DEFAULT: "false"
      CLOUDFLARE_STAGING_CHANGED_ONLY: "true"
      CLOUDFLARE_STAGING_CONTINUE_ON_ERROR: "true"
      CLOUDFLARE_STAGING_FAIL_IF_EMPTY: "false"
      WRANGLER_SEND_METRICS: "false"

      COCKROACHDB_MIGRATIONS_CLIENT: psql
      COCKROACHDB_MIGRATIONS_DATABASE_URL: ${{ secrets.STAGING_COCKROACH_DATABASE_URL || secrets.STAGING_COCKROACHDB_DATABASE_URL || secrets.STAGING_DATABASE_URL || secrets.COCKROACH_DATABASE_URL || secrets.COCKROACHDB_DATABASE_URL || secrets.DATABASE_URL }}
      STAGING_COCKROACH_DATABASE_URL: ${{ secrets.STAGING_COCKROACH_DATABASE_URL || secrets.STAGING_COCKROACHDB_DATABASE_URL || secrets.STAGING_DATABASE_URL || secrets.COCKROACH_DATABASE_URL || secrets.COCKROACHDB_DATABASE_URL || secrets.DATABASE_URL }}
      DATABASE_URL: ${{ secrets.STAGING_COCKROACH_DATABASE_URL || secrets.STAGING_COCKROACHDB_DATABASE_URL || secrets.STAGING_DATABASE_URL || secrets.COCKROACH_DATABASE_URL || secrets.COCKROACHDB_DATABASE_URL || secrets.DATABASE_URL }}
      COCKROACH_DATABASE_URL: ${{ secrets.STAGING_COCKROACH_DATABASE_URL || secrets.STAGING_COCKROACHDB_DATABASE_URL || secrets.STAGING_DATABASE_URL || secrets.COCKROACH_DATABASE_URL || secrets.COCKROACHDB_DATABASE_URL || secrets.DATABASE_URL }}
      COCKROACHDB_DATABASE_URL: ${{ secrets.STAGING_COCKROACH_DATABASE_URL || secrets.STAGING_COCKROACHDB_DATABASE_URL || secrets.STAGING_DATABASE_URL || secrets.COCKROACH_DATABASE_URL || secrets.COCKROACHDB_DATABASE_URL || secrets.DATABASE_URL }}

      CLOUDFLARE_SYNC_KV: ${{ github.event.inputs.sync_kv || 'true' }}
      CLOUDFLARE_SYNC_QUEUES: ${{ github.event.inputs.sync_queues || 'true' }}
      CLOUDFLARE_SYNC_R2: ${{ github.event.inputs.sync_r2 || 'true' }}
      CLOUDFLARE_SYNC_SECRETS: ${{ github.event.inputs.sync_secrets || 'false' }}

      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}
      CLOUDFLARE_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: |
          set -euo pipefail
          corepack enable

      - name: Install dependencies
        if: hashFiles('pnpm-lock.yaml') != ''
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Ensure PostgreSQL client is available
        if: needs.preflight.outputs.should_run_cockroachdb_migrations == 'true'
        run: |
          set -euo pipefail

          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

          psql --version

      - name: Prepare Cloudflare output directory
        run: |
          set -euo pipefail
          mkdir -p "$CLOUDFLARE_OUTPUT_DIR"

      - name: Validate Cloudflare credentials
        if: >-
          needs.preflight.outputs.should_run_d1_migrations == 'true' ||
          needs.preflight.outputs.should_sync_resources == 'true' ||
          needs.preflight.outputs.should_deploy == 'true'
        run: |
          set -euo pipefail

          missing=()

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            missing+=("CLOUDFLARE_API_TOKEN")
          fi

          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            missing+=("CLOUDFLARE_ACCOUNT_ID")
          fi

          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf '::error::Missing required Cloudflare secret or variable(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Validate CockroachDB staging configuration
        if: needs.preflight.outputs.should_run_cockroachdb_migrations == 'true'
        run: |
          set -euo pipefail

          missing=()

          if [[ "${PROJECT_SYNC_DRY_RUN:-false}" != "true" ]]; then
            if [[ -z "${COCKROACHDB_MIGRATIONS_DATABASE_URL:-}" && -z "${STAGING_COCKROACH_DATABASE_URL:-}" && -z "${COCKROACH_DATABASE_URL:-}" && -z "${COCKROACHDB_DATABASE_URL:-}" && -z "${DATABASE_URL:-}" ]]; then
              missing+=("COCKROACHDB_MIGRATIONS_DATABASE_URL or STAGING_COCKROACH_DATABASE_URL or STAGING_DATABASE_URL or COCKROACH_DATABASE_URL or DATABASE_URL")
            fi
          fi

          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf '::error::Missing required CockroachDB secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Normalize CockroachDB staging database URL
        if: needs.preflight.outputs.should_run_cockroachdb_migrations == 'true'
        run: |
          set -euo pipefail

          raw="${COCKROACHDB_MIGRATIONS_DATABASE_URL:-${STAGING_COCKROACH_DATABASE_URL:-${COCKROACH_DATABASE_URL:-${COCKROACHDB_DATABASE_URL:-${DATABASE_URL:-}}}}}"

          RAW_DATABASE_URL="$raw" python3 - <<'PY'
          import os
          import re
          import sys

          raw = os.environ.get("RAW_DATABASE_URL", "")
          raw = raw.replace("\r", "").replace("\n", "").strip()

          if raw.startswith("export "):
              raw = raw[len("export "):].strip()

          assignment_names = [
              "COCKROACHDB_MIGRATIONS_DATABASE_URL",
              "STAGING_COCKROACH_DATABASE_URL",
              "STAGING_COCKROACHDB_DATABASE_URL",
              "STAGING_DATABASE_URL",
              "COCKROACH_DATABASE_URL",
              "COCKROACHDB_DATABASE_URL",
              "DATABASE_URL",
          ]

          for name in assignment_names:
              prefix = f"{name}="
              if raw.startswith(prefix):
                  raw = raw[len(prefix):].strip()
                  break

          for _ in range(3):
              if len(raw) >= 2 and raw[0] == raw[-1] and raw[0] in {'\"', "'", "`"}:
                  raw = raw[1:-1].strip()
              else:
                  break

          raw = re.sub(r"([?&])sslmode(?=(&|$))", r"\1sslmode=verify-full", raw)

          if not raw and os.environ.get("PROJECT_SYNC_DRY_RUN", "false") != "true":
              print("::error::CockroachDB staging migrations are enabled, but the database URL resolved empty.")
              sys.exit(1)

          if raw:
              print(f"::add-mask::{raw}")
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
                  for key in [
                      "COCKROACHDB_MIGRATIONS_DATABASE_URL",
                      "STAGING_COCKROACH_DATABASE_URL",
                      "DATABASE_URL",
                      "COCKROACH_DATABASE_URL",
                      "COCKROACHDB_DATABASE_URL",
                  ]:
                      env_file.write(f"{key}={raw}\n")
          PY

      - name: Configure CockroachDB SSL certificate
        if: needs.preflight.outputs.should_run_cockroachdb_migrations == 'true'
        env:
          COCKROACHDB_CA_CERT: ${{ secrets.COCKROACHDB_CA_CERT }}
        run: |
          set -euo pipefail

          cert_dir="$HOME/.postgresql"
          cert_file="$cert_dir/root.crt"

          if [[ -z "${COCKROACHDB_CA_CERT:-}" ]]; then
            echo "::error::Missing required GitHub secret: COCKROACHDB_CA_CERT"
            exit 1
          fi

          mkdir -p "$cert_dir"
          chmod 700 "$cert_dir"

          printf '%s\n' "$COCKROACHDB_CA_CERT" > "$cert_file"
          chmod 600 "$cert_file"

          if [[ ! -s "$cert_file" ]]; then
            echo "::error::CockroachDB CA certificate file was not created or is empty: $cert_file"
            exit 1
          fi

          if ! grep -q "BEGIN CERTIFICATE" "$cert_file"; then
            echo "::error::COCKROACHDB_CA_CERT does not look like a PEM certificate."
            exit 1
          fi

          {
            echo "PGSSLROOTCERT=$cert_file"
            echo "COCKROACHDB_CA_CERT_PATH=$cert_file"
          } >> "$GITHUB_ENV"

          {
            echo "### CockroachDB SSL certificate"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Certificate path | \`$cert_file\` |"
            echo "| PGSSLROOTCERT configured | \`true\` |"
            echo "| COCKROACHDB_CA_CERT_PATH configured | \`true\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure Cloudflare Secrets Store ID in Wrangler configs
        if: needs.preflight.outputs.should_deploy == 'true'
        run: |
          set -euo pipefail

          mapfile -t wrangler_files < <(
            {
              find . -path './node_modules' -prune -o \
                -path './.git' -prune -o \
                -path './dist' -prune -o \
                -path './artifacts' -prune -o \
                -type f \( -name 'wrangler.toml' -o -name 'wrangler.json' -o -name 'wrangler.jsonc' \) -print
            } | sort
          )

          if [[ "${#wrangler_files[@]}" -eq 0 ]]; then
            echo "::notice::No Wrangler config files found to inspect."
            exit 0
          fi

          placeholder_files=()

          for file in "${wrangler_files[@]}"; do
            if grep -q '<CLOUDFLARE_SECRETS_STORE_ID>' "$file"; then
              placeholder_files+=("$file")
            fi
          done

          if [[ "${#placeholder_files[@]}" -eq 0 ]]; then
            echo "::notice::No Cloudflare Secrets Store placeholder values found in Wrangler configs."
            exit 0
          fi

          if [[ -z "${CLOUDFLARE_SECRETS_STORE_ID:-}" ]]; then
            echo "::error::Wrangler config contains <CLOUDFLARE_SECRETS_STORE_ID>, but CLOUDFLARE_SECRETS_STORE_ID is not configured as a GitHub secret or repository variable."
            printf 'Files requiring the value:\n'
            printf ' - %s\n' "${placeholder_files[@]}"
            exit 1
          fi

          python3 - "$CLOUDFLARE_SECRETS_STORE_ID" "${placeholder_files[@]}" <<'PY'
          import pathlib
          import sys

          store_id = sys.argv[1]

          for file_name in sys.argv[2:]:
              path = pathlib.Path(file_name)
              content = path.read_text()
              path.write_text(content.replace("<CLOUDFLARE_SECRETS_STORE_ID>", store_id))
              print(f"Patched Secrets Store ID placeholder in {file_name}")
          PY

          {
            echo "### Cloudflare Secrets Store"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Wrangler configs patched | \`${#placeholder_files[@]}\` |"
            echo "| Secrets Store ID configured | \`true\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Discover Cloudflare staging deployments
        id: discover
        if: needs.preflight.outputs.should_discover == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/cloudflare/discover-deployments.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/cloudflare/discover-deployments.js"
            exit 0
          fi

          node ".github/scripts/cloudflare/discover-deployments.js" \
            --environment "$CLOUDFLARE_ENVIRONMENT" \
            --stage staging \
            --ref "$CLOUDFLARE_STAGING_REF" \
            --output "$CLOUDFLARE_OUTPUT_DIR/discover-deployments.json" \
            --summary "$CLOUDFLARE_OUTPUT_DIR/discover-deployments.md"

      - name: Run CockroachDB staging migrations
        if: needs.preflight.outputs.should_run_cockroachdb_migrations == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/databases/run-cockroachdb-migrations.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/databases/run-cockroachdb-migrations.js"
            exit 0
          fi

          node ".github/scripts/databases/run-cockroachdb-migrations.js" \
            --environment "$CLOUDFLARE_ENVIRONMENT" \
            --stage staging \
            --output "$CLOUDFLARE_OUTPUT_DIR/cockroachdb-migrations.json" \
            --summary "$CLOUDFLARE_OUTPUT_DIR/cockroachdb-migrations.md"

      - name: Run D1 staging migrations
        if: needs.preflight.outputs.should_run_d1_migrations == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/databases/run-d1-migrations.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/databases/run-d1-migrations.js"
            exit 0
          fi

          node ".github/scripts/databases/run-d1-migrations.js" \
            --environment "$CLOUDFLARE_ENVIRONMENT" \
            --stage staging \
            --output "$CLOUDFLARE_OUTPUT_DIR/d1-migrations.json" \
            --summary "$CLOUDFLARE_OUTPUT_DIR/d1-migrations.md"

      - name: Sync Cloudflare KV
        if: needs.preflight.outputs.should_sync_resources == 'true' && env.CLOUDFLARE_SYNC_KV == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/cloudflare/sync-kv.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/cloudflare/sync-kv.js"
            exit 0
          fi

          node ".github/scripts/cloudflare/sync-kv.js" \
            --environment "$CLOUDFLARE_ENVIRONMENT" \
            --stage staging \
            --output "$CLOUDFLARE_OUTPUT_DIR/sync-kv.json" \
            --summary "$CLOUDFLARE_OUTPUT_DIR/sync-kv.md"

      - name: Sync Cloudflare Queues
        if: needs.preflight.outputs.should_sync_resources == 'true' && env.CLOUDFLARE_SYNC_QUEUES == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/cloudflare/sync-queues.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/cloudflare/sync-queues.js"
            exit 0
          fi

          node ".github/scripts/cloudflare/sync-queues.js" \
            --environment "$CLOUDFLARE_ENVIRONMENT" \
            --stage staging \
            --output "$CLOUDFLARE_OUTPUT_DIR/sync-queues.json" \
            --summary "$CLOUDFLARE_OUTPUT_DIR/sync-queues.md"

      - name: Sync Cloudflare R2
        if: needs.preflight.outputs.should_sync_resources == 'true' && env.CLOUDFLARE_SYNC_R2 == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/cloudflare/sync-r2.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/cloudflare/sync-r2.js"
            exit 0
          fi

          node ".github/scripts/cloudflare/sync-r2.js" \
            --environment "$CLOUDFLARE_ENVIRONMENT" \
            --stage staging \
            --output "$CLOUDFLARE_OUTPUT_DIR/sync-r2.json" \
            --summary "$CLOUDFLARE_OUTPUT_DIR/sync-r2.md"

      - name: Sync Cloudflare secrets
        if: needs.preflight.outputs.should_sync_resources == 'true' && env.CLOUDFLARE_SYNC_SECRETS == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/cloudflare/sync-secrets.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/cloudflare/sync-secrets.js"
            exit 0
          fi

          node ".github/scripts/cloudflare/sync-secrets.js" \
            --environment "$CLOUDFLARE_ENVIRONMENT" \
            --stage staging \
            --output "$CLOUDFLARE_OUTPUT_DIR/sync-secrets.json" \
            --summary "$CLOUDFLARE_OUTPUT_DIR/sync-secrets.md"

      - name: Deploy Cloudflare staging
        id: deploy
        if: needs.preflight.outputs.should_deploy == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/cloudflare/deploy-staging.js" ]]; then
            echo "::error::Missing script: .github/scripts/cloudflare/deploy-staging.js"
            exit 1
          fi

          deploy_input="$CLOUDFLARE_OUTPUT_DIR/discover-deployments.json"

          if [[ ! -f "$deploy_input" ]]; then
            echo "::warning::Discovery output was not found at $deploy_input. Falling back to artifacts/ci/cloudflare-targets.json."
            deploy_input="artifacts/ci/cloudflare-targets.json"
          fi

          node ".github/scripts/cloudflare/deploy-staging.js" \
            --input "$deploy_input" \
            --environment "$CLOUDFLARE_ENVIRONMENT" \
            --stage staging \
            --ref "$CLOUDFLARE_STAGING_REF" \
            --workers \
            --pages \
            --prefer-workers-over-pages \
            --skip-missing-pages-output \
            --auto-create-pages-project \
            --pages-production-branch "$CLOUDFLARE_PAGES_PRODUCTION_BRANCH" \
            --output "$CLOUDFLARE_OUTPUT_DIR/deploy-staging.json" \
            --summary "$CLOUDFLARE_OUTPUT_DIR/deploy-staging.md"

          staging_url="$(node -e '
            const fs = require("node:fs");
            const file = process.argv[1];
            if (!fs.existsSync(file)) process.exit(0);
            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            const url =
              data.staging_url ||
              data.deployment_url ||
              data.url ||
              data.cloudflare?.staging_url ||
              data.cloudflare?.deployment_url ||
              "";
            if (url) console.log(url);
          ' "$CLOUDFLARE_OUTPUT_DIR/deploy-staging.json")"

          if [[ -n "$staging_url" ]]; then
            echo "cloudflare_staging_url=$staging_url" >> "$GITHUB_OUTPUT"
            echo "staging_url=$staging_url" >> "$GITHUB_OUTPUT"
            echo "deployment_url=$staging_url" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Cloudflare staging job summary
        if: always()
        run: |
          set -euo pipefail

          {
            echo "## Cloudflare Staging Output"
            echo ""
            echo "| File | Size |"
            echo "|---|---:|"

            if [[ -d "$CLOUDFLARE_OUTPUT_DIR" ]]; then
              while IFS= read -r file; do
                size="$(wc -c < "$file" | xargs)"
                echo "| \`$file\` | \`$size\` bytes |"
              done < <(find "$CLOUDFLARE_OUTPUT_DIR" -type f | sort)
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Cloudflare staging artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cloudflare-staging-${{ github.run_id }}
          path: |
            artifacts/cloudflare/staging/**
          if-no-files-found: ignore
          retention-days: 21

  finalize:
    name: Finalize
    runs-on: ubuntu-latest
    needs:
      - preflight
      - cloudflare-staging

    if: always()

    steps:
      - name: Write final Cloudflare staging summary
        run: |
          set -euo pipefail

          {
            echo "## Aerealith AI Cloudflare Staging Result"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Preflight | \`${{ needs.preflight.result }}\` |"
            echo "| Cloudflare staging | \`${{ needs.cloudflare-staging.result }}\` |"
            echo ""
            echo "| Decision | Value |"
            echo "|---|---|"
            echo "| Mode | \`${{ needs.preflight.outputs.mode }}\` |"
            echo "| Dry run | \`${{ needs.preflight.outputs.dry_run }}\` |"
            echo "| Environment | \`${{ needs.preflight.outputs.environment_name }}\` |"
            echo "| Deployment ref | \`${{ needs.preflight.outputs.deployment_ref || 'none' }}\` |"
            echo "| CockroachDB migrations | \`${{ needs.preflight.outputs.should_run_cockroachdb_migrations }}\` |"
            echo "| D1 migrations | \`${{ needs.preflight.outputs.should_run_d1_migrations }}\` |"
            echo "| Any migrations | \`${{ needs.preflight.outputs.should_run_migrations }}\` |"
            echo "| Resource sync | \`${{ needs.preflight.outputs.should_sync_resources }}\` |"
            echo "| Deploy | \`${{ needs.preflight.outputs.should_deploy }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
