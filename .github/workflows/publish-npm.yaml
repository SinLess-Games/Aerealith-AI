name: Aerealith AI Publish NPM Packages

run-name: >-
  Publish NPM / ${{ github.event_name }} / ${{ github.ref_name || github.event.release.tag_name || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "NPM publishing mode to run."
        required: true
        default: "publish"
        type: choice
        options:
          - publish
          - pack-only
          - validate-only
          - discover-only
          - summarize-only
      npm_tag:
        description: "NPM dist-tag to publish with."
        required: true
        default: "latest"
        type: string
      access:
        description: "NPM package access level."
        required: true
        default: "public"
        type: choice
        options:
          - public
          - restricted
      registry_url:
        description: "NPM registry URL."
        required: true
        default: "https://registry.npmjs.org"
        type: string
      provenance:
        description: "Publish with npm provenance when supported."
        required: true
        default: true
        type: boolean
      run_validation:
        description: "Validate package metadata before packing or publishing."
        required: true
        default: true
        type: boolean
      create_sbom:
        description: "Create package SBOM artifacts."
        required: true
        default: true
        type: boolean
      create_checksums:
        description: "Create checksum artifacts."
        required: true
        default: true
        type: boolean
      dry_run:
        description: "Evaluate without publishing packages."
        required: true
        default: false
        type: boolean

  release:
    types:
      - published

  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  actions: read
  attestations: write
  checks: write
  contents: read
  id-token: write
  packages: write
  security-events: read

concurrency:
  group: >-
    publish-npm-${{ github.event.release.tag_name || github.ref_name || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PROJECT_NAME: Aerealith AI
  NODE_VERSION: "24"
  FORCE_COLOR: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CI: "true"
  NX_DAEMON: "false"
  NEXT_TELEMETRY_DISABLED: "1"
  NPM_OUTPUT_DIR: artifacts/npm
  PACKAGE_OUTPUT_DIR: artifacts/packages
  CI_PACKAGE_OUTPUT_DIR: artifacts/ci
  ARTIFACT_OUTPUT_DIR: artifacts/npm-artifacts
  PROJECT_SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      mode: ${{ steps.context.outputs.mode }}
      npm_tag: ${{ steps.context.outputs.npm_tag }}
      access: ${{ steps.context.outputs.access }}
      registry_url: ${{ steps.context.outputs.registry_url }}
      provenance: ${{ steps.context.outputs.provenance }}
      run_validation: ${{ steps.context.outputs.run_validation }}
      create_sbom: ${{ steps.context.outputs.create_sbom }}
      create_checksums: ${{ steps.context.outputs.create_checksums }}
      dry_run: ${{ steps.context.outputs.dry_run }}
      publish_enabled: ${{ steps.context.outputs.publish_enabled }}
      should_discover: ${{ steps.context.outputs.should_discover }}
      should_validate: ${{ steps.context.outputs.should_validate }}
      should_pack: ${{ steps.context.outputs.should_pack }}
      should_publish: ${{ steps.context.outputs.should_publish }}
      should_summarize: ${{ steps.context.outputs.should_summarize }}

    steps:
      - name: Resolve NPM publishing context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode || 'publish' }}
          INPUT_NPM_TAG: ${{ github.event.inputs.npm_tag || 'latest' }}
          INPUT_ACCESS: ${{ github.event.inputs.access || 'public' }}
          INPUT_REGISTRY_URL: ${{ github.event.inputs.registry_url || 'https://registry.npmjs.org' }}
          INPUT_PROVENANCE: ${{ github.event.inputs.provenance || 'true' }}
          INPUT_RUN_VALIDATION: ${{ github.event.inputs.run_validation || 'true' }}
          INPUT_CREATE_SBOM: ${{ github.event.inputs.create_sbom || 'true' }}
          INPUT_CREATE_CHECKSUMS: ${{ github.event.inputs.create_checksums || 'true' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          mode="${INPUT_MODE:-publish}"
          npm_tag="${INPUT_NPM_TAG:-latest}"
          access="${INPUT_ACCESS:-public}"
          registry_url="${INPUT_REGISTRY_URL:-https://registry.npmjs.org}"
          provenance="${INPUT_PROVENANCE:-true}"
          run_validation="${INPUT_RUN_VALIDATION:-true}"
          create_sbom="${INPUT_CREATE_SBOM:-true}"
          create_checksums="${INPUT_CREATE_CHECKSUMS:-true}"
          dry_run="${INPUT_DRY_RUN:-false}"

          should_discover="false"
          should_validate="false"
          should_pack="false"
          should_publish="false"
          should_summarize="true"
          publish_enabled="false"

          case "$mode" in
            publish)
              should_discover="true"
              should_validate="$run_validation"
              should_pack="true"
              should_publish="true"
              ;;
            pack-only)
              should_discover="true"
              should_validate="$run_validation"
              should_pack="true"
              should_publish="false"
              ;;
            validate-only)
              should_discover="true"
              should_validate="true"
              should_pack="false"
              should_publish="false"
              ;;
            discover-only)
              should_discover="true"
              should_validate="false"
              should_pack="false"
              should_publish="false"
              ;;
            summarize-only)
              should_discover="false"
              should_validate="false"
              should_pack="false"
              should_publish="false"
              should_summarize="true"
              ;;
            *)
              echo "::error::Unsupported NPM publishing mode: $mode"
              exit 1
              ;;
          esac

          case "$access" in
            public|restricted)
              ;;
            *)
              echo "::error::Unsupported NPM access value: $access"
              exit 1
              ;;
          esac

          if [[ "$dry_run" == "true" ]]; then
            should_publish="false"
          fi

          if [[ "$should_publish" == "true" ]]; then
            publish_enabled="true"
          fi

          {
            echo "mode=$mode"
            echo "npm_tag=$npm_tag"
            echo "access=$access"
            echo "registry_url=$registry_url"
            echo "provenance=$provenance"
            echo "run_validation=$run_validation"
            echo "create_sbom=$create_sbom"
            echo "create_checksums=$create_checksums"
            echo "dry_run=$dry_run"
            echo "publish_enabled=$publish_enabled"
            echo "should_discover=$should_discover"
            echo "should_validate=$should_validate"
            echo "should_pack=$should_pack"
            echo "should_publish=$should_publish"
            echo "should_summarize=$should_summarize"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Aerealith AI Publish NPM Packages"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Event | \`$EVENT_NAME\` |"
            echo "| Mode | \`$mode\` |"
            echo "| NPM tag | \`$npm_tag\` |"
            echo "| Access | \`$access\` |"
            echo "| Registry | \`$registry_url\` |"
            echo "| Provenance | \`$provenance\` |"
            echo "| Validation | \`$should_validate\` |"
            echo "| Pack | \`$should_pack\` |"
            echo "| Publish | \`$should_publish\` |"
            echo "| Dry run | \`$dry_run\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-npm:
    name: Publish NPM packages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - preflight

    if: >-
      needs.preflight.outputs.should_discover == 'true' ||
      needs.preflight.outputs.should_validate == 'true' ||
      needs.preflight.outputs.should_pack == 'true' ||
      needs.preflight.outputs.should_publish == 'true' ||
      needs.preflight.outputs.should_summarize == 'true'

    environment:
      name: npm

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      REPO_AUTOMATION_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
      NPM_CONFIG_REGISTRY: ${{ needs.preflight.outputs.registry_url }}
      NPM_CONFIG_PROVENANCE: ${{ needs.preflight.outputs.provenance }}
      NPM_PUBLISH_TAG: ${{ needs.preflight.outputs.npm_tag }}
      NPM_PUBLISH_ACCESS: ${{ needs.preflight.outputs.access }}
      NPM_PUBLISH_PROVENANCE: ${{ needs.preflight.outputs.provenance }}
      NPM_PUBLISH_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}
      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare output directories
        run: |
          set -euo pipefail

          mkdir -p "$NPM_OUTPUT_DIR"
          mkdir -p "$PACKAGE_OUTPUT_DIR"
          mkdir -p "$CI_PACKAGE_OUTPUT_DIR"
          mkdir -p "$ARTIFACT_OUTPUT_DIR"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ needs.preflight.outputs.registry_url }}

      - name: Enable pnpm through Corepack
        id: pnpm
        run: |
          set -euo pipefail

          corepack enable

          package_manager="$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); process.stdout.write(String(pkg.packageManager || 'pnpm@10.23.0'))")"

          if [[ "$package_manager" != pnpm@* ]]; then
            echo "::error::This workflow expects pnpm, but package.json declares packageManager=$package_manager"
            exit 1
          fi

          corepack prepare "$package_manager" --activate

          pnpm_version="$(pnpm --version)"
          pnpm_store="$(pnpm store path --silent)"

          {
            echo "package_manager=$package_manager"
            echo "pnpm_version=$pnpm_version"
            echo "pnpm_store=$pnpm_store"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## pnpm"
            echo ""
            echo "- Package manager: \`$package_manager\`"
            echo "- pnpm version: \`$pnpm_version\`"
            echo "- Store path: \`$pnpm_store\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm.outputs.pnpm_store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: >-
          needs.preflight.outputs.should_discover == 'true' ||
          needs.preflight.outputs.should_validate == 'true' ||
          needs.preflight.outputs.should_pack == 'true' ||
          needs.preflight.outputs.should_publish == 'true'
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile

      - name: Configure NPM authentication
        if: needs.preflight.outputs.should_publish == 'true'
        run: |
          set -euo pipefail

          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "::error::NPM_TOKEN is required to publish packages. Add it as an environment or repository secret."
            exit 1
          fi

          registry_host="$(node -e 'const value = process.argv[1]; const url = new URL(value); console.log(url.host);' "$NPM_CONFIG_REGISTRY")"

          {
            echo "registry=$NPM_CONFIG_REGISTRY"
            echo "//$registry_host/:_authToken=\${NODE_AUTH_TOKEN}"
          } > "$HOME/.npmrc"

          npm whoami --registry "$NPM_CONFIG_REGISTRY" || {
            echo "::warning::npm whoami failed. Publishing may still work with automation tokens, but token validation did not pass."
          }

      - name: Discover publishable packages
        if: needs.preflight.outputs.should_discover == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$NPM_OUTPUT_DIR" "$CI_PACKAGE_OUTPUT_DIR"

          args=(
            --output "$CI_PACKAGE_OUTPUT_DIR/npm-packages.json"
            --report "$NPM_OUTPUT_DIR/discover-packages.json"
            --summary "$NPM_OUTPUT_DIR/discover-packages.md"
            --registry "$NPM_CONFIG_REGISTRY"
            --access "$NPM_PUBLISH_ACCESS"
            --publishable-only
            --no-include-root
            --no-include-apps
          )

          if [[ "${{ needs.preflight.outputs.should_pack }}" == "true" || "${{ needs.preflight.outputs.should_publish }}" == "true" ]]; then
            args+=(--fail-if-empty)
          fi

          node ".github/scripts/npm/discover-packages.js" "${args[@]}"

      - name: Validate packages
        if: needs.preflight.outputs.should_validate == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$NPM_OUTPUT_DIR"

          node ".github/scripts/npm/validate-packages.js" \
            --packages "$CI_PACKAGE_OUTPUT_DIR/npm-packages.json" \
            --discovery-report "$NPM_OUTPUT_DIR/discover-packages.json" \
            --output "$NPM_OUTPUT_DIR/validate-packages.json" \
            --summary "$NPM_OUTPUT_DIR/validate-packages.md" \
            --publishable-only \
            --no-include-private \
            --no-fail-on-warnings

      - name: Build publishable packages
        if: needs.preflight.outputs.should_pack == 'true' || needs.preflight.outputs.should_publish == 'true'
        run: |
          set -euo pipefail

          if pnpm exec nx show projects --with-target=build >/tmp/build-projects.txt 2>/dev/null && [[ -s /tmp/build-projects.txt ]]; then
            pnpm exec nx run-many \
              --target=build \
              --all \
              --parallel=3
          elif pnpm run | grep -qE '^  build$|^build'; then
            pnpm run build
          else
            echo "::notice::No build target or build script detected."
          fi

      - name: Pack packages
        if: needs.preflight.outputs.should_pack == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$NPM_OUTPUT_DIR" "$ARTIFACT_OUTPUT_DIR"

          node ".github/scripts/npm/pack-packages.js" \
            --packages "$CI_PACKAGE_OUTPUT_DIR/npm-packages.json" \
            --validation "$NPM_OUTPUT_DIR/validate-packages.json" \
            --output-dir "$ARTIFACT_OUTPUT_DIR" \
            --output "$NPM_OUTPUT_DIR/pack-packages.json" \
            --summary "$NPM_OUTPUT_DIR/pack-packages.md" \
            --package-manager pnpm \
            --publishable-only \
            --fail-if-empty

      - name: Publish packages
        if: needs.preflight.outputs.should_publish == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$NPM_OUTPUT_DIR"

          node ".github/scripts/npm/publish-packages.js" \
            --packages "$CI_PACKAGE_OUTPUT_DIR/npm-packages.json" \
            --pack-report "$NPM_OUTPUT_DIR/pack-packages.json" \
            --output "$NPM_OUTPUT_DIR/publish-packages.json" \
            --summary "$NPM_OUTPUT_DIR/publish-packages.md" \
            --tag "$NPM_PUBLISH_TAG" \
            --access "$NPM_PUBLISH_ACCESS" \
            --registry "$NPM_CONFIG_REGISTRY" \
            $([[ "$NPM_PUBLISH_PROVENANCE" == "true" ]] && echo "--provenance" || echo "--no-provenance") \
            --fail-if-empty

      - name: Create package SBOM
        if: needs.preflight.outputs.create_sbom == 'true' && needs.preflight.outputs.should_pack == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$ARTIFACT_OUTPUT_DIR"

          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const packageFile = process.env.CI_PACKAGE_OUTPUT_DIR + '/npm-packages.json';
          const outputFile = process.env.ARTIFACT_OUTPUT_DIR + '/npm-sbom.json';
          const summaryFile = process.env.ARTIFACT_OUTPUT_DIR + '/npm-sbom.md';

          function readJson(file) {
            try { return JSON.parse(fs.readFileSync(file, 'utf8')); } catch { return null; }
          }

          const artifact = readJson(packageFile) || { packages: [] };
          const packages = Array.isArray(artifact.packages) ? artifact.packages : [];
          const createdAt = new Date().toISOString();
          const report = {
            bomFormat: 'CycloneDX',
            specVersion: '1.5',
            serialNumber: `urn:uuid:${process.env.GITHUB_RUN_ID || Date.now()}`,
            version: 1,
            metadata: {
              timestamp: createdAt,
              component: {
                type: 'application',
                name: process.env.PROJECT_NAME || 'Aerealith AI',
                version: process.env.GITHUB_REF_NAME || '',
              },
            },
            components: packages.map((pkg) => ({
              type: 'library',
              name: pkg.name,
              version: pkg.version,
              purl: `pkg:npm/${encodeURIComponent(pkg.name)}@${encodeURIComponent(pkg.version)}`,
              properties: [
                { name: 'package_dir', value: pkg.package_dir || pkg.path || '' },
                { name: 'package_json', value: pkg.package_json || '' },
              ],
            })),
          };

          fs.mkdirSync(path.dirname(outputFile), { recursive: true });
          fs.writeFileSync(outputFile, `${JSON.stringify(report, null, 2)}\n`);
          fs.writeFileSync(summaryFile, `# Aerealith AI NPM SBOM\n\nGenerated: \`${createdAt}\`\n\n- Components: \`${report.components.length}\`\n`);
          NODE

      - name: Create package checksums
        if: needs.preflight.outputs.create_checksums == 'true' && needs.preflight.outputs.should_pack == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$ARTIFACT_OUTPUT_DIR"

          sha256_file="$ARTIFACT_OUTPUT_DIR/SHA256SUMS"
          sha512_file="$ARTIFACT_OUTPUT_DIR/SHA512SUMS"
          checksum_json="$ARTIFACT_OUTPUT_DIR/npm-checksums.json"
          checksum_md="$ARTIFACT_OUTPUT_DIR/npm-checksums.md"

          : > "$sha256_file"
          : > "$sha512_file"

          if compgen -G "$ARTIFACT_OUTPUT_DIR/*.tgz" > /dev/null; then
            sha256sum "$ARTIFACT_OUTPUT_DIR"/*.tgz > "$sha256_file"
            sha512sum "$ARTIFACT_OUTPUT_DIR"/*.tgz > "$sha512_file"
          fi

          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const artifactDir = process.env.ARTIFACT_OUTPUT_DIR || 'artifacts/npm-artifacts';
          const outputFile = path.join(artifactDir, 'npm-checksums.json');
          const summaryFile = path.join(artifactDir, 'npm-checksums.md');
          const createdAt = new Date().toISOString();

          function parseChecksumFile(file) {
            if (!fs.existsSync(file)) return [];
            return fs.readFileSync(file, 'utf8')
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean)
              .map((line) => {
                const [hash, ...fileParts] = line.split(/\s+/);
                return { hash, file: fileParts.join(' ') };
              });
          }

          const report = {
            schema_version: 1,
            type: 'npm-package-checksums',
            project: process.env.PROJECT_NAME || 'Aerealith AI',
            repository: process.env.GITHUB_REPOSITORY || '',
            run_id: process.env.GITHUB_RUN_ID || '',
            run_attempt: process.env.GITHUB_RUN_ATTEMPT || '',
            created_at: createdAt,
            sha256: parseChecksumFile(path.join(artifactDir, 'SHA256SUMS')),
            sha512: parseChecksumFile(path.join(artifactDir, 'SHA512SUMS')),
          };
          report.totals = { sha256: report.sha256.length, sha512: report.sha512.length };

          fs.writeFileSync(outputFile, `${JSON.stringify(report, null, 2)}\n`);
          fs.writeFileSync(summaryFile, `# Aerealith AI NPM Package Checksums\n\nGenerated: \`${createdAt}\`\n\n- SHA256 entries: \`${report.totals.sha256}\`\n- SHA512 entries: \`${report.totals.sha512}\`\n`);
          NODE

      - name: Summarize packages
        if: always() && needs.preflight.outputs.should_summarize == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$NPM_OUTPUT_DIR"

          node ".github/scripts/npm/summarize-packages.js" \
            --discovery-report "$NPM_OUTPUT_DIR/discover-packages.json" \
            --packages "$CI_PACKAGE_OUTPUT_DIR/npm-packages.json" \
            --validation-report "$NPM_OUTPUT_DIR/validate-packages.json" \
            --pack-report "$NPM_OUTPUT_DIR/pack-packages.json" \
            --publish-report "$NPM_OUTPUT_DIR/publish-packages.json" \
            --artifact-dir "$ARTIFACT_OUTPUT_DIR" \
            --output "$NPM_OUTPUT_DIR/summarize-packages.json" \
            --summary "$NPM_OUTPUT_DIR/summarize-packages.md" \
            --no-fail-on-failed-packages

      - name: Write NPM publish report
        if: always()
        run: |
          set -euo pipefail

          mkdir -p "$NPM_OUTPUT_DIR" "$PACKAGE_OUTPUT_DIR" "$CI_PACKAGE_OUTPUT_DIR" "$ARTIFACT_OUTPUT_DIR"

          report_file="$NPM_OUTPUT_DIR/publish-npm.json"
          summary_file="$NPM_OUTPUT_DIR/publish-npm.md"

          cat > "$report_file" <<JSON
          {
            "schema_version": 1,
            "type": "publish-npm",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "event_name": "$GITHUB_EVENT_NAME",
            "ref": "$GITHUB_REF",
            "sha": "$GITHUB_SHA",
            "mode": "${{ needs.preflight.outputs.mode }}",
            "npm_tag": "${{ needs.preflight.outputs.npm_tag }}",
            "access": "${{ needs.preflight.outputs.access }}",
            "registry_url": "${{ needs.preflight.outputs.registry_url }}",
            "provenance": "${{ needs.preflight.outputs.provenance }}",
            "dry_run": "${{ needs.preflight.outputs.dry_run }}",
            "publish_enabled": "${{ needs.preflight.outputs.publish_enabled }}",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          {
            echo "# Aerealith AI Publish NPM Packages"
            echo ""
            echo "Generated: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
            echo ""
            echo "## Status"
            echo ""
            echo "- Mode: \`${{ needs.preflight.outputs.mode }}\`"
            echo "- NPM tag: \`${{ needs.preflight.outputs.npm_tag }}\`"
            echo "- Access: \`${{ needs.preflight.outputs.access }}\`"
            echo "- Registry: \`${{ needs.preflight.outputs.registry_url }}\`"
            echo "- Provenance: \`${{ needs.preflight.outputs.provenance }}\`"
            echo "- Publish enabled: \`${{ needs.preflight.outputs.publish_enabled }}\`"
            echo "- Dry run: \`${{ needs.preflight.outputs.dry_run }}\`"
            echo ""
            echo "## Output Files"
            echo ""
            echo "| File | Size |"
            echo "|---|---:|"

            for dir in "$NPM_OUTPUT_DIR" "$PACKAGE_OUTPUT_DIR" "$CI_PACKAGE_OUTPUT_DIR" "$ARTIFACT_OUTPUT_DIR"; do
              if [[ -d "$dir" ]]; then
                while IFS= read -r file; do
                  size="$(wc -c < "$file" | xargs)"
                  echo "| \`$file\` | \`$size\` bytes |"
                done < <(find "$dir" -type f | sort)
              fi
            done
          } > "$summary_file"

          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload NPM package artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-packages-${{ github.run_id }}
          path: |
            artifacts/npm/**
            artifacts/packages/**
            artifacts/ci/npm-packages.json
            artifacts/npm-artifacts/**
            *.tgz
            apps/**/*.tgz
            libs/**/*.tgz
            packages/**/*.tgz
          if-no-files-found: ignore
          retention-days: 30

  finalize:
    name: Finalize
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - preflight
      - publish-npm

    if: always()

    steps:
      - name: Write final NPM publishing summary
        run: |
          set -euo pipefail

          {
            echo "## Aerealith AI Publish NPM Result"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Preflight | \`${{ needs.preflight.result }}\` |"
            echo "| Publish NPM | \`${{ needs.publish-npm.result }}\` |"
            echo ""
            echo "| Decision | Value |"
            echo "|---|---|"
            echo "| Mode | \`${{ needs.preflight.outputs.mode }}\` |"
            echo "| NPM tag | \`${{ needs.preflight.outputs.npm_tag }}\` |"
            echo "| Access | \`${{ needs.preflight.outputs.access }}\` |"
            echo "| Registry | \`${{ needs.preflight.outputs.registry_url }}\` |"
            echo "| Provenance | \`${{ needs.preflight.outputs.provenance }}\` |"
            echo "| Publish enabled | \`${{ needs.preflight.outputs.publish_enabled }}\` |"
            echo "| Dry run | \`${{ needs.preflight.outputs.dry_run }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce NPM publishing result
        run: |
          set -euo pipefail

          if [[ "${{ needs.publish-npm.result }}" != "success" ]]; then
            echo "::error::Publish NPM job failed with result: ${{ needs.publish-npm.result }}"
            exit 1
          fi

          echo "NPM publishing workflow completed."
