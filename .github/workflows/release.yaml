name: Aerealith AI Release

run-name: >-
  Release / ${{ github.event_name }} / ${{ github.ref_name || github.event.release.tag_name || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode to run."
        required: true
        default: "release"
        type: choice
        options:
          - release
          - prepare
          - tag-only
          - github-release-only
          - changelog-only
          - announcement-only
          - summarize-only
      release_type:
        description: "Release type. Auto defaults to patch unless a version or tag is provided."
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
          - prerelease
      version:
        description: "Optional version override, such as 2.10.0. Leave empty to calculate."
        required: false
        default: ""
        type: string
      tag_name:
        description: "Optional tag override, such as v2.10.0. Leave empty to calculate."
        required: false
        default: ""
        type: string
      tag_prefix:
        description: "Release tag prefix."
        required: true
        default: "V"
        type: string
      prerelease_identifier:
        description: "Prerelease identifier used for prerelease mode."
        required: false
        default: "rc"
        type: string
      target_ref:
        description: "Target ref, branch, tag, or SHA. Defaults to the current ref."
        required: false
        default: ""
        type: string
      draft:
        description: "Create the GitHub release as a draft."
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: true
        default: false
        type: boolean
      generate_notes:
        description: "Use GitHub-generated release notes when no local changelog is available."
        required: true
        default: true
        type: boolean
      discussion_category_name:
        description: "Optional GitHub Discussions category for release announcement."
        required: false
        default: "Announcements"
        type: string
      dispatch_publish_npm:
        description: "Dispatch publish-npm.yaml after release creation."
        required: true
        default: false
        type: boolean
      dispatch_publish_containers:
        description: "Dispatch publish-containers.yaml after release creation."
        required: true
        default: false
        type: boolean
      dispatch_artifact_hashes:
        description: "Dispatch artifact-hashes.yaml after release creation."
        required: true
        default: false
        type: boolean
      dispatch_attestations:
        description: "Dispatch attestations.yaml after release creation."
        required: true
        default: false
        type: boolean
      deploy_production:
        description: "Dispatch cloudflare-production.yaml after release creation."
        required: true
        default: false
        type: boolean
      dry_run:
        description: "Evaluate release steps without creating tags, releases, announcements, or downstream dispatches."
        required: true
        default: false
        type: boolean

  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

  release:
    types:
      - published

permissions:
  actions: write
  checks: write
  contents: write
  discussions: write
  issues: read
  pull-requests: read

concurrency:
  group: >-
    release-${{ github.workflow }}-${{ github.event.release.tag_name || github.ref_name || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PROJECT_NAME: Aerealith AI
  NODE_VERSION: "24"
  FORCE_COLOR: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CI: "true"
  NX_DAEMON: "false"
  NEXT_TELEMETRY_DISABLED: "1"
  RELEASE_OUTPUT_DIR: artifacts/release
  PROJECT_SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      mode: ${{ steps.context.outputs.mode }}
      release_type: ${{ steps.context.outputs.release_type }}
      version: ${{ steps.context.outputs.version }}
      tag_name: ${{ steps.context.outputs.tag_name }}
      tag_prefix: ${{ steps.context.outputs.tag_prefix }}
      prerelease_identifier: ${{ steps.context.outputs.prerelease_identifier }}
      target_ref: ${{ steps.context.outputs.target_ref }}
      draft: ${{ steps.context.outputs.draft }}
      prerelease: ${{ steps.context.outputs.prerelease }}
      generate_notes: ${{ steps.context.outputs.generate_notes }}
      discussion_category_name: ${{ steps.context.outputs.discussion_category_name }}
      dry_run: ${{ steps.context.outputs.dry_run }}
      should_validate_source: ${{ steps.context.outputs.should_validate_source }}
      should_determine_version: ${{ steps.context.outputs.should_determine_version }}
      should_build_changelog: ${{ steps.context.outputs.should_build_changelog }}
      should_create_tag: ${{ steps.context.outputs.should_create_tag }}
      should_create_github_release: ${{ steps.context.outputs.should_create_github_release }}
      should_post_announcement: ${{ steps.context.outputs.should_post_announcement }}
      should_summarize_release: ${{ steps.context.outputs.should_summarize_release }}
      dispatch_publish_npm: ${{ steps.context.outputs.dispatch_publish_npm }}
      dispatch_publish_containers: ${{ steps.context.outputs.dispatch_publish_containers }}
      dispatch_artifact_hashes: ${{ steps.context.outputs.dispatch_artifact_hashes }}
      dispatch_attestations: ${{ steps.context.outputs.dispatch_attestations }}
      deploy_production: ${{ steps.context.outputs.deploy_production }}
      should_dispatch_downstream: ${{ steps.context.outputs.should_dispatch_downstream }}

    steps:
      - name: Resolve release context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode || 'release' }}
          INPUT_RELEASE_TYPE: ${{ github.event.inputs.release_type || 'auto' }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          INPUT_TAG_NAME: ${{ github.event.inputs.tag_name || '' }}
          INPUT_TAG_PREFIX: ${{ github.event.inputs.tag_prefix || 'v' }}
          INPUT_PRERELEASE_IDENTIFIER: ${{ github.event.inputs.prerelease_identifier || 'rc' }}
          INPUT_TARGET_REF: ${{ github.event.inputs.target_ref || '' }}
          INPUT_DRAFT: ${{ github.event.inputs.draft || 'false' }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease || 'false' }}
          INPUT_GENERATE_NOTES: ${{ github.event.inputs.generate_notes || 'true' }}
          INPUT_DISCUSSION_CATEGORY_NAME: ${{ github.event.inputs.discussion_category_name || 'Announcements' }}
          INPUT_DISPATCH_PUBLISH_NPM: ${{ github.event.inputs.dispatch_publish_npm || 'false' }}
          INPUT_DISPATCH_PUBLISH_CONTAINERS: ${{ github.event.inputs.dispatch_publish_containers || 'false' }}
          INPUT_DISPATCH_ARTIFACT_HASHES: ${{ github.event.inputs.dispatch_artifact_hashes || 'false' }}
          INPUT_DISPATCH_ATTESTATIONS: ${{ github.event.inputs.dispatch_attestations || 'false' }}
          INPUT_DEPLOY_PRODUCTION: ${{ github.event.inputs.deploy_production || 'false' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          REF_TYPE: ${{ github.ref_type || '' }}
          REF_NAME: ${{ github.ref_name || '' }}
          SHA: ${{ github.sha || '' }}
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          set -euo pipefail

          mode="${INPUT_MODE:-release}"
          release_type="${INPUT_RELEASE_TYPE:-auto}"
          version="${INPUT_VERSION:-}"
          tag_name="${INPUT_TAG_NAME:-}"
          tag_prefix="${INPUT_TAG_PREFIX:-v}"
          prerelease_identifier="${INPUT_PRERELEASE_IDENTIFIER:-rc}"
          target_ref="${INPUT_TARGET_REF:-}"
          draft="${INPUT_DRAFT:-false}"
          prerelease="${INPUT_PRERELEASE:-false}"
          generate_notes="${INPUT_GENERATE_NOTES:-true}"
          discussion_category_name="${INPUT_DISCUSSION_CATEGORY_NAME:-Announcements}"
          dispatch_publish_npm="${INPUT_DISPATCH_PUBLISH_NPM:-false}"
          dispatch_publish_containers="${INPUT_DISPATCH_PUBLISH_CONTAINERS:-false}"
          dispatch_artifact_hashes="${INPUT_DISPATCH_ARTIFACT_HASHES:-false}"
          dispatch_attestations="${INPUT_DISPATCH_ATTESTATIONS:-false}"
          deploy_production="${INPUT_DEPLOY_PRODUCTION:-false}"
          dry_run="${INPUT_DRY_RUN:-false}"

          if [[ "$tag_prefix" == "V" ]]; then
            tag_prefix="v"
          fi

          if [[ -z "$target_ref" ]]; then
            target_ref="${REF_NAME:-$SHA}"
          fi

          if [[ "$EVENT_NAME" == "push" && "$REF_TYPE" == "tag" ]]; then
            mode="github-release-only"
            tag_name="$REF_NAME"
            target_ref="$REF_NAME"
            dry_run="false"
          fi

          if [[ "$EVENT_NAME" == "release" ]]; then
            mode="announcement-only"
            tag_name="${RELEASE_TAG:-$REF_NAME}"
            target_ref="${RELEASE_TAG:-$REF_NAME}"
            dry_run="false"
          fi

          if [[ -n "$tag_name" && -z "$version" ]]; then
            version="${tag_name#"$tag_prefix"}"
            version="${version#v}"
            version="${version#V}"
          fi

          case "$mode" in
            release|prepare|tag-only|github-release-only|changelog-only|announcement-only|summarize-only)
              ;;
            *)
              echo "::error::Unsupported release mode: $mode"
              exit 1
              ;;
          esac

          case "$release_type" in
            auto|patch|minor|major|prerelease)
              ;;
            *)
              echo "::error::Unsupported release type: $release_type"
              exit 1
              ;;
          esac

          should_validate_source="false"
          should_determine_version="false"
          should_build_changelog="false"
          should_create_tag="false"
          should_create_github_release="false"
          should_post_announcement="false"
          should_summarize_release="true"

          case "$mode" in
            release)
              should_validate_source="true"
              should_determine_version="true"
              should_build_changelog="true"
              should_create_tag="true"
              should_create_github_release="true"

              if [[ -n "$discussion_category_name" ]]; then
                should_post_announcement="true"
              fi
              ;;
            prepare)
              should_validate_source="true"
              should_determine_version="true"
              should_build_changelog="true"
              ;;
            tag-only)
              should_validate_source="true"
              should_determine_version="true"
              should_create_tag="true"
              ;;
            github-release-only)
              should_validate_source="true"
              should_determine_version="true"
              should_build_changelog="true"
              should_create_github_release="true"
              ;;
            changelog-only)
              should_validate_source="true"
              should_determine_version="true"
              should_build_changelog="true"
              ;;
            announcement-only)
              should_determine_version="true"

              if [[ -n "$discussion_category_name" ]]; then
                should_post_announcement="true"
              fi
              ;;
            summarize-only)
              should_summarize_release="true"
              ;;
          esac

          if [[ -n "$version" || -n "$tag_name" ]]; then
            should_determine_version="true"
          fi

          if [[ "$dry_run" == "true" ]]; then
            dispatch_publish_npm="false"
            dispatch_publish_containers="false"
            dispatch_artifact_hashes="false"
            dispatch_attestations="false"
            deploy_production="false"
          fi

          should_dispatch_downstream="false"
          if [[ "$dispatch_publish_npm" == "true" || "$dispatch_publish_containers" == "true" || "$dispatch_artifact_hashes" == "true" || "$dispatch_attestations" == "true" || "$deploy_production" == "true" ]]; then
            should_dispatch_downstream="true"
          fi

          {
            echo "mode=$mode"
            echo "release_type=$release_type"
            echo "version=$version"
            echo "tag_name=$tag_name"
            echo "tag_prefix=$tag_prefix"
            echo "prerelease_identifier=$prerelease_identifier"
            echo "target_ref=$target_ref"
            echo "draft=$draft"
            echo "prerelease=$prerelease"
            echo "generate_notes=$generate_notes"
            echo "discussion_category_name=$discussion_category_name"
            echo "dry_run=$dry_run"
            echo "should_validate_source=$should_validate_source"
            echo "should_determine_version=$should_determine_version"
            echo "should_build_changelog=$should_build_changelog"
            echo "should_create_tag=$should_create_tag"
            echo "should_create_github_release=$should_create_github_release"
            echo "should_post_announcement=$should_post_announcement"
            echo "should_summarize_release=$should_summarize_release"
            echo "dispatch_publish_npm=$dispatch_publish_npm"
            echo "dispatch_publish_containers=$dispatch_publish_containers"
            echo "dispatch_artifact_hashes=$dispatch_artifact_hashes"
            echo "dispatch_attestations=$dispatch_attestations"
            echo "deploy_production=$deploy_production"
            echo "should_dispatch_downstream=$should_dispatch_downstream"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Aerealith AI Release"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Event | \`$EVENT_NAME\` |"
            echo "| Mode | \`$mode\` |"
            echo "| Release type | \`$release_type\` |"
            echo "| Version | \`${version:-auto}\` |"
            echo "| Tag | \`${tag_name:-auto}\` |"
            echo "| Tag prefix | \`$tag_prefix\` |"
            echo "| Target ref | \`${target_ref:-none}\` |"
            echo "| Draft | \`$draft\` |"
            echo "| Prerelease | \`$prerelease\` |"
            echo "| Dry run | \`$dry_run\` |"
            echo "| Build changelog | \`$should_build_changelog\` |"
            echo "| Create tag | \`$should_create_tag\` |"
            echo "| Create GitHub release | \`$should_create_github_release\` |"
            echo "| Post announcement | \`$should_post_announcement\` |"
            echo "| Dispatch downstream | \`$should_dispatch_downstream\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - preflight

    outputs:
      version: ${{ steps.resolve_release.outputs.version }}
      tag_name: ${{ steps.resolve_release.outputs.tag_name }}
      release_url: ${{ steps.github_release.outputs.release_url }}

    env:
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}
      RELEASE_MODE: ${{ needs.preflight.outputs.mode }}
      RELEASE_TYPE: ${{ needs.preflight.outputs.release_type }}
      RELEASE_VERSION_OVERRIDE: ${{ needs.preflight.outputs.version }}
      RELEASE_TAG_NAME: ${{ needs.preflight.outputs.tag_name }}
      RELEASE_TAG_PREFIX: ${{ needs.preflight.outputs.tag_prefix }}
      RELEASE_PRERELEASE_IDENTIFIER: ${{ needs.preflight.outputs.prerelease_identifier }}
      RELEASE_TARGET_REF: ${{ needs.preflight.outputs.target_ref }}
      RELEASE_DRAFT: ${{ needs.preflight.outputs.draft }}
      RELEASE_PRERELEASE: ${{ needs.preflight.outputs.prerelease }}
      RELEASE_GENERATE_NOTES: ${{ needs.preflight.outputs.generate_notes }}
      RELEASE_DISCUSSION_CATEGORY_NAME: ${{ needs.preflight.outputs.discussion_category_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.preflight.outputs.target_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare release output directory
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_OUTPUT_DIR"

      - name: Validate release source
        if: needs.preflight.outputs.should_validate_source == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_OUTPUT_DIR"

          validation_status="passed"
          validation_ok="true"
          validation_error=""

          if ! git rev-parse --verify "$RELEASE_TARGET_REF^{commit}" >/dev/null 2>&1; then
            validation_status="failed"
            validation_ok="false"
            validation_error="Target ref could not be resolved as a commit: $RELEASE_TARGET_REF"
          fi

          current_sha="$(git rev-parse HEAD)"
          target_sha="$(git rev-parse "$RELEASE_TARGET_REF^{commit}" 2>/dev/null || true)"
          current_branch="$(git branch --show-current || true)"

          cat > "$RELEASE_OUTPUT_DIR/validate-release-source.json" <<JSON
          {
            "schema_version": 1,
            "type": "validate-release-source",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "event_name": "$GITHUB_EVENT_NAME",
            "mode": "$RELEASE_MODE",
            "target_ref": "$RELEASE_TARGET_REF",
            "current_branch": "$current_branch",
            "current_sha": "$current_sha",
            "target_sha": "$target_sha",
            "status": "$validation_status",
            "ok": $validation_ok,
            "error": "$validation_error",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          {
            echo "# Aerealith AI Release Source Validation"
            echo ""
            echo "Generated: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
            echo ""
            echo "## Status"
            echo ""
            echo "- Status: \`$validation_status\`"
            echo "- OK: \`$validation_ok\`"
            echo "- Mode: \`$RELEASE_MODE\`"
            echo "- Target ref: \`$RELEASE_TARGET_REF\`"
            echo "- Target SHA: \`${target_sha:-unknown}\`"

            if [[ -n "$validation_error" ]]; then
              echo "- Error: \`$validation_error\`"
            fi
          } > "$RELEASE_OUTPUT_DIR/validate-release-source.md"

          cat "$RELEASE_OUTPUT_DIR/validate-release-source.md" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$validation_ok" != "true" ]]; then
            echo "::error::$validation_error"
            exit 1
          fi

      - name: Resolve release version and tag
        id: resolve_release
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_OUTPUT_DIR"

          git fetch --tags --force

          node <<'NODE'
          const fs = require("node:fs");
          const cp = require("node:child_process");
          const path = require("node:path");

          const outputDir = process.env.RELEASE_OUTPUT_DIR || "artifacts/release";
          const outputFile = path.join(outputDir, "determine-release-version.json");
          const summaryFile = path.join(outputDir, "determine-release-version.md");

          const rawReleaseType = process.env.RELEASE_TYPE || "auto";
          const releaseType = rawReleaseType === "auto" ? "patch" : rawReleaseType;
          const tagPrefix = process.env.RELEASE_TAG_PREFIX || "v";
          const prereleaseIdentifier = process.env.RELEASE_PRERELEASE_IDENTIFIER || "rc";
          const versionOverride = process.env.RELEASE_VERSION_OVERRIDE || "";
          const tagOverride = process.env.RELEASE_TAG_NAME || "";
          const mode = process.env.RELEASE_MODE || "release";
          const targetRef = process.env.RELEASE_TARGET_REF || "HEAD";
          const createdAt = new Date().toISOString();

          function run(command) {
            return cp.execSync(command, {
              encoding: "utf8",
              stdio: ["ignore", "pipe", "ignore"],
            }).trim();
          }

          function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          }

          function cleanVersion(value) {
            return String(value || "")
              .trim()
              .replace(new RegExp(`^${escapeRegExp(tagPrefix)}`), "")
              .replace(/^v/i, "");
          }

          function parseVersion(value) {
            const clean = cleanVersion(value);
            const match = clean.match(/^(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?$/);

            if (!match) {
              return null;
            }

            return {
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3]),
              prerelease: match[4] || "",
              raw: clean,
            };
          }

          function compareVersions(left, right) {
            for (const key of ["major", "minor", "patch"]) {
              if (left[key] > right[key]) return 1;
              if (left[key] < right[key]) return -1;
            }

            if (!left.prerelease && right.prerelease) return 1;
            if (left.prerelease && !right.prerelease) return -1;

            return left.raw.localeCompare(right.raw, undefined, {
              numeric: true,
              sensitivity: "base",
            });
          }

          function getTags() {
            try {
              return run("git tag --list").split(/\r?\n/).filter(Boolean);
            } catch {
              return [];
            }
          }

          function getLatestVersionTag() {
            const parsed = getTags()
              .map((tag) => ({
                tag,
                version: parseVersion(tag),
              }))
              .filter((entry) => entry.version);

            parsed.sort((left, right) => compareVersions(right.version, left.version));

            return parsed[0] || null;
          }

          function bumpVersion(latest, type) {
            const base = latest?.version || {
              major: 0,
              minor: 1,
              patch: 0,
              prerelease: "",
              raw: "0.1.0",
            };

            let major = base.major;
            let minor = base.minor;
            let patch = base.patch;
            let prerelease = "";

            switch (type) {
              case "major":
                major += 1;
                minor = 0;
                patch = 0;
                break;
              case "minor":
                minor += 1;
                patch = 0;
                break;
              case "prerelease":
                patch += 1;
                prerelease = `${prereleaseIdentifier}.0`;
                break;
              case "patch":
              default:
                patch += 1;
                break;
            }

            return `${major}.${minor}.${patch}${prerelease ? `-${prerelease}` : ""}`;
          }

          fs.mkdirSync(outputDir, { recursive: true });

          const latest = getLatestVersionTag();

          let version = cleanVersion(versionOverride);
          let tagName = tagOverride.trim();

          if (!version && tagName) {
            version = cleanVersion(tagName);
          }

          if (!version) {
            version = bumpVersion(latest, releaseType);
          }

          if (!tagName) {
            tagName = `${tagPrefix}${version}`;
          }

          const parsedVersion = parseVersion(version);

          if (!parsedVersion && mode !== "summarize-only") {
            throw new Error(`Resolved version is not valid semver: ${version}`);
          }

          const report = {
            schema_version: 1,
            type: "determine-release-version",
            project: process.env.PROJECT_NAME || "Aerealith AI",
            repository: process.env.GITHUB_REPOSITORY || "",
            run_id: process.env.GITHUB_RUN_ID || "",
            run_attempt: process.env.GITHUB_RUN_ATTEMPT || "",
            event_name: process.env.GITHUB_EVENT_NAME || "",
            mode,
            requested_release_type: rawReleaseType,
            effective_release_type: releaseType,
            version,
            tag_name: tagName,
            tag_prefix: tagPrefix,
            prerelease_identifier: prereleaseIdentifier,
            target_ref: targetRef,
            latest_tag: latest?.tag || "",
            latest_version: latest?.version?.raw || "",
            created_at: createdAt,
          };

          fs.writeFileSync(outputFile, `${JSON.stringify(report, null, 2)}\n`);

          const lines = [
            "# Aerealith AI Release Version",
            "",
            `Generated: \`${createdAt}\``,
            "",
            "## Resolved Release",
            "",
            `- Version: \`${version}\``,
            `- Tag: \`${tagName}\``,
            `- Release type: \`${releaseType}\``,
            `- Latest tag: \`${latest?.tag || "none"}\``,
            `- Target ref: \`${targetRef}\``,
            "",
          ];

          fs.writeFileSync(summaryFile, `${lines.join("\n").trim()}\n`);

          const githubOutput = process.env.GITHUB_OUTPUT;

          if (githubOutput) {
            fs.appendFileSync(githubOutput, `version=${version}\n`);
            fs.appendFileSync(githubOutput, `tag_name=${tagName}\n`);
          }
          NODE

          cat "$RELEASE_OUTPUT_DIR/determine-release-version.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Build changelog
        if: needs.preflight.outputs.should_build_changelog == 'true'
        env:
          RELEASE_VERSION: ${{ steps.resolve_release.outputs.version }}
          RELEASE_TAG: ${{ steps.resolve_release.outputs.tag_name }}
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_OUTPUT_DIR"

          git fetch --tags --force

          previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${RELEASE_TAG}$" | head -n 1 || true)"

          if [[ -n "$previous_tag" ]]; then
            range="$previous_tag..HEAD"
          else
            range="HEAD"
          fi

          commit_log="$(git log "$range" --pretty=format:'- %s (`%h`)' --no-merges || true)"

          if [[ -z "$commit_log" ]]; then
            commit_log="- No non-merge commits found for this release range."
          fi

          {
            echo "# Aerealith AI ${RELEASE_TAG}"
            echo ""
            echo "Generated: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
            echo ""
            echo "## Release"
            echo ""
            echo "- Version: \`${RELEASE_VERSION}\`"
            echo "- Tag: \`${RELEASE_TAG}\`"
            echo "- Previous tag: \`${previous_tag:-none}\`"
            echo "- Target ref: \`${RELEASE_TARGET_REF}\`"
            echo ""
            echo "## Changes"
            echo ""
            echo "$commit_log"
          } > "$RELEASE_OUTPUT_DIR/CHANGELOG.md"

          cat > "$RELEASE_OUTPUT_DIR/build-changelog.json" <<JSON
          {
            "schema_version": 1,
            "type": "build-changelog",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "version": "$RELEASE_VERSION",
            "tag_name": "$RELEASE_TAG",
            "previous_tag": "$previous_tag",
            "target_ref": "$RELEASE_TARGET_REF",
            "summary": "$RELEASE_OUTPUT_DIR/CHANGELOG.md",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          cat "$RELEASE_OUTPUT_DIR/CHANGELOG.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Create release tag
        if: needs.preflight.outputs.should_create_tag == 'true'
        env:
          RELEASE_VERSION: ${{ steps.resolve_release.outputs.version }}
          RELEASE_TAG: ${{ steps.resolve_release.outputs.tag_name }}
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_OUTPUT_DIR"

          if [[ "$PROJECT_SYNC_DRY_RUN" == "true" ]]; then
            echo "::notice::Dry run enabled. Skipping release tag creation."

            cat > "$RELEASE_OUTPUT_DIR/create-release-tag.json" <<JSON
          {
            "schema_version": 1,
            "type": "create-release-tag",
            "status": "skipped",
            "ok": true,
            "dry_run": true,
            "version": "$RELEASE_VERSION",
            "tag_name": "$RELEASE_TAG",
            "target_ref": "$RELEASE_TARGET_REF",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $RELEASE_TAG"
            tag_status="existing"
          else
            git tag -a "$RELEASE_TAG" -m "Aerealith AI $RELEASE_TAG" "$RELEASE_TARGET_REF"
            git push origin "$RELEASE_TAG"
            tag_status="created"
          fi

          cat > "$RELEASE_OUTPUT_DIR/create-release-tag.json" <<JSON
          {
            "schema_version": 1,
            "type": "create-release-tag",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "status": "$tag_status",
            "ok": true,
            "version": "$RELEASE_VERSION",
            "tag_name": "$RELEASE_TAG",
            "target_ref": "$RELEASE_TARGET_REF",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          {
            echo "## Release Tag"
            echo ""
            echo "- Status: \`$tag_status\`"
            echo "- Tag: \`$RELEASE_TAG\`"
            echo "- Version: \`$RELEASE_VERSION\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        id: github_release
        if: needs.preflight.outputs.should_create_github_release == 'true'
        env:
          RELEASE_VERSION: ${{ steps.resolve_release.outputs.version }}
          RELEASE_TAG: ${{ steps.resolve_release.outputs.tag_name }}
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_OUTPUT_DIR"

          if [[ "$PROJECT_SYNC_DRY_RUN" == "true" ]]; then
            echo "::notice::Dry run enabled. Skipping GitHub release creation."
            echo "release_url=" >> "$GITHUB_OUTPUT"

            cat > "$RELEASE_OUTPUT_DIR/create-github-release.json" <<JSON
          {
            "schema_version": 1,
            "type": "create-github-release",
            "status": "skipped",
            "ok": true,
            "dry_run": true,
            "version": "$RELEASE_VERSION",
            "tag_name": "$RELEASE_TAG",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

            exit 0
          fi

          notes_file="$RELEASE_OUTPUT_DIR/CHANGELOG.md"
          release_title="Aerealith AI $RELEASE_TAG"

          release_args=(
            "$RELEASE_TAG"
            --title "$release_title"
            --verify-tag
          )

          if [[ -f "$notes_file" ]]; then
            release_args+=(--notes-file "$notes_file")
          elif [[ "$RELEASE_GENERATE_NOTES" == "true" ]]; then
            release_args+=(--generate-notes)
          else
            release_args+=(--notes "Aerealith AI $RELEASE_TAG")
          fi

          if [[ "$RELEASE_DRAFT" == "true" ]]; then
            release_args+=(--draft)
          fi

          if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub release already exists: $RELEASE_TAG"

            edit_args=(
              "$RELEASE_TAG"
              --repo "$GITHUB_REPOSITORY"
              --title "$release_title"
            )

            if [[ -f "$notes_file" ]]; then
              edit_args+=(--notes-file "$notes_file")
            fi

            if [[ "$RELEASE_DRAFT" == "true" ]]; then
              edit_args+=(--draft=true)
            else
              edit_args+=(--draft=false)
            fi

            if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
              edit_args+=(--prerelease=true)
            else
              edit_args+=(--prerelease=false)
            fi

            gh release edit "${edit_args[@]}"
            release_status="updated"
          else
            gh release create "${release_args[@]}" --repo "$GITHUB_REPOSITORY"
            release_status="created"
          fi

          release_url="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json url --jq '.url')"

          echo "release_url=$release_url" >> "$GITHUB_OUTPUT"

          cat > "$RELEASE_OUTPUT_DIR/create-github-release.json" <<JSON
          {
            "schema_version": 1,
            "type": "create-github-release",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "status": "$release_status",
            "ok": true,
            "version": "$RELEASE_VERSION",
            "tag_name": "$RELEASE_TAG",
            "release_url": "$release_url",
            "draft": "$RELEASE_DRAFT",
            "prerelease": "$RELEASE_PRERELEASE",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          {
            echo "## GitHub Release"
            echo ""
            echo "- Status: \`$release_status\`"
            echo "- Tag: \`$RELEASE_TAG\`"
            echo "- URL: $release_url"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post release discussion announcement
        if: needs.preflight.outputs.should_post_announcement == 'true'
        env:
          RELEASE_VERSION: ${{ steps.resolve_release.outputs.version }}
          RELEASE_TAG: ${{ steps.resolve_release.outputs.tag_name }}
          RELEASE_URL: ${{ steps.github_release.outputs.release_url || '' }}
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_OUTPUT_DIR"

          announcement_file="$RELEASE_OUTPUT_DIR/release-announcement.md"

          {
            echo "# Aerealith AI ${RELEASE_TAG}"
            echo ""
            echo "A new Aerealith AI release has been prepared."
            echo ""
            echo "- Version: \`${RELEASE_VERSION}\`"
            echo "- Tag: \`${RELEASE_TAG}\`"
            echo "- Release: ${RELEASE_URL:-not created in this run}"
            echo ""
            if [[ -f "$RELEASE_OUTPUT_DIR/CHANGELOG.md" ]]; then
              echo "## Changelog"
              echo ""
              cat "$RELEASE_OUTPUT_DIR/CHANGELOG.md"
            fi
          } > "$announcement_file"

          if [[ "$PROJECT_SYNC_DRY_RUN" == "true" ]]; then
            echo "::notice::Dry run enabled. Skipping release discussion announcement."
            exit 0
          fi

          if [[ -z "${RELEASE_DISCUSSION_CATEGORY_NAME:-}" ]]; then
            echo "::notice::No discussion category configured. Skipping announcement."
            exit 0
          fi

          owner="${GITHUB_REPOSITORY%%/*}"
          repo_name="${GITHUB_REPOSITORY#*/}"

          repo_data="$(gh api graphql \
            -f query='
              query($owner: String!, $name: String!) {
                repository(owner: $owner, name: $name) {
                  id
                  discussionCategories(first: 50) {
                    nodes {
                      id
                      name
                    }
                  }
                }
              }
            ' \
            -F owner="$owner" \
            -F name="$repo_name")"

          repository_id="$(printf '%s' "$repo_data" | jq -r '.data.repository.id // empty')"
          category_id="$(printf '%s' "$repo_data" | jq -r --arg category "$RELEASE_DISCUSSION_CATEGORY_NAME" '.data.repository.discussionCategories.nodes[]? | select(.name == $category) | .id' | head -n 1)"

          if [[ -z "$repository_id" || -z "$category_id" ]]; then
            echo "::warning::Discussion category was not found: $RELEASE_DISCUSSION_CATEGORY_NAME"
            exit 0
          fi

          announcement_body="$(cat "$announcement_file")"

          set +e
          discussion_response="$(gh api graphql \
            -f query='
              mutation($repositoryId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
                createDiscussion(input: {
                  repositoryId: $repositoryId,
                  categoryId: $categoryId,
                  title: $title,
                  body: $body
                }) {
                  discussion {
                    url
                  }
                }
              }
            ' \
            -F repositoryId="$repository_id" \
            -F categoryId="$category_id" \
            -F title="Aerealith AI ${RELEASE_TAG}" \
            -F body="$announcement_body")"
          announcement_status="$?"
          set -e

          if [[ "$announcement_status" -ne 0 ]]; then
            echo "::warning::Failed to create release discussion announcement."
            exit 0
          fi

          discussion_url="$(printf '%s' "$discussion_response" | jq -r '.data.createDiscussion.discussion.url // empty')"

          cat > "$RELEASE_OUTPUT_DIR/post-discussion-announcement.json" <<JSON
          {
            "schema_version": 1,
            "type": "post-discussion-announcement",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "status": "created",
            "ok": true,
            "version": "$RELEASE_VERSION",
            "tag_name": "$RELEASE_TAG",
            "discussion_url": "$discussion_url",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          {
            echo "## Release Discussion Announcement"
            echo ""
            echo "- Category: \`$RELEASE_DISCUSSION_CATEGORY_NAME\`"
            echo "- URL: ${discussion_url:-unknown}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize release
        if: always() && needs.preflight.outputs.should_summarize_release == 'true'
        env:
          RELEASE_VERSION: ${{ steps.resolve_release.outputs.version || needs.preflight.outputs.version }}
          RELEASE_TAG: ${{ steps.resolve_release.outputs.tag_name || needs.preflight.outputs.tag_name }}
          RELEASE_URL: ${{ steps.github_release.outputs.release_url || '' }}
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_OUTPUT_DIR"

          release_version="${RELEASE_VERSION:-unknown}"
          release_tag="${RELEASE_TAG:-unknown}"
          release_url="${RELEASE_URL:-}"

          cat > "$RELEASE_OUTPUT_DIR/summarize-release.json" <<JSON
          {
            "schema_version": 1,
            "type": "summarize-release",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "event_name": "$GITHUB_EVENT_NAME",
            "mode": "$RELEASE_MODE",
            "version": "$release_version",
            "tag_name": "$release_tag",
            "release_url": "$release_url",
            "dry_run": "$PROJECT_SYNC_DRY_RUN",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          {
            echo "# Aerealith AI Release Summary"
            echo ""
            echo "Generated: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
            echo ""
            echo "## Status"
            echo ""
            echo "- Mode: \`$RELEASE_MODE\`"
            echo "- Version: \`$release_version\`"
            echo "- Tag: \`$release_tag\`"
            echo "- Release URL: ${release_url:-\`none\`}"
            echo "- Dry run: \`$PROJECT_SYNC_DRY_RUN\`"
          } > "$RELEASE_OUTPUT_DIR/summarize-release.md"

          cat "$RELEASE_OUTPUT_DIR/summarize-release.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Write release output summary
        if: always()
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_OUTPUT_DIR"

          {
            echo "## Release Output Files"
            echo ""
            echo "| File | Size |"
            echo "|---|---:|"

            if [[ -d "$RELEASE_OUTPUT_DIR" ]]; then
              while IFS= read -r file; do
                size="$(wc -c < "$file" | xargs)"
                echo "| \`$file\` | \`$size\` bytes |"
              done < <(find "$RELEASE_OUTPUT_DIR" -type f | sort)
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ github.run_id }}
          path: |
            artifacts/release/**
          if-no-files-found: ignore
          retention-days: 30

  dispatch-downstream:
    name: Dispatch downstream release workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - preflight
      - release

    if: >-
      needs.preflight.outputs.should_dispatch_downstream == 'true' &&
      needs.preflight.outputs.dry_run != 'true' &&
      needs.release.result == 'success'

    env:
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.release.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.release.outputs.version }}

    steps:
      - name: Dispatch selected workflows
        run: |
          set -euo pipefail

          dispatch_workflow() {
            local workflow_file="$1"
            shift || true

            echo "::group::Dispatch $workflow_file"

            if gh workflow view "$workflow_file" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh workflow run "$workflow_file" \
                --repo "$GITHUB_REPOSITORY" \
                --ref "$RELEASE_TAG" \
                "$@"

              echo "Dispatched $workflow_file."
            else
              echo "::notice::Workflow not found or not enabled: $workflow_file"
            fi

            echo "::endgroup::"
          }

          if [[ "${{ needs.preflight.outputs.dispatch_publish_npm }}" == "true" ]]; then
            dispatch_workflow "publish-npm.yaml" \
              -f mode=publish \
              -f npm_tag=latest \
              -f dry_run=false
          fi

          if [[ "${{ needs.preflight.outputs.dispatch_publish_containers }}" == "true" ]]; then
            dispatch_workflow "publish-containers.yaml" \
              -f mode=publish \
              -f registry=ghcr \
              -f dry_run=false
          fi

          if [[ "${{ needs.preflight.outputs.dispatch_artifact_hashes }}" == "true" ]]; then
            dispatch_workflow "artifact-hashes.yaml" \
              -f mode=create \
              -f source_run_id="$GITHUB_RUN_ID" \
              -f create_manifest=true \
              -f create_checksums=true \
              -f create_sbom=true \
              -f dry_run=false
          fi

          if [[ "${{ needs.preflight.outputs.dispatch_attestations }}" == "true" ]]; then
            dispatch_workflow "attestations.yaml" \
              -f source_run_id="$GITHUB_RUN_ID" \
              -f create_manifest=true \
              -f create_checksums=true \
              -f create_sbom=true \
              -f dry_run=false
          fi

          if [[ "${{ needs.preflight.outputs.deploy_production }}" == "true" ]]; then
            dispatch_workflow "cloudflare-production.yaml" \
              -f mode=deploy \
              -f environment_name=production \
              -f dry_run=false
          fi

      - name: Write downstream dispatch summary
        run: |
          set -euo pipefail

          {
            echo "## Downstream Release Dispatch"
            echo ""
            echo "| Workflow | Requested |"
            echo "|---|---|"
            echo "| publish-npm.yaml | \`${{ needs.preflight.outputs.dispatch_publish_npm }}\` |"
            echo "| publish-containers.yaml | \`${{ needs.preflight.outputs.dispatch_publish_containers }}\` |"
            echo "| artifact-hashes.yaml | \`${{ needs.preflight.outputs.dispatch_artifact_hashes }}\` |"
            echo "| attestations.yaml | \`${{ needs.preflight.outputs.dispatch_attestations }}\` |"
            echo "| cloudflare-production.yaml | \`${{ needs.preflight.outputs.deploy_production }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  finalize:
    name: Finalize
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - preflight
      - release
      - dispatch-downstream

    if: always()

    steps:
      - name: Write final release summary
        run: |
          set -euo pipefail

          {
            echo "## Aerealith AI Release Result"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Preflight | \`${{ needs.preflight.result }}\` |"
            echo "| Release | \`${{ needs.release.result }}\` |"
            echo "| Downstream dispatch | \`${{ needs.dispatch-downstream.result }}\` |"
            echo ""
            echo "| Decision | Value |"
            echo "|---|---|"
            echo "| Mode | \`${{ needs.preflight.outputs.mode }}\` |"
            echo "| Release type | \`${{ needs.preflight.outputs.release_type }}\` |"
            echo "| Version | \`${{ needs.release.outputs.version || needs.preflight.outputs.version || 'unknown' }}\` |"
            echo "| Tag | \`${{ needs.release.outputs.tag_name || needs.preflight.outputs.tag_name || 'unknown' }}\` |"
            echo "| Dry run | \`${{ needs.preflight.outputs.dry_run }}\` |"
            echo "| Create tag | \`${{ needs.preflight.outputs.should_create_tag }}\` |"
            echo "| Create GitHub release | \`${{ needs.preflight.outputs.should_create_github_release }}\` |"
            echo "| Dispatch downstream | \`${{ needs.preflight.outputs.should_dispatch_downstream }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce release result
        run: |
          set -euo pipefail

          check_required_job() {
            local name="$1"
            local result="$2"

            if [[ "$result" != "success" ]]; then
              echo "::error::$name failed with result: $result"
              exit 1
            fi
          }

          check_optional_job() {
            local name="$1"
            local result="$2"

            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::$name failed with result: $result"
              exit 1
            fi
          }

          check_required_job "Preflight" "${{ needs.preflight.result }}"
          check_required_job "Release" "${{ needs.release.result }}"
          check_optional_job "Downstream dispatch" "${{ needs.dispatch-downstream.result }}"

          echo "Release workflow completed."
