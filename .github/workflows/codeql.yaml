name: Aerealith AI CodeQL

run-name: >-
  CodeQL / ${{ github.event_name }} / ${{ github.ref_name || github.head_ref || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      language:
        description: "CodeQL language to analyze."
        required: true
        default: "javascript-typescript"
        type: choice
        options:
          - javascript-typescript
      query_suite:
        description: "CodeQL query suite."
        required: true
        default: "security-extended,security-and-quality"
        type: choice
        options:
          - default
          - security-extended
          - security-and-quality
          - security-extended,security-and-quality
      run_dependency_summary:
        description: "Run dependency security summary after CodeQL."
        required: true
        default: true
        type: boolean
      run_unified_security_summary:
        description: "Run unified security summary after CodeQL."
        required: true
        default: true
        type: boolean
      fail_on_summary_error:
        description: "Fail workflow if local summary scripts report errors."
        required: true
        default: false
        type: boolean
      dry_run:
        description: "Pass dry-run mode to local summary scripts."
        required: true
        default: false
        type: boolean

  push:
    branches:
      - main
      - staging
      - develop
      - "release/**"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

  pull_request:
    branches:
      - main
      - staging
      - develop
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

  schedule:
    - cron: "23 9 * * 2"

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: >-
    codeql-${{ github.event.pull_request.number || github.ref_name || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PROJECT_NAME: Aerealith AI
  NODE_VERSION: "24"
  FORCE_COLOR: "1"
  CODEQL_OUTPUT_DIR: artifacts/security/codeql
  CODEQL_RESULTS_DIR: artifacts/security/codeql/results
  PROJECT_SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest

    outputs:
      language: ${{ steps.context.outputs.language }}
      query_suite: ${{ steps.context.outputs.query_suite }}
      dry_run: ${{ steps.context.outputs.dry_run }}
      run_dependency_summary: ${{ steps.context.outputs.run_dependency_summary }}
      run_unified_security_summary: ${{ steps.context.outputs.run_unified_security_summary }}
      fail_on_summary_error: ${{ steps.context.outputs.fail_on_summary_error }}

    steps:
      - name: Resolve CodeQL context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_LANGUAGE: ${{ github.event.inputs.language || 'javascript-typescript' }}
          INPUT_QUERY_SUITE: ${{ github.event.inputs.query_suite || 'security-extended,security-and-quality' }}
          INPUT_RUN_DEPENDENCY_SUMMARY: ${{ github.event.inputs.run_dependency_summary || 'true' }}
          INPUT_RUN_UNIFIED_SECURITY_SUMMARY: ${{ github.event.inputs.run_unified_security_summary || 'true' }}
          INPUT_FAIL_ON_SUMMARY_ERROR: ${{ github.event.inputs.fail_on_summary_error || 'false' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          language="${INPUT_LANGUAGE:-javascript-typescript}"
          query_suite="${INPUT_QUERY_SUITE:-security-extended,security-and-quality}"
          run_dependency_summary="${INPUT_RUN_DEPENDENCY_SUMMARY:-true}"
          run_unified_security_summary="${INPUT_RUN_UNIFIED_SECURITY_SUMMARY:-true}"
          fail_on_summary_error="${INPUT_FAIL_ON_SUMMARY_ERROR:-false}"
          dry_run="${INPUT_DRY_RUN:-false}"

          {
            echo "language=$language"
            echo "query_suite=$query_suite"
            echo "run_dependency_summary=$run_dependency_summary"
            echo "run_unified_security_summary=$run_unified_security_summary"
            echo "fail_on_summary_error=$fail_on_summary_error"
            echo "dry_run=$dry_run"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Aerealith AI CodeQL"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Event | \`$EVENT_NAME\` |"
            echo "| Language | \`$language\` |"
            echo "| Query suite | \`$query_suite\` |"
            echo "| Dependency summary | \`$run_dependency_summary\` |"
            echo "| Unified security summary | \`$run_unified_security_summary\` |"
            echo "| Fail on summary error | \`$fail_on_summary_error\` |"
            echo "| Dry run | \`$dry_run\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  codeql:
    name: Analyze ${{ needs.preflight.outputs.language }}
    runs-on: ubuntu-latest
    needs:
      - preflight

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      REPO_AUTOMATION_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}
      CODEQL_LANGUAGE: ${{ needs.preflight.outputs.language }}
      CODEQL_QUERY_SUITE: ${{ needs.preflight.outputs.query_suite }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: |
          set -euo pipefail
          corepack enable

      - name: Install dependencies
        if: hashFiles('pnpm-lock.yaml') != ''
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Prepare CodeQL output directory
        run: |
          set -euo pipefail
          mkdir -p "$CODEQL_OUTPUT_DIR"
          mkdir -p "$CODEQL_RESULTS_DIR"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ needs.preflight.outputs.language }}
          queries: ${{ needs.preflight.outputs.query_suite }}

      - name: Build workspace
        if: hashFiles('package.json') != '' && hashFiles('pnpm-lock.yaml') != ''
        run: |
          set -euo pipefail

          if pnpm nx --version >/dev/null 2>&1; then
            pnpm nx run-many --target=build --all --skip-nx-cache || true
          elif pnpm run | grep -qE '^  build$|^build'; then
            pnpm run build || true
          else
            echo "::notice::No build script detected. Continuing with CodeQL extraction."
          fi

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ needs.preflight.outputs.language }}"
          upload: true
          output: ${{ env.CODEQL_RESULTS_DIR }}

      - name: Write CodeQL run metadata
        if: always()
        run: |
          set -euo pipefail

          cat > "$CODEQL_OUTPUT_DIR/codeql-run.json" <<JSON
          {
            "schema_version": 1,
            "type": "security-codeql-run",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "event_name": "$GITHUB_EVENT_NAME",
            "language": "$CODEQL_LANGUAGE",
            "query_suite": "$CODEQL_QUERY_SUITE",
            "ref": "$GITHUB_REF",
            "sha": "$GITHUB_SHA",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          {
            echo "# Aerealith AI CodeQL Run"
            echo ""
            echo "Generated: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
            echo ""
            echo "## Inputs"
            echo ""
            echo "- Language: \`$CODEQL_LANGUAGE\`"
            echo "- Query suite: \`$CODEQL_QUERY_SUITE\`"
            echo "- Ref: \`$GITHUB_REF\`"
            echo "- SHA: \`$GITHUB_SHA\`"
          } > "$CODEQL_OUTPUT_DIR/codeql-run.md"

      - name: Summarize CodeQL
        id: summarize_codeql
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/security/summarize-codeql.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/security/summarize-codeql.js"
            exit 0
          fi

          node ".github/scripts/security/summarize-codeql.js" \
            --input-dir "$CODEQL_OUTPUT_DIR" \
            --output "$CODEQL_OUTPUT_DIR/summarize-codeql.json" \
            --summary "$CODEQL_OUTPUT_DIR/summarize-codeql.md" \
            --no-fail-on-error

      - name: Summarize dependencies
        id: summarize_dependencies
        if: always() && needs.preflight.outputs.run_dependency_summary == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/security/summarize-dependencies.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/security/summarize-dependencies.js"
            exit 0
          fi

          node ".github/scripts/security/summarize-dependencies.js" \
            --output "artifacts/security/summarize-dependencies.json" \
            --summary "artifacts/security/summarize-dependencies.md" \
            --no-fail-on-error

      - name: Run unified security summary
        id: summarize_security
        if: always() && needs.preflight.outputs.run_unified_security_summary == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/security/summarize-security.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/security/summarize-security.js"
            exit 0
          fi

          node ".github/scripts/security/summarize-security.js" \
            --input-dir "artifacts/security" \
            --output "artifacts/security/summarize-security.json" \
            --summary "artifacts/security/summarize-security.md" \
            --no-fail-on-error

      - name: Write CodeQL output summary
        if: always()
        run: |
          set -euo pipefail

          {
            echo "## CodeQL Output"
            echo ""
            echo "| File | Size |"
            echo "|---|---:|"

            if [[ -d "artifacts/security" ]]; then
              while IFS= read -r file; do
                size="$(wc -c < "$file" | xargs)"
                echo "| \`$file\` | \`$size\` bytes |"
              done < <(find artifacts/security -type f | sort)
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce local summary result
        if: always() && needs.preflight.outputs.fail_on_summary_error == 'true'
        env:
          CODEQL_SUMMARY_RESULT: ${{ steps.summarize_codeql.outcome || 'skipped' }}
          DEPENDENCY_SUMMARY_RESULT: ${{ steps.summarize_dependencies.outcome || 'skipped' }}
          SECURITY_SUMMARY_RESULT: ${{ steps.summarize_security.outcome || 'skipped' }}
        run: |
          set -euo pipefail

          if [[ "$CODEQL_SUMMARY_RESULT" == "failure" || "$DEPENDENCY_SUMMARY_RESULT" == "failure" || "$SECURITY_SUMMARY_RESULT" == "failure" ]]; then
            echo "::error::One or more local security summary scripts failed."
            exit 1
          fi

      - name: Upload CodeQL artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ github.run_id }}
          path: |
            artifacts/security/codeql/**
            artifacts/security/summarize-dependencies.*
            artifacts/security/summarize-security.*
          if-no-files-found: ignore
          retention-days: 30

  finalize:
    name: Finalize
    runs-on: ubuntu-latest
    needs:
      - preflight
      - codeql

    if: always()

    steps:
      - name: Write final CodeQL summary
        run: |
          set -euo pipefail

          {
            echo "## Aerealith AI CodeQL Result"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Preflight | \`${{ needs.preflight.result }}\` |"
            echo "| CodeQL | \`${{ needs.codeql.result }}\` |"
            echo ""
            echo "| Decision | Value |"
            echo "|---|---|"
            echo "| Language | \`${{ needs.preflight.outputs.language }}\` |"
            echo "| Query suite | \`${{ needs.preflight.outputs.query_suite }}\` |"
            echo "| Dependency summary | \`${{ needs.preflight.outputs.run_dependency_summary }}\` |"
            echo "| Unified security summary | \`${{ needs.preflight.outputs.run_unified_security_summary }}\` |"
            echo "| Dry run | \`${{ needs.preflight.outputs.dry_run }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
