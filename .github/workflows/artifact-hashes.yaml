name: Aerealith AI Artifact Hashes

run-name: >-
  Artifact Hashes / ${{ github.event_name }} / ${{ github.ref_name || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Artifact hash mode to run."
        required: true
        default: create
        type: choice
        options:
          - create
          - verify-only
          - manifest-only
          - checksums-only
          - sbom-only
          - summarize-only
      source_run_id:
        description: "Workflow run ID to download artifacts from. Required unless summarize-only."
        required: false
        default: ""
        type: string
      source_artifact_pattern:
        description: "Artifact name pattern to download from the source run."
        required: false
        default: "*"
        type: string
      create_manifest:
        description: "Create an artifact manifest."
        required: true
        default: true
        type: boolean
      create_checksums:
        description: "Create SHA256 and SHA512 checksum files."
        required: true
        default: true
        type: boolean
      create_sbom:
        description: "Create a simple SPDX-style artifact SBOM."
        required: true
        default: true
        type: boolean
      verify_existing_checksums:
        description: "Verify existing checksum files found in downloaded artifacts."
        required: true
        default: false
        type: boolean
      dry_run:
        description: "Evaluate without uploading generated hash artifacts."
        required: true
        default: false
        type: boolean

  workflow_run:
    workflows:
      - Aerealith AI Release
      - Aerealith AI Publish NPM Packages
      - Aerealith AI Publish Containers
    types:
      - completed

permissions:
  actions: read
  attestations: write
  checks: write
  contents: read
  id-token: write
  security-events: read

concurrency:
  group: artifact-hashes-${{ github.workflow }}-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PROJECT_NAME: Aerealith AI
  NODE_VERSION: "24"
  FORCE_COLOR: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SOURCE_ARTIFACT_DIR: artifacts/source
  HASH_OUTPUT_DIR: artifacts/hashes
  PROJECT_SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      mode: ${{ steps.context.outputs.mode }}
      source_run_id: ${{ steps.context.outputs.source_run_id }}
      source_artifact_pattern: ${{ steps.context.outputs.source_artifact_pattern }}
      create_manifest: ${{ steps.context.outputs.create_manifest }}
      create_checksums: ${{ steps.context.outputs.create_checksums }}
      create_sbom: ${{ steps.context.outputs.create_sbom }}
      verify_existing_checksums: ${{ steps.context.outputs.verify_existing_checksums }}
      dry_run: ${{ steps.context.outputs.dry_run }}
      should_download: ${{ steps.context.outputs.should_download }}
      should_create_manifest: ${{ steps.context.outputs.should_create_manifest }}
      should_create_checksums: ${{ steps.context.outputs.should_create_checksums }}
      should_create_sbom: ${{ steps.context.outputs.should_create_sbom }}
      should_verify_existing_checksums: ${{ steps.context.outputs.should_verify_existing_checksums }}
      should_upload: ${{ steps.context.outputs.should_upload }}
      should_summarize: ${{ steps.context.outputs.should_summarize }}

    steps:
      - name: Resolve artifact hash context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode || 'create' }}
          INPUT_SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id || '' }}
          INPUT_SOURCE_ARTIFACT_PATTERN: ${{ github.event.inputs.source_artifact_pattern || '*' }}
          INPUT_CREATE_MANIFEST: ${{ github.event.inputs.create_manifest || 'true' }}
          INPUT_CREATE_CHECKSUMS: ${{ github.event.inputs.create_checksums || 'true' }}
          INPUT_CREATE_SBOM: ${{ github.event.inputs.create_sbom || 'true' }}
          INPUT_VERIFY_EXISTING_CHECKSUMS: ${{ github.event.inputs.verify_existing_checksums || 'false' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id || '' }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
        run: |
          set -euo pipefail

          mode="${INPUT_MODE:-create}"
          source_run_id="${INPUT_SOURCE_RUN_ID:-}"
          source_artifact_pattern="${INPUT_SOURCE_ARTIFACT_PATTERN:-*}"
          create_manifest="${INPUT_CREATE_MANIFEST:-true}"
          create_checksums="${INPUT_CREATE_CHECKSUMS:-true}"
          create_sbom="${INPUT_CREATE_SBOM:-true}"
          verify_existing_checksums="${INPUT_VERIFY_EXISTING_CHECKSUMS:-false}"
          dry_run="${INPUT_DRY_RUN:-false}"

          if [[ -z "$source_run_id" && -n "${WORKFLOW_RUN_ID:-}" ]]; then
            source_run_id="$WORKFLOW_RUN_ID"
          fi

          should_download="false"
          should_create_manifest="false"
          should_create_checksums="false"
          should_create_sbom="false"
          should_verify_existing_checksums="false"
          should_upload="false"
          should_summarize="true"

          case "$mode" in
            create)
              should_download="true"
              should_create_manifest="$create_manifest"
              should_create_checksums="$create_checksums"
              should_create_sbom="$create_sbom"
              should_verify_existing_checksums="$verify_existing_checksums"
              ;;
            verify-only)
              should_download="true"
              should_create_manifest="$create_manifest"
              should_create_checksums="false"
              should_create_sbom="false"
              should_verify_existing_checksums="true"
              ;;
            manifest-only)
              should_download="true"
              should_create_manifest="true"
              should_create_checksums="false"
              should_create_sbom="false"
              should_verify_existing_checksums="false"
              ;;
            checksums-only)
              should_download="true"
              should_create_manifest="false"
              should_create_checksums="true"
              should_create_sbom="false"
              should_verify_existing_checksums="false"
              ;;
            sbom-only)
              should_download="true"
              should_create_manifest="false"
              should_create_checksums="false"
              should_create_sbom="true"
              should_verify_existing_checksums="false"
              ;;
            summarize-only)
              should_download="false"
              should_summarize="true"
              ;;
            *)
              echo "::error::Unsupported artifact hash mode: $mode"
              exit 1
              ;;
          esac

          if [[ "$EVENT_NAME" == "workflow_run" && -n "${WORKFLOW_RUN_CONCLUSION:-}" && "$WORKFLOW_RUN_CONCLUSION" != "success" ]]; then
            echo "::notice::Source workflow run conclusion was '$WORKFLOW_RUN_CONCLUSION'. Artifact hash generation will be skipped."
            should_download="false"
            should_create_manifest="false"
            should_create_checksums="false"
            should_create_sbom="false"
            should_verify_existing_checksums="false"
          fi

          if [[ "$should_download" == "true" && -z "$source_run_id" ]]; then
            echo "::error::source_run_id is required unless mode is summarize-only."
            exit 1
          fi

          if [[ "$dry_run" != "true" && "$mode" != "summarize-only" ]]; then
            should_upload="true"
          fi

          {
            echo "mode=$mode"
            echo "source_run_id=$source_run_id"
            echo "source_artifact_pattern=$source_artifact_pattern"
            echo "create_manifest=$create_manifest"
            echo "create_checksums=$create_checksums"
            echo "create_sbom=$create_sbom"
            echo "verify_existing_checksums=$verify_existing_checksums"
            echo "dry_run=$dry_run"
            echo "should_download=$should_download"
            echo "should_create_manifest=$should_create_manifest"
            echo "should_create_checksums=$should_create_checksums"
            echo "should_create_sbom=$should_create_sbom"
            echo "should_verify_existing_checksums=$should_verify_existing_checksums"
            echo "should_upload=$should_upload"
            echo "should_summarize=$should_summarize"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Aerealith AI Artifact Hashes"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Event | \`$EVENT_NAME\` |"
            echo "| Mode | \`$mode\` |"
            echo "| Source run ID | \`${source_run_id:-none}\` |"
            echo "| Artifact pattern | \`$source_artifact_pattern\` |"
            echo "| Manifest | \`$should_create_manifest\` |"
            echo "| Checksums | \`$should_create_checksums\` |"
            echo "| SBOM | \`$should_create_sbom\` |"
            echo "| Verify existing checksums | \`$should_verify_existing_checksums\` |"
            echo "| Dry run | \`$dry_run\` |"
            echo "| Upload generated artifacts | \`$should_upload\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  hash-artifacts:
    name: Hash artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - preflight

    if: needs.preflight.outputs.should_download == 'true'

    outputs:
      file_count: ${{ steps.hash.outputs.file_count }}
      total_bytes: ${{ steps.hash.outputs.total_bytes }}
      sha256_file: ${{ steps.hash.outputs.sha256_file }}
      sha512_file: ${{ steps.hash.outputs.sha512_file }}
      manifest_file: ${{ steps.hash.outputs.manifest_file }}
      sbom_file: ${{ steps.hash.outputs.sbom_file }}
      verification_status: ${{ steps.verify.outputs.verification_status }}

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      REPO_AUTOMATION_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      SOURCE_RUN_ID: ${{ needs.preflight.outputs.source_run_id }}
      SOURCE_ARTIFACT_PATTERN: ${{ needs.preflight.outputs.source_artifact_pattern }}
      SHOULD_CREATE_MANIFEST: ${{ needs.preflight.outputs.should_create_manifest }}
      SHOULD_CREATE_CHECKSUMS: ${{ needs.preflight.outputs.should_create_checksums }}
      SHOULD_CREATE_SBOM: ${{ needs.preflight.outputs.should_create_sbom }}
      SHOULD_VERIFY_EXISTING_CHECKSUMS: ${{ needs.preflight.outputs.should_verify_existing_checksums }}
      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}

    steps:
      - name: Checkout repository automation
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare artifact directories
        run: |
          set -euo pipefail

          rm -rf "$SOURCE_ARTIFACT_DIR" "$HASH_OUTPUT_DIR"
          mkdir -p "$SOURCE_ARTIFACT_DIR"
          mkdir -p "$HASH_OUTPUT_DIR"

      - name: Download source artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.SOURCE_ARTIFACT_DIR }}
          pattern: ${{ env.SOURCE_ARTIFACT_PATTERN }}
          merge-multiple: false
          github-token: ${{ env.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.SOURCE_RUN_ID }}
          digest-mismatch: error

      - name: Verify existing checksum files
        id: verify
        if: env.SHOULD_VERIFY_EXISTING_CHECKSUMS == 'true'
        run: |
          set -euo pipefail

          verification_log="$HASH_OUTPUT_DIR/verification.log"
          verification_status="passed"
          checksum_count=0
          failed_count=0

          {
            echo "Aerealith AI artifact checksum verification"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
          } > "$verification_log"

          while IFS= read -r checksum_file; do
            [[ -z "$checksum_file" ]] && continue

            checksum_count="$((checksum_count + 1))"

            checksum_dir="$(dirname "$checksum_file")"
            checksum_name="$(basename "$checksum_file")"

            echo "Verifying $checksum_file" | tee -a "$verification_log"

            if [[ "$checksum_name" == *"SHA512"* || "$checksum_name" == *.sha512 ]]; then
              if ! (cd "$checksum_dir" && sha512sum --check "$checksum_name") >> "$verification_log" 2>&1; then
                failed_count="$((failed_count + 1))"
                verification_status="failed"
              fi
            else
              if ! (cd "$checksum_dir" && sha256sum --check "$checksum_name") >> "$verification_log" 2>&1; then
                failed_count="$((failed_count + 1))"
                verification_status="failed"
              fi
            fi
          done < <(
            find "$SOURCE_ARTIFACT_DIR" -type f \
              \( \
                -name "SHA256SUMS" \
                -o -name "SHA512SUMS" \
                -o -name "*.sha256" \
                -o -name "*.sha512" \
              \) | sort
          )

          if [[ "$checksum_count" -eq 0 ]]; then
            verification_status="skipped"
            echo "No existing checksum files were found." | tee -a "$verification_log"
          fi

          {
            echo "verification_status=$verification_status"
            echo "checksum_count=$checksum_count"
            echo "failed_count=$failed_count"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Existing Checksum Verification"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Status | \`$verification_status\` |"
            echo "| Checksum files | \`$checksum_count\` |"
            echo "| Failed files | \`$failed_count\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$verification_status" == "failed" ]]; then
            echo "::error::One or more existing checksum files failed verification."
            exit 1
          fi

      - name: Generate artifact hashes
        id: hash
        run: |
          set -euo pipefail

          node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");

          const sourceDir = path.resolve(process.env.SOURCE_ARTIFACT_DIR || "artifacts/source");
          const outputDir = path.resolve(process.env.HASH_OUTPUT_DIR || "artifacts/hashes");

          const shouldCreateManifest = String(process.env.SHOULD_CREATE_MANIFEST || "true") === "true";
          const shouldCreateChecksums = String(process.env.SHOULD_CREATE_CHECKSUMS || "true") === "true";
          const shouldCreateSbom = String(process.env.SHOULD_CREATE_SBOM || "true") === "true";

          const projectName = process.env.PROJECT_NAME || "Aerealith AI";
          const repository = process.env.GITHUB_REPOSITORY || "";
          const runId = process.env.GITHUB_RUN_ID || "";
          const runAttempt = process.env.GITHUB_RUN_ATTEMPT || "";
          const sourceRunId = process.env.SOURCE_RUN_ID || "";
          const createdAt = new Date().toISOString();

          fs.mkdirSync(outputDir, { recursive: true });

          function walk(directory, entries = []) {
            if (!fs.existsSync(directory)) {
              return entries;
            }

            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const fullPath = path.join(directory, entry.name);

              if (entry.isDirectory()) {
                walk(fullPath, entries);
                continue;
              }

              if (entry.isFile()) {
                entries.push(fullPath);
              }
            }

            return entries;
          }

          function hashFile(filePath, algorithm) {
            const hash = crypto.createHash(algorithm);
            const buffer = fs.readFileSync(filePath);
            hash.update(buffer);
            return hash.digest("hex");
          }

          function normalizeRelative(filePath) {
            return path
              .relative(sourceDir, filePath)
              .split(path.sep)
              .join("/");
          }

          function checksumLine(hash, relativePath) {
            return `${hash}  ${relativePath}`;
          }

          const files = walk(sourceDir)
            .sort((left, right) => normalizeRelative(left).localeCompare(normalizeRelative(right)));

          const entries = files.map((filePath) => {
            const stat = fs.statSync(filePath);
            const relativePath = normalizeRelative(filePath);

            return {
              path: relativePath,
              bytes: stat.size,
              mode: `0${(stat.mode & 0o777).toString(8)}`,
              modified_at: stat.mtime.toISOString(),
              sha256: hashFile(filePath, "sha256"),
              sha512: hashFile(filePath, "sha512"),
            };
          });

          const totalBytes = entries.reduce((sum, entry) => sum + entry.bytes, 0);

          const manifest = {
            schema_version: 1,
            type: "artifact-hash-manifest",
            project: projectName,
            repository,
            run_id: runId,
            run_attempt: runAttempt,
            source_run_id: sourceRunId,
            event_name: process.env.GITHUB_EVENT_NAME || "",
            ref: process.env.GITHUB_REF || "",
            sha: process.env.GITHUB_SHA || "",
            created_at: createdAt,
            totals: {
              files: entries.length,
              bytes: totalBytes,
            },
            files: entries,
          };

          const manifestFile = path.join(outputDir, "artifact-manifest.json");
          const manifestMarkdownFile = path.join(outputDir, "artifact-manifest.md");
          const sha256File = path.join(outputDir, "SHA256SUMS");
          const sha512File = path.join(outputDir, "SHA512SUMS");
          const sbomFile = path.join(outputDir, "artifact-sbom.spdx.json");
          const summaryFile = path.join(outputDir, "artifact-hashes-summary.md");

          if (shouldCreateManifest) {
            fs.writeFileSync(manifestFile, `${JSON.stringify(manifest, null, 2)}\n`);

            const manifestLines = [
              "# Aerealith AI Artifact Manifest",
              "",
              `Generated: \`${createdAt}\``,
              "",
              "## Summary",
              "",
              `- Repository: \`${repository || "unknown"}\``,
              `- Source run ID: \`${sourceRunId || "unknown"}\``,
              `- Files: \`${entries.length}\``,
              `- Total bytes: \`${totalBytes}\``,
              "",
              "## Files",
              "",
              "| Path | Bytes | SHA256 |",
              "|---|---:|---|",
              ...entries.slice(0, 250).map((entry) => `| \`${entry.path}\` | \`${entry.bytes}\` | \`${entry.sha256}\` |`),
            ];

            if (entries.length > 250) {
              manifestLines.push(`| ... | ... | \`${entries.length - 250} more file(s) omitted from markdown summary\` |`);
            }

            manifestLines.push("");

            fs.writeFileSync(manifestMarkdownFile, `${manifestLines.join("\n").trim()}\n`);
          }

          if (shouldCreateChecksums) {
            fs.writeFileSync(
              sha256File,
              `${entries.map((entry) => checksumLine(entry.sha256, entry.path)).join("\n")}\n`,
            );

            fs.writeFileSync(
              sha512File,
              `${entries.map((entry) => checksumLine(entry.sha512, entry.path)).join("\n")}\n`,
            );
          }

          if (shouldCreateSbom) {
            const sbom = {
              spdxVersion: "SPDX-2.3",
              dataLicense: "CC0-1.0",
              SPDXID: "SPDXRef-DOCUMENT",
              name: `${projectName} Artifact SBOM`,
              documentNamespace: `https://github.com/${repository}/actions/runs/${runId}/artifact-sbom-${createdAt}`,
              creationInfo: {
                created: createdAt,
                creators: [
                  "Tool: Aerealith AI artifact-hashes workflow",
                ],
              },
              packages: [
                {
                  name: `${projectName} downloaded artifacts`,
                  SPDXID: "SPDXRef-Package-Downloaded-Artifacts",
                  downloadLocation: "NOASSERTION",
                  filesAnalyzed: true,
                  licenseConcluded: "NOASSERTION",
                  licenseDeclared: "NOASSERTION",
                  copyrightText: "NOASSERTION",
                },
              ],
              files: entries.map((entry, index) => ({
                fileName: entry.path,
                SPDXID: `SPDXRef-File-${index + 1}`,
                checksums: [
                  {
                    algorithm: "SHA256",
                    checksumValue: entry.sha256,
                  },
                  {
                    algorithm: "SHA512",
                    checksumValue: entry.sha512,
                  },
                ],
                licenseConcluded: "NOASSERTION",
                copyrightText: "NOASSERTION",
              })),
              relationships: entries.map((entry, index) => ({
                spdxElementId: "SPDXRef-Package-Downloaded-Artifacts",
                relationshipType: "CONTAINS",
                relatedSpdxElement: `SPDXRef-File-${index + 1}`,
              })),
            };

            fs.writeFileSync(sbomFile, `${JSON.stringify(sbom, null, 2)}\n`);
          }

          const summaryLines = [
            "# Aerealith AI Artifact Hashes",
            "",
            `Generated: \`${createdAt}\``,
            "",
            "## Status",
            "",
            `- Source run ID: \`${sourceRunId || "unknown"}\``,
            `- Files hashed: \`${entries.length}\``,
            `- Total bytes: \`${totalBytes}\``,
            `- Manifest created: \`${shouldCreateManifest}\``,
            `- Checksums created: \`${shouldCreateChecksums}\``,
            `- SBOM created: \`${shouldCreateSbom}\``,
            "",
            "## Output Files",
            "",
            "| File | Created |",
            "|---|---|",
            `| \`artifact-manifest.json\` | \`${shouldCreateManifest}\` |`,
            `| \`artifact-manifest.md\` | \`${shouldCreateManifest}\` |`,
            `| \`SHA256SUMS\` | \`${shouldCreateChecksums}\` |`,
            `| \`SHA512SUMS\` | \`${shouldCreateChecksums}\` |`,
            `| \`artifact-sbom.spdx.json\` | \`${shouldCreateSbom}\` |`,
            "",
          ];

          fs.writeFileSync(summaryFile, `${summaryLines.join("\n").trim()}\n`);

          const githubOutput = process.env.GITHUB_OUTPUT;
          if (githubOutput) {
            fs.appendFileSync(
              githubOutput,
              [
                `file_count=${entries.length}`,
                `total_bytes=${totalBytes}`,
                `manifest_file=${shouldCreateManifest ? path.relative(process.cwd(), manifestFile).split(path.sep).join("/") : ""}`,
                `sha256_file=${shouldCreateChecksums ? path.relative(process.cwd(), sha256File).split(path.sep).join("/") : ""}`,
                `sha512_file=${shouldCreateChecksums ? path.relative(process.cwd(), sha512File).split(path.sep).join("/") : ""}`,
                `sbom_file=${shouldCreateSbom ? path.relative(process.cwd(), sbomFile).split(path.sep).join("/") : ""}`,
                "",
              ].join("\n"),
            );
          }
          NODE

          if [[ -f "$HASH_OUTPUT_DIR/artifact-hashes-summary.md" ]]; then
            cat "$HASH_OUTPUT_DIR/artifact-hashes-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write generated output file summary
        if: always()
        run: |
          set -euo pipefail

          {
            echo "## Artifact Hash Output Files"
            echo ""
            echo "| File | Size |"
            echo "|---|---:|"

            if [[ -d "$HASH_OUTPUT_DIR" ]]; then
              while IFS= read -r file; do
                size="$(wc -c < "$file" | xargs)"
                echo "| \`$file\` | \`$size\` bytes |"
              done < <(find "$HASH_OUTPUT_DIR" -type f | sort)
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact hash outputs
        if: always() && needs.preflight.outputs.should_upload == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: artifact-hashes-${{ needs.preflight.outputs.source_run_id }}-${{ github.run_id }}
          path: |
            artifacts/hashes/**
          if-no-files-found: error
          retention-days: 90

  summarize:
    name: Summarize artifact hashes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - preflight
      - hash-artifacts

    if: always() && needs.preflight.outputs.should_summarize == 'true'

    steps:
      - name: Write final artifact hash summary
        run: |
          set -euo pipefail

          {
            echo "## Aerealith AI Artifact Hashes Result"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Preflight | \`${{ needs.preflight.result }}\` |"
            echo "| Hash artifacts | \`${{ needs.hash-artifacts.result }}\` |"
            echo ""
            echo "| Decision | Value |"
            echo "|---|---|"
            echo "| Mode | \`${{ needs.preflight.outputs.mode }}\` |"
            echo "| Source run ID | \`${{ needs.preflight.outputs.source_run_id || 'none' }}\` |"
            echo "| Artifact pattern | \`${{ needs.preflight.outputs.source_artifact_pattern }}\` |"
            echo "| Dry run | \`${{ needs.preflight.outputs.dry_run }}\` |"
            echo "| Manifest | \`${{ needs.preflight.outputs.should_create_manifest }}\` |"
            echo "| Checksums | \`${{ needs.preflight.outputs.should_create_checksums }}\` |"
            echo "| SBOM | \`${{ needs.preflight.outputs.should_create_sbom }}\` |"
            echo "| Verify existing checksums | \`${{ needs.preflight.outputs.should_verify_existing_checksums }}\` |"
            echo "| Upload | \`${{ needs.preflight.outputs.should_upload }}\` |"
            echo "| Files hashed | \`${{ needs.hash-artifacts.outputs.file_count || '0' }}\` |"
            echo "| Total bytes | \`${{ needs.hash-artifacts.outputs.total_bytes || '0' }}\` |"
            echo "| Verification status | \`${{ needs.hash-artifacts.outputs.verification_status || 'not-run' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce artifact hash result
        run: |
          set -euo pipefail

          if [[ "${{ needs.preflight.result }}" != "success" ]]; then
            echo "::error::Preflight failed with result: ${{ needs.preflight.result }}"
            exit 1
          fi

          if [[ "${{ needs.preflight.outputs.should_download }}" == "true" && "${{ needs.hash-artifacts.result }}" != "success" ]]; then
            echo "::error::Artifact hash generation failed with result: ${{ needs.hash-artifacts.result }}"
            exit 1
          fi

          echo "Artifact hash workflow completed."
