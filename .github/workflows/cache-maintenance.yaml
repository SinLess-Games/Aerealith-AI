name: Aerealith AI Cache Maintenance

run-name: >-
  Cache Maintenance / ${{ github.event_name }} / ${{ github.ref_name || github.head_ref || 'scheduled' }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Cache maintenance mode to run."
        required: true
        default: "all"
        type: choice
        options:
          - all
          - build-keys
          - list
          - cleanup
          - summarize-only
      dry_run:
        description: "Evaluate cache cleanup without deleting caches."
        required: true
        default: true
        type: boolean
      cleanup_enabled:
        description: "Allow cache cleanup to delete caches when dry_run is false."
        required: true
        default: false
        type: boolean
      max_age_days:
        description: "Delete cache entries older than this many days."
        required: true
        default: "30"
        type: string
      keep_recent:
        description: "Keep this many newest cache entries per cache key/ref group."
        required: true
        default: "5"
        type: string
      ref_filter:
        description: "Optional git ref filter, such as refs/heads/main."
        required: false
        default: ""
        type: string

  schedule:
    - cron: "41 10 * * 0"

permissions:
  actions: write
  checks: write
  contents: read

concurrency:
  group: cache-maintenance-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PROJECT_NAME: Aerealith AI
  NODE_VERSION: "24"
  FORCE_COLOR: "1"
  CACHE_MAINTENANCE_OUTPUT_DIR: artifacts/cache
  PROJECT_SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest

    outputs:
      mode: ${{ steps.context.outputs.mode }}
      dry_run: ${{ steps.context.outputs.dry_run }}
      cleanup_enabled: ${{ steps.context.outputs.cleanup_enabled }}
      max_age_days: ${{ steps.context.outputs.max_age_days }}
      keep_recent: ${{ steps.context.outputs.keep_recent }}
      ref_filter: ${{ steps.context.outputs.ref_filter }}
      should_build_keys: ${{ steps.context.outputs.should_build_keys }}
      should_list_caches: ${{ steps.context.outputs.should_list_caches }}
      should_cleanup_caches: ${{ steps.context.outputs.should_cleanup_caches }}
      should_summarize_caches: ${{ steps.context.outputs.should_summarize_caches }}

    steps:
      - name: Resolve cache maintenance context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode || 'all' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
          INPUT_CLEANUP_ENABLED: ${{ github.event.inputs.cleanup_enabled || 'false' }}
          INPUT_MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days || '30' }}
          INPUT_KEEP_RECENT: ${{ github.event.inputs.keep_recent || '5' }}
          INPUT_REF_FILTER: ${{ github.event.inputs.ref_filter || '' }}
        run: |
          set -euo pipefail

          mode="${INPUT_MODE:-all}"
          dry_run="${INPUT_DRY_RUN:-true}"
          cleanup_enabled="${INPUT_CLEANUP_ENABLED:-false}"
          max_age_days="${INPUT_MAX_AGE_DAYS:-30}"
          keep_recent="${INPUT_KEEP_RECENT:-5}"
          ref_filter="${INPUT_REF_FILTER:-}"

          should_build_keys="false"
          should_list_caches="false"
          should_cleanup_caches="false"
          should_summarize_caches="true"

          case "$mode" in
            all)
              should_build_keys="true"
              should_list_caches="true"
              should_cleanup_caches="true"
              ;;
            build-keys)
              should_build_keys="true"
              ;;
            list)
              should_list_caches="true"
              ;;
            cleanup)
              should_list_caches="true"
              should_cleanup_caches="true"
              ;;
            summarize-only)
              should_summarize_caches="true"
              ;;
            *)
              echo "::error::Unsupported cache maintenance mode: $mode"
              exit 1
              ;;
          esac

          if [[ "$EVENT_NAME" == "schedule" ]]; then
            mode="all"
            dry_run="false"
            cleanup_enabled="true"
            should_build_keys="true"
            should_list_caches="true"
            should_cleanup_caches="true"
            should_summarize_caches="true"
          fi

          if [[ "$cleanup_enabled" != "true" ]]; then
            should_cleanup_caches="false"
          fi

          {
            echo "mode=$mode"
            echo "dry_run=$dry_run"
            echo "cleanup_enabled=$cleanup_enabled"
            echo "max_age_days=$max_age_days"
            echo "keep_recent=$keep_recent"
            echo "ref_filter=$ref_filter"
            echo "should_build_keys=$should_build_keys"
            echo "should_list_caches=$should_list_caches"
            echo "should_cleanup_caches=$should_cleanup_caches"
            echo "should_summarize_caches=$should_summarize_caches"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Aerealith AI Cache Maintenance"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Event | \`$EVENT_NAME\` |"
            echo "| Mode | \`$mode\` |"
            echo "| Dry run | \`$dry_run\` |"
            echo "| Cleanup enabled | \`$cleanup_enabled\` |"
            echo "| Max age days | \`$max_age_days\` |"
            echo "| Keep recent | \`$keep_recent\` |"
            echo "| Ref filter | \`${ref_filter:-none}\` |"
            echo "| Build keys | \`$should_build_keys\` |"
            echo "| List caches | \`$should_list_caches\` |"
            echo "| Cleanup caches | \`$should_cleanup_caches\` |"
            echo "| Summarize caches | \`$should_summarize_caches\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  cache-maintenance:
    name: Maintain caches
    runs-on: ubuntu-latest
    needs:
      - preflight

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      REPO_AUTOMATION_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}
      CACHE_MAINTENANCE_MODE: ${{ needs.preflight.outputs.mode }}
      CACHE_MAINTENANCE_CLEANUP_ENABLED: ${{ needs.preflight.outputs.cleanup_enabled }}
      CACHE_MAINTENANCE_MAX_AGE_DAYS: ${{ needs.preflight.outputs.max_age_days }}
      CACHE_MAINTENANCE_KEEP_RECENT: ${{ needs.preflight.outputs.keep_recent }}
      CACHE_MAINTENANCE_REF_FILTER: ${{ needs.preflight.outputs.ref_filter }}
      CACHE_MAINTENANCE_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}
      CACHE_OUTPUT_DIR: artifacts/cache
      CACHE_SUMMARY_OUTPUT_DIR: artifacts/cache

    steps:
      - name: Checkout repository automation
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare cache output directory
        run: |
          set -euo pipefail

          mkdir -p "$CACHE_MAINTENANCE_OUTPUT_DIR"

      - name: Build cache keys
        if: needs.preflight.outputs.should_build_keys == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/cache/build-cache-keys.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/cache/build-cache-keys.js"
            exit 0
          fi

          node ".github/scripts/cache/build-cache-keys.js"

      - name: List GitHub Actions caches
        if: needs.preflight.outputs.should_list_caches == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/cache/list-caches.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/cache/list-caches.js"
            exit 0
          fi

          node ".github/scripts/cache/list-caches.js"

      - name: Cleanup GitHub Actions caches
        if: needs.preflight.outputs.should_cleanup_caches == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/cache/cleanup-caches.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/cache/cleanup-caches.js"
            exit 0
          fi

          node ".github/scripts/cache/cleanup-caches.js"

      - name: Summarize cache maintenance
        if: always() && needs.preflight.outputs.should_summarize_caches == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/cache/summarize-caches.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/cache/summarize-caches.js"
            exit 0
          fi

          node ".github/scripts/cache/summarize-caches.js"

      - name: Write cache maintenance output summary
        if: always()
        run: |
          set -euo pipefail

          {
            echo "## Cache Maintenance Output"
            echo ""
            echo "| File | Size |"
            echo "|---|---:|"

            if [[ -d "$CACHE_MAINTENANCE_OUTPUT_DIR" ]]; then
              while IFS= read -r file; do
                size="$(wc -c < "$file" | xargs)"
                echo "| \`$file\` | \`$size\` bytes |"
              done < <(find "$CACHE_MAINTENANCE_OUTPUT_DIR" -type f | sort)
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cache maintenance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cache-maintenance-${{ github.run_id }}
          path: |
            artifacts/cache/**
          if-no-files-found: ignore
          retention-days: 14

  finalize:
    name: Finalize
    runs-on: ubuntu-latest
    needs:
      - preflight
      - cache-maintenance

    if: always()

    steps:
      - name: Write final cache maintenance summary
        run: |
          set -euo pipefail

          {
            echo "## Aerealith AI Cache Maintenance Result"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Preflight | \`${{ needs.preflight.result }}\` |"
            echo "| Cache maintenance | \`${{ needs.cache-maintenance.result }}\` |"
            echo ""
            echo "| Decision | Value |"
            echo "|---|---|"
            echo "| Mode | \`${{ needs.preflight.outputs.mode }}\` |"
            echo "| Dry run | \`${{ needs.preflight.outputs.dry_run }}\` |"
            echo "| Cleanup enabled | \`${{ needs.preflight.outputs.cleanup_enabled }}\` |"
            echo "| Max age days | \`${{ needs.preflight.outputs.max_age_days }}\` |"
            echo "| Keep recent | \`${{ needs.preflight.outputs.keep_recent }}\` |"
            echo "| Ref filter | \`${{ needs.preflight.outputs.ref_filter || 'none' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
