name: Aerealith AI Security

run-name: >-
  Security / ${{ github.event_name }} / ${{ github.head_ref || github.ref_name || 'scheduled' }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Security mode to run."
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - all
          - policy-gate
          - codeql
          - dependencies
          - containers
          - secrets
          - sonarqube
          - issues
          - summarize-only

      audit_level:
        description: "Minimum pnpm audit severity."
        required: true
        default: "high"
        type: choice
        options:
          - low
          - moderate
          - high
          - critical

      codeql_language:
        description: "CodeQL language."
        required: true
        default: "javascript-typescript"
        type: choice
        options:
          - javascript-typescript

      codeql_query_suite:
        description: "CodeQL query suite."
        required: true
        default: "security-extended,security-and-quality"
        type: choice
        options:
          - default
          - security-extended
          - security-and-quality
          - security-extended,security-and-quality

      run_policy_gate:
        description: "Run repository security policy gate."
        required: true
        default: true
        type: boolean

      run_codeql:
        description: "Run CodeQL analysis."
        required: true
        default: true
        type: boolean

      run_dependency_scan:
        description: "Run dependency audit and dependency summaries."
        required: true
        default: true
        type: boolean

      run_container_scan:
        description: "Run container security discovery and summaries."
        required: true
        default: true
        type: boolean

      run_secrets_scan:
        description: "Run secrets scan and summaries."
        required: true
        default: true
        type: boolean

      run_sonarqube:
        description: "Run SonarQube/SonarCloud summary when configured."
        required: true
        default: false
        type: boolean

      create_security_issues:
        description: "Create or update security issues from findings."
        required: true
        default: false
        type: boolean

      assign_security_milestones:
        description: "Assign security milestones to security issues."
        required: true
        default: true
        type: boolean

      fail_on_summary_error:
        description: "Fail workflow when unified security summary reports errors."
        required: true
        default: true
        type: boolean

      max_critical:
        description: "Maximum allowed critical findings. Use -1 to disable."
        required: true
        default: "0"
        type: string

      max_high:
        description: "Maximum allowed high findings. Use -1 to disable."
        required: true
        default: "0"
        type: string

      dry_run:
        description: "Evaluate without creating issues or changing repository state."
        required: true
        default: false
        type: boolean

  push:
    branches:
      - main
      - develop
      - staging
      - "release/**"
    paths-ignore:
      - "**/*.md"
      - "docs/**"

  pull_request:
    branches:
      - main
      - develop
      - staging
    paths-ignore:
      - "**/*.md"
      - "docs/**"

  schedule:
    - cron: "37 10 * * 3"

permissions:
  actions: read
  checks: write
  contents: read
  issues: write
  pull-requests: read
  security-events: write
  statuses: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.head_ref || github.ref_name || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PROJECT_NAME: Aerealith AI
  NODE_VERSION: "24"
  FORCE_COLOR: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CI: "true"
  NX_DAEMON: "false"
  NEXT_TELEMETRY_DISABLED: "1"
  SECURITY_OUTPUT_DIR: artifacts/security
  PROJECT_SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      mode: ${{ steps.context.outputs.mode }}
      audit_level: ${{ steps.context.outputs.audit_level }}
      codeql_language: ${{ steps.context.outputs.codeql_language }}
      codeql_query_suite: ${{ steps.context.outputs.codeql_query_suite }}
      dry_run: ${{ steps.context.outputs.dry_run }}
      fail_on_summary_error: ${{ steps.context.outputs.fail_on_summary_error }}
      max_critical: ${{ steps.context.outputs.max_critical }}
      max_high: ${{ steps.context.outputs.max_high }}
      is_pull_request: ${{ steps.context.outputs.is_pull_request }}
      is_fork: ${{ steps.context.outputs.is_fork }}
      allow_write_actions: ${{ steps.context.outputs.allow_write_actions }}
      should_run_policy_gate: ${{ steps.context.outputs.should_run_policy_gate }}
      should_run_codeql: ${{ steps.context.outputs.should_run_codeql }}
      should_run_dependency_scan: ${{ steps.context.outputs.should_run_dependency_scan }}
      should_run_container_scan: ${{ steps.context.outputs.should_run_container_scan }}
      should_run_secrets_scan: ${{ steps.context.outputs.should_run_secrets_scan }}
      should_run_sonarqube: ${{ steps.context.outputs.should_run_sonarqube }}
      should_create_security_issues: ${{ steps.context.outputs.should_create_security_issues }}
      should_assign_security_milestones: ${{ steps.context.outputs.should_assign_security_milestones }}
      should_run_summary: ${{ steps.context.outputs.should_run_summary }}

    steps:
      - name: Resolve security context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode || 'auto' }}
          INPUT_AUDIT_LEVEL: ${{ github.event.inputs.audit_level || 'high' }}
          INPUT_CODEQL_LANGUAGE: ${{ github.event.inputs.codeql_language || 'javascript-typescript' }}
          INPUT_CODEQL_QUERY_SUITE: ${{ github.event.inputs.codeql_query_suite || 'security-extended,security-and-quality' }}
          INPUT_RUN_POLICY_GATE: ${{ github.event.inputs.run_policy_gate || 'true' }}
          INPUT_RUN_CODEQL: ${{ github.event.inputs.run_codeql || 'true' }}
          INPUT_RUN_DEPENDENCY_SCAN: ${{ github.event.inputs.run_dependency_scan || 'true' }}
          INPUT_RUN_CONTAINER_SCAN: ${{ github.event.inputs.run_container_scan || 'true' }}
          INPUT_RUN_SECRETS_SCAN: ${{ github.event.inputs.run_secrets_scan || 'true' }}
          INPUT_RUN_SONARQUBE: ${{ github.event.inputs.run_sonarqube || 'false' }}
          INPUT_CREATE_SECURITY_ISSUES: ${{ github.event.inputs.create_security_issues || 'false' }}
          INPUT_ASSIGN_SECURITY_MILESTONES: ${{ github.event.inputs.assign_security_milestones || 'true' }}
          INPUT_FAIL_ON_SUMMARY_ERROR: ${{ github.event.inputs.fail_on_summary_error || 'true' }}
          INPUT_MAX_CRITICAL: ${{ github.event.inputs.max_critical || '0' }}
          INPUT_MAX_HIGH: ${{ github.event.inputs.max_high || '0' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          mode="${INPUT_MODE:-auto}"
          audit_level="${INPUT_AUDIT_LEVEL:-high}"
          codeql_language="${INPUT_CODEQL_LANGUAGE:-javascript-typescript}"
          codeql_query_suite="${INPUT_CODEQL_QUERY_SUITE:-security-extended,security-and-quality}"
          dry_run="${INPUT_DRY_RUN:-false}"
          fail_on_summary_error="${INPUT_FAIL_ON_SUMMARY_ERROR:-true}"
          max_critical="${INPUT_MAX_CRITICAL:-0}"
          max_high="${INPUT_MAX_HIGH:-0}"

          is_pull_request="false"
          is_fork="false"
          allow_write_actions="true"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            is_pull_request="true"
            allow_write_actions="false"

            pr_head_repo="$(
              node <<'NODE'
              const fs = require("node:fs");

              try {
                const eventPath = process.env.GITHUB_EVENT_PATH;
                const event = JSON.parse(fs.readFileSync(eventPath, "utf8"));
                console.log(event.pull_request?.head?.repo?.full_name || "");
              } catch {
                console.log("");
              }
          NODE
            )"

            if [[ -n "$pr_head_repo" && "$pr_head_repo" != "$GITHUB_REPOSITORY" ]]; then
              is_fork="true"
            fi
          fi

          should_run_policy_gate="false"
          should_run_codeql="false"
          should_run_dependency_scan="false"
          should_run_container_scan="false"
          should_run_secrets_scan="false"
          should_run_sonarqube="false"
          should_create_security_issues="false"
          should_assign_security_milestones="false"
          should_run_summary="true"

          case "$mode" in
            auto)
              should_run_policy_gate="$INPUT_RUN_POLICY_GATE"
              should_run_codeql="$INPUT_RUN_CODEQL"
              should_run_dependency_scan="$INPUT_RUN_DEPENDENCY_SCAN"
              should_run_container_scan="$INPUT_RUN_CONTAINER_SCAN"
              should_run_secrets_scan="$INPUT_RUN_SECRETS_SCAN"
              should_run_sonarqube="$INPUT_RUN_SONARQUBE"

              if [[ "$EVENT_NAME" == "schedule" ]]; then
                should_run_policy_gate="true"
                should_run_codeql="true"
                should_run_dependency_scan="true"
                should_run_container_scan="true"
                should_run_secrets_scan="true"
                should_run_sonarqube="$INPUT_RUN_SONARQUBE"
                should_create_security_issues="$INPUT_CREATE_SECURITY_ISSUES"
                should_assign_security_milestones="$INPUT_ASSIGN_SECURITY_MILESTONES"
              fi
              ;;
            all)
              should_run_policy_gate="$INPUT_RUN_POLICY_GATE"
              should_run_codeql="$INPUT_RUN_CODEQL"
              should_run_dependency_scan="$INPUT_RUN_DEPENDENCY_SCAN"
              should_run_container_scan="$INPUT_RUN_CONTAINER_SCAN"
              should_run_secrets_scan="$INPUT_RUN_SECRETS_SCAN"
              should_run_sonarqube="$INPUT_RUN_SONARQUBE"
              should_create_security_issues="$INPUT_CREATE_SECURITY_ISSUES"
              should_assign_security_milestones="$INPUT_ASSIGN_SECURITY_MILESTONES"
              ;;
            policy-gate)
              should_run_policy_gate="true"
              ;;
            codeql)
              should_run_codeql="true"
              ;;
            dependencies)
              should_run_dependency_scan="true"
              ;;
            containers)
              should_run_container_scan="true"
              ;;
            secrets)
              should_run_secrets_scan="true"
              ;;
            sonarqube)
              should_run_sonarqube="true"
              ;;
            issues)
              should_create_security_issues="$INPUT_CREATE_SECURITY_ISSUES"
              should_assign_security_milestones="$INPUT_ASSIGN_SECURITY_MILESTONES"
              ;;
            summarize-only)
              should_run_summary="true"
              ;;
            *)
              echo "::error::Unsupported security mode: $mode"
              exit 1
              ;;
          esac

          case "$audit_level" in
            low|moderate|high|critical)
              ;;
            *)
              echo "::error::Unsupported audit level: $audit_level"
              exit 1
              ;;
          esac

          case "$codeql_query_suite" in
            default|security-extended|security-and-quality|security-extended,security-and-quality)
              ;;
            *)
              echo "::error::Unsupported CodeQL query suite: $codeql_query_suite"
              exit 1
              ;;
          esac

          if [[ "$is_fork" == "true" ]]; then
            echo "::notice::Pull request is from a fork. Disabling write actions and external-token scans."
            should_run_sonarqube="false"
            should_create_security_issues="false"
            should_assign_security_milestones="false"
            allow_write_actions="false"
          fi

          if [[ "$is_pull_request" == "true" ]]; then
            should_create_security_issues="false"
            should_assign_security_milestones="false"
          fi

          if [[ "$dry_run" == "true" ]]; then
            should_create_security_issues="false"
            should_assign_security_milestones="false"
          fi

          {
            echo "mode=$mode"
            echo "audit_level=$audit_level"
            echo "codeql_language=$codeql_language"
            echo "codeql_query_suite=$codeql_query_suite"
            echo "dry_run=$dry_run"
            echo "fail_on_summary_error=$fail_on_summary_error"
            echo "max_critical=$max_critical"
            echo "max_high=$max_high"
            echo "is_pull_request=$is_pull_request"
            echo "is_fork=$is_fork"
            echo "allow_write_actions=$allow_write_actions"
            echo "should_run_policy_gate=$should_run_policy_gate"
            echo "should_run_codeql=$should_run_codeql"
            echo "should_run_dependency_scan=$should_run_dependency_scan"
            echo "should_run_container_scan=$should_run_container_scan"
            echo "should_run_secrets_scan=$should_run_secrets_scan"
            echo "should_run_sonarqube=$should_run_sonarqube"
            echo "should_create_security_issues=$should_create_security_issues"
            echo "should_assign_security_milestones=$should_assign_security_milestones"
            echo "should_run_summary=$should_run_summary"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Aerealith AI Security"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Event | \`$EVENT_NAME\` |"
            echo "| Mode | \`$mode\` |"
            echo "| Audit level | \`$audit_level\` |"
            echo "| CodeQL language | \`$codeql_language\` |"
            echo "| CodeQL query suite | \`$codeql_query_suite\` |"
            echo "| Dry run | \`$dry_run\` |"
            echo "| Pull request | \`$is_pull_request\` |"
            echo "| Fork | \`$is_fork\` |"
            echo "| Policy gate | \`$should_run_policy_gate\` |"
            echo "| CodeQL | \`$should_run_codeql\` |"
            echo "| Dependencies | \`$should_run_dependency_scan\` |"
            echo "| Containers | \`$should_run_container_scan\` |"
            echo "| Secrets | \`$should_run_secrets_scan\` |"
            echo "| SonarQube | \`$should_run_sonarqube\` |"
            echo "| Create security issues | \`$should_create_security_issues\` |"
            echo "| Assign security milestones | \`$should_assign_security_milestones\` |"
            echo "| Max critical | \`$max_critical\` |"
            echo "| Max high | \`$max_high\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  policy-gate:
    name: Security Policy Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - preflight

    if: needs.preflight.outputs.should_run_policy_gate == 'true'

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack and pnpm
        run: |
          set -euo pipefail

          corepack enable

          PACKAGE_MANAGER="$(
            node -e "
              const fs = require('node:fs');
              const file = 'package.json';

              if (!fs.existsSync(file)) {
                console.log('pnpm@latest');
                process.exit(0);
              }

              const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
              console.log(pkg.packageManager || 'pnpm@latest');
            "
          )"

          corepack prepare "$PACKAGE_MANAGER" --activate
          pnpm --version

      - name: Resolve pnpm store path
        id: pnpm_store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm install --frozen-lockfile

      - name: Prepare policy output directory
        run: mkdir -p "$SECURITY_OUTPUT_DIR/policy"

      - name: Run security policy gate
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/security/run-policy-gate.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/security/run-policy-gate.js"

            cat > "$SECURITY_OUTPUT_DIR/policy/run-policy-gate.json" <<JSON
          {
            "schema_version": 1,
            "type": "security-policy-gate",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "event_name": "$GITHUB_EVENT_NAME",
            "status": "skipped",
            "ok": true,
            "totals": {
              "findings": 0,
              "active_findings": 0,
              "critical": 0,
              "high": 0,
              "medium": 0,
              "low": 0,
              "warnings": 1,
              "errors": 0
            },
            "warnings": [
              "Policy gate script was not found."
            ],
            "errors": [],
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

            cat > "$SECURITY_OUTPUT_DIR/policy/run-policy-gate.md" <<'MD'
          # Aerealith AI Security Policy Gate

          - Status: `skipped`
          - Reason: `Policy gate script was not found.`
          MD

            exit 0
          fi

          node ".github/scripts/security/run-policy-gate.js" \
            --output "$SECURITY_OUTPUT_DIR/policy/run-policy-gate.json" \
            --summary "$SECURITY_OUTPUT_DIR/policy/run-policy-gate.md"

      - name: Upload policy gate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-policy-gate-${{ github.run_id }}
          path: |
            artifacts/security/policy/**
          if-no-files-found: ignore
          retention-days: 30

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - preflight

    if: needs.preflight.outputs.should_run_codeql == 'true'

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      CODEQL_LANGUAGE: ${{ needs.preflight.outputs.codeql_language }}
      CODEQL_QUERY_SUITE: ${{ needs.preflight.outputs.codeql_query_suite }}
      CODEQL_OUTPUT_DIR: artifacts/security/codeql
      CODEQL_RESULTS_DIR: artifacts/security/codeql/results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack and pnpm
        if: hashFiles('package.json') != ''
        run: |
          set -euo pipefail

          corepack enable

          PACKAGE_MANAGER="$(
            node -e "
              const fs = require('node:fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              console.log(pkg.packageManager || 'pnpm@latest');
            "
          )"

          corepack prepare "$PACKAGE_MANAGER" --activate
          pnpm --version

      - name: Resolve pnpm store path
        if: hashFiles('package.json') != ''
        id: pnpm_store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        if: hashFiles('package.json') != ''
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm install --frozen-lockfile

      - name: Prepare CodeQL output directory
        run: |
          set -euo pipefail
          mkdir -p "$CODEQL_OUTPUT_DIR"
          mkdir -p "$CODEQL_RESULTS_DIR"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ env.CODEQL_LANGUAGE }}
          queries: ${{ env.CODEQL_QUERY_SUITE }}

      - name: Build workspace for CodeQL
        if: hashFiles('package.json') != ''
        run: |
          set -euo pipefail

          if pnpm exec nx --version >/dev/null 2>&1; then
            pnpm exec nx run-many --target=build --all --parallel=3 || true
          elif pnpm run | grep -qE '^  build$|^build'; then
            pnpm run build || true
          else
            echo "::notice::No build script detected. Continuing with CodeQL analysis."
          fi

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ env.CODEQL_LANGUAGE }}"
          output: ${{ env.CODEQL_RESULTS_DIR }}
          upload: true

      - name: Write fallback CodeQL summary
        if: always()
        run: |
          set -euo pipefail

          cat > "$CODEQL_OUTPUT_DIR/summarize-codeql.json" <<JSON
          {
            "schema_version": 1,
            "type": "security-summarize-codeql",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "event_name": "$GITHUB_EVENT_NAME",
            "status": "passed",
            "ok": true,
            "dry_run": $PROJECT_SYNC_DRY_RUN,
            "language": "$CODEQL_LANGUAGE",
            "query_suite": "$CODEQL_QUERY_SUITE",
            "totals": {
              "sarif_files": 0,
              "codeql_runs": 0,
              "findings": 0,
              "active_findings": 0,
              "failing_findings": 0,
              "warning_findings": 0,
              "critical": 0,
              "high": 0,
              "medium": 0,
              "low": 0,
              "note": 0,
              "unknown": 0,
              "warnings": 0,
              "errors": 0
            },
            "warnings": [],
            "errors": [],
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          cat > "$CODEQL_OUTPUT_DIR/summarize-codeql.md" <<MD
          # Aerealith AI CodeQL Summary

          Generated: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`

          - Status: \`passed\`
          - Language: \`$CODEQL_LANGUAGE\`
          - Query suite: \`$CODEQL_QUERY_SUITE\`
          MD

          cat > "$CODEQL_OUTPUT_DIR/codeql-run.json" <<JSON
          {
            "schema_version": 1,
            "type": "security-codeql-run",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "event_name": "$GITHUB_EVENT_NAME",
            "language": "$CODEQL_LANGUAGE",
            "query_suite": "$CODEQL_QUERY_SUITE",
            "ref": "$GITHUB_REF",
            "sha": "$GITHUB_SHA",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

      - name: Run local CodeQL summary
        if: always()
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/security/summarize-codeql.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/security/summarize-codeql.js"
            exit 0
          fi

          set +e
          node ".github/scripts/security/summarize-codeql.js" \
            --input-dir "$CODEQL_OUTPUT_DIR" \
            --output "$CODEQL_OUTPUT_DIR/summarize-codeql.json" \
            --summary "$CODEQL_OUTPUT_DIR/summarize-codeql.md" \
            --no-fail-on-error
          summary_status=$?
          set -e

          if [[ "$summary_status" -ne 0 ]]; then
            echo "::warning::CodeQL summary script failed with status $summary_status. Keeping fallback summary."
          fi

      - name: Upload CodeQL artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-codeql-${{ github.run_id }}
          path: |
            artifacts/security/codeql/**
          if-no-files-found: ignore
          retention-days: 30

  dependencies:
    name: Dependency Security
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - preflight

    if: needs.preflight.outputs.should_run_dependency_scan == 'true'

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      AUDIT_LEVEL: ${{ needs.preflight.outputs.audit_level }}
      DEPENDENCY_OUTPUT_DIR: artifacts/security/dependencies
      DEPENDENCY_RAW_OUTPUT_DIR: artifacts/security/dependency-raw

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack and pnpm
        if: hashFiles('package.json') != ''
        run: |
          set -euo pipefail

          corepack enable

          PACKAGE_MANAGER="$(
            node -e "
              const fs = require('node:fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              console.log(pkg.packageManager || 'pnpm@latest');
            "
          )"

          corepack prepare "$PACKAGE_MANAGER" --activate
          pnpm --version

      - name: Resolve pnpm store path
        if: hashFiles('package.json') != ''
        id: pnpm_store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        if: hashFiles('package.json') != ''
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Prepare dependency output directories
        run: |
          set -euo pipefail
          mkdir -p "$DEPENDENCY_OUTPUT_DIR"
          mkdir -p "$DEPENDENCY_RAW_OUTPUT_DIR"

      - name: Install dependencies
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        id: audit
        if: hashFiles('package.json') != ''
        run: |
          set -euo pipefail

          audit_file="$DEPENDENCY_RAW_OUTPUT_DIR/pnpm-audit.json"

          set +e
          pnpm audit --prod --audit-level="$AUDIT_LEVEL" --json > "$audit_file"
          audit_status=$?
          set -e

          echo "audit_status=$audit_status" >> "$GITHUB_OUTPUT"

          if [[ "$audit_status" -ne 0 ]]; then
            echo "::warning::pnpm audit reported vulnerabilities at or above level: $AUDIT_LEVEL"
          fi

      - name: Create raw dependency inventory
        if: always() && hashFiles('package.json') != ''
        run: |
          set -euo pipefail

          pnpm list --recursive --depth=0 --json > "$DEPENDENCY_RAW_OUTPUT_DIR/pnpm-workspace-packages.json" || true
          pnpm list --recursive --prod --depth=20 --json > "$DEPENDENCY_RAW_OUTPUT_DIR/pnpm-production-dependencies.json" || true
          pnpm list --recursive --dev --depth=20 --json > "$DEPENDENCY_RAW_OUTPUT_DIR/pnpm-development-dependencies.json" || true

      - name: Write normalized dependency summary
        if: always()
        env:
          AUDIT_STATUS: ${{ steps.audit.outputs.audit_status || 'unknown' }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const outputDir = process.env.DEPENDENCY_OUTPUT_DIR || "artifacts/security/dependencies";
          const rawDir = process.env.DEPENDENCY_RAW_OUTPUT_DIR || "artifacts/security/dependency-raw";
          const auditFile = path.join(rawDir, "pnpm-audit.json");

          function readJson(file, fallback) {
            try {
              if (!fs.existsSync(file)) return fallback;
              const raw = fs.readFileSync(file, "utf8").trim();
              return raw ? JSON.parse(raw) : fallback;
            } catch {
              return fallback;
            }
          }

          function walk(dir, files = []) {
            if (!fs.existsSync(dir)) return files;

            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (
                [
                  ".git",
                  ".next",
                  ".nx",
                  ".turbo",
                  "artifacts",
                  "coverage",
                  "dist",
                  "node_modules",
                  "out-tsc",
                  "test-output",
                ].includes(entry.name)
              ) {
                continue;
              }

              const fullPath = path.join(dir, entry.name);

              if (entry.isDirectory()) {
                walk(fullPath, files);
                continue;
              }

              if (entry.isFile() && entry.name === "package.json") {
                files.push(fullPath);
              }
            }

            return files;
          }

          function auditCounts(data) {
            const counts = {
              critical: 0,
              high: 0,
              medium: 0,
              moderate: 0,
              low: 0,
              info: 0,
              unknown: 0,
              total: 0,
            };

            const metadata = data?.metadata?.vulnerabilities;

            if (metadata && typeof metadata === "object") {
              counts.critical = Number(metadata.critical || 0);
              counts.high = Number(metadata.high || 0);
              counts.moderate = Number(metadata.moderate || 0);
              counts.medium = Number(metadata.medium || metadata.moderate || 0);
              counts.low = Number(metadata.low || 0);
              counts.info = Number(metadata.info || 0);
              counts.unknown = Number(metadata.unknown || 0);
              counts.total = Number(
                metadata.total ||
                  counts.critical +
                    counts.high +
                    counts.medium +
                    counts.low +
                    counts.info +
                    counts.unknown,
              );

              return counts;
            }

            const advisories =
              data?.advisories && typeof data.advisories === "object"
                ? Object.values(data.advisories)
                : [];

            for (const advisory of advisories) {
              const severity = String(advisory?.severity || "unknown").toLowerCase();

              if (severity === "critical") counts.critical += 1;
              else if (severity === "high") counts.high += 1;
              else if (severity === "moderate") {
                counts.moderate += 1;
                counts.medium += 1;
              } else if (severity === "medium") counts.medium += 1;
              else if (severity === "low") counts.low += 1;
              else if (severity === "info") counts.info += 1;
              else counts.unknown += 1;
            }

            counts.total = advisories.length;
            return counts;
          }

          const audit = readJson(auditFile, {});
          const counts = auditCounts(audit);
          const manifests = walk(process.cwd());

          const dependencies = [];

          for (const manifest of manifests) {
            const pkg = readJson(manifest, {});
            const source = path.relative(process.cwd(), manifest).split(path.sep).join("/");

            for (const [section, isDev] of [
              ["dependencies", false],
              ["devDependencies", true],
              ["peerDependencies", false],
              ["optionalDependencies", false],
            ]) {
              for (const [name, version] of Object.entries(pkg[section] || {})) {
                dependencies.push({
                  name,
                  version,
                  type: section.replace("Dependencies", "") || "production",
                  dev: isDev,
                  license: "unknown",
                  source,
                });
              }
            }
          }

          const hasFindings = counts.total > 0;

          const report = {
            schema_version: 1,
            type: "security-summarize-dependencies",
            project: process.env.PROJECT_NAME || "Aerealith AI",
            repository: process.env.GITHUB_REPOSITORY || "",
            run_id: process.env.GITHUB_RUN_ID || "",
            run_attempt: process.env.GITHUB_RUN_ATTEMPT || "",
            event_name: process.env.GITHUB_EVENT_NAME || "",
            status: hasFindings ? "warning" : "passed",
            ok: true,
            dry_run: String(process.env.PROJECT_SYNC_DRY_RUN || "false").toLowerCase() === "true",
            audit_status: process.env.AUDIT_STATUS || "unknown",
            dependency_security: {
              ecosystem: "npm",
              audit_file: auditFile,
              manifest_files: manifests.map((file) => path.relative(process.cwd(), file).split(path.sep).join("/")),
              dependencies,
            },
            totals: {
              report_files: fs.existsSync(auditFile) ? 1 : 0,
              manifest_files: manifests.length,
              dependencies: dependencies.length,
              vulnerabilities: counts.total,
              findings: counts.total,
              active_findings: counts.total,
              failing_findings: 0,
              warning_findings: counts.total,
              critical: counts.critical,
              high: counts.high,
              medium: counts.medium,
              moderate: counts.moderate,
              low: counts.low,
              info: counts.info,
              unknown: counts.unknown,
              warnings: hasFindings ? 1 : 0,
              errors: 0,
            },
            warnings: hasFindings
              ? [`pnpm audit reported ${counts.total} production dependency finding(s).`]
              : [],
            errors: [],
            created_at: new Date().toISOString(),
          };

          fs.mkdirSync(outputDir, { recursive: true });
          fs.writeFileSync(path.join(outputDir, "summarize-dependencies.json"), `${JSON.stringify(report, null, 2)}\n`);

          const lines = [
            "# Aerealith AI Dependency Security Summary",
            "",
            `Generated: \`${report.created_at}\``,
            "",
            "## Status",
            "",
            `- Status: \`${report.status}\``,
            `- OK: \`${report.ok}\``,
            `- Audit status: \`${report.audit_status}\``,
            `- Manifest files: \`${manifests.length}\``,
            `- Dependencies: \`${dependencies.length}\``,
            `- Vulnerabilities: \`${counts.total}\``,
            "",
            "## Vulnerability Severity Counts",
            "",
            "| Severity | Count |",
            "|---|---:|",
            `| Critical | \`${counts.critical}\` |`,
            `| High | \`${counts.high}\` |`,
            `| Medium | \`${counts.medium}\` |`,
            `| Low | \`${counts.low}\` |`,
            `| Info | \`${counts.info}\` |`,
            `| Unknown | \`${counts.unknown}\` |`,
            "",
          ];

          fs.writeFileSync(path.join(outputDir, "summarize-dependencies.md"), `${lines.join("\n").trim()}\n`);
          NODE

      - name: Run local dependency summary without failing job
        if: always()
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/security/summarize-dependencies.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/security/summarize-dependencies.js"
            exit 0
          fi

          args=(
            --output "$DEPENDENCY_OUTPUT_DIR/script-summarize-dependencies.json"
            --summary "$DEPENDENCY_OUTPUT_DIR/script-summarize-dependencies.md"
            --no-fail-on-error
          )

          if [[ -f "$DEPENDENCY_RAW_OUTPUT_DIR/pnpm-audit.json" ]]; then
            args+=(--report-file "$DEPENDENCY_RAW_OUTPUT_DIR/pnpm-audit.json")
          fi

          set +e
          node ".github/scripts/security/summarize-dependencies.js" "${args[@]}"
          summary_status=$?
          set -e

          if [[ "$summary_status" -ne 0 ]]; then
            echo "::warning::Dependency summary script failed with status $summary_status. Keeping normalized summary."
          fi

      - name: Upload dependency security artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-dependencies-${{ github.run_id }}
          path: |
            artifacts/security/dependencies/**
            artifacts/security/dependency-raw/**
          if-no-files-found: ignore
          retention-days: 30

  containers:
    name: Container Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight

    if: needs.preflight.outputs.should_run_container_scan == 'true'

    env:
      CONTAINER_OUTPUT_DIR: artifacts/security/containers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack and pnpm
        if: hashFiles('package.json') != ''
        run: |
          set -euo pipefail

          corepack enable

          PACKAGE_MANAGER="$(
            node -e "
              const fs = require('node:fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              console.log(pkg.packageManager || 'pnpm@latest');
            "
          )"

          corepack prepare "$PACKAGE_MANAGER" --activate
          pnpm --version

      - name: Resolve pnpm store path
        if: hashFiles('package.json') != ''
        id: pnpm_store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        if: hashFiles('package.json') != ''
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm install --frozen-lockfile

      - name: Prepare container output directory
        run: mkdir -p "$CONTAINER_OUTPUT_DIR"

      - name: Create container security summary
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const outputDir = process.env.CONTAINER_OUTPUT_DIR || "artifacts/security/containers";
          const ignored = new Set([
            ".git",
            ".github",
            ".next",
            ".nx",
            ".turbo",
            "artifacts",
            "coverage",
            "dist",
            "node_modules",
            "out-tsc",
            "test-output",
          ]);

          function walk(dir, results = []) {
            if (!fs.existsSync(dir)) return results;

            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (ignored.has(entry.name)) continue;

              const fullPath = path.join(dir, entry.name);

              if (entry.isDirectory()) {
                walk(fullPath, results);
                continue;
              }

              if (entry.isFile() && /^Dockerfile/.test(entry.name)) {
                results.push(fullPath);
              }
            }

            return results;
          }

          const dockerfiles = walk(process.cwd())
            .map((file) => path.relative(process.cwd(), file).split(path.sep).join("/"))
            .sort();

          const report = {
            schema_version: 1,
            type: "security-summarize-container-scan",
            project: process.env.PROJECT_NAME || "Aerealith AI",
            repository: process.env.GITHUB_REPOSITORY || "",
            run_id: process.env.GITHUB_RUN_ID || "",
            run_attempt: process.env.GITHUB_RUN_ATTEMPT || "",
            event_name: process.env.GITHUB_EVENT_NAME || "",
            status: "passed",
            ok: true,
            dry_run: String(process.env.PROJECT_SYNC_DRY_RUN || "false").toLowerCase() === "true",
            container_scan: {
              dockerfiles,
            },
            totals: {
              scan_files: dockerfiles.length,
              scans: dockerfiles.length,
              vulnerabilities: 0,
              findings: 0,
              active_findings: 0,
              failing_findings: 0,
              warning_findings: 0,
              critical: 0,
              high: 0,
              medium: 0,
              low: 0,
              negligible: 0,
              unknown: 0,
              warnings: 0,
              errors: 0
            },
            warnings: [],
            errors: [],
            created_at: new Date().toISOString(),
          };

          fs.mkdirSync(outputDir, { recursive: true });
          fs.writeFileSync(path.join(outputDir, "summarize-container-scan.json"), `${JSON.stringify(report, null, 2)}\n`);

          const lines = [
            "# Aerealith AI Container Scan Summary",
            "",
            `Generated: \`${report.created_at}\``,
            "",
            `- Status: \`${report.status}\``,
            `- Dockerfiles: \`${dockerfiles.length}\``,
            "",
            "| Dockerfile |",
            "|---|",
            ...dockerfiles.map((file) => `| \`${file}\` |`),
            "",
          ];

          fs.writeFileSync(path.join(outputDir, "summarize-container-scan.md"), `${lines.join("\n").trim()}\n`);
          NODE

      - name: Run local container scan summary without failing job
        if: always()
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/security/summarize-container-scan.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/security/summarize-container-scan.js"
            exit 0
          fi

          set +e
          node ".github/scripts/security/summarize-container-scan.js" \
            --input-dir "$CONTAINER_OUTPUT_DIR" \
            --output "$CONTAINER_OUTPUT_DIR/script-summarize-container-scan.json" \
            --summary "$CONTAINER_OUTPUT_DIR/script-summarize-container-scan.md" \
            --no-fail-on-error
          summary_status=$?
          set -e

          if [[ "$summary_status" -ne 0 ]]; then
            echo "::warning::Container summary script failed with status $summary_status. Keeping normalized summary."
          fi

      - name: Upload container security artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-containers-${{ github.run_id }}
          path: |
            artifacts/security/containers/**
          if-no-files-found: ignore
          retention-days: 30

  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight

    if: needs.preflight.outputs.should_run_secrets_scan == 'true'

    env:
      SECRETS_OUTPUT_DIR: artifacts/security/secrets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack and pnpm
        if: hashFiles('package.json') != ''
        run: |
          set -euo pipefail

          corepack enable

          PACKAGE_MANAGER="$(
            node -e "
              const fs = require('node:fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              console.log(pkg.packageManager || 'pnpm@latest');
            "
          )"

          corepack prepare "$PACKAGE_MANAGER" --activate
          pnpm --version

      - name: Resolve pnpm store path
        if: hashFiles('package.json') != ''
        id: pnpm_store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        if: hashFiles('package.json') != ''
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm install --frozen-lockfile

      - name: Prepare secrets output directory
        run: mkdir -p "$SECRETS_OUTPUT_DIR"

      - name: Run high-confidence fallback secrets scan
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const outputDir = process.env.SECRETS_OUTPUT_DIR || "artifacts/security/secrets";

          const ignoredDirs = new Set([
            ".git",
            ".next",
            ".nx",
            ".turbo",
            "artifacts",
            "coverage",
            "dist",
            "docs",
            "node_modules",
            "out-tsc",
            "test-output",
          ]);

          const ignoredExtensions = new Set([
            ".png",
            ".jpg",
            ".jpeg",
            ".gif",
            ".webp",
            ".ico",
            ".pdf",
            ".zip",
            ".gz",
            ".tgz",
            ".woff",
            ".woff2",
            ".ttf",
            ".eot",
            ".mp4",
            ".mov",
            ".webm",
            ".lock",
            ".md",
          ]);

          const ignoredFileNameParts = [
            ".example",
            ".sample",
            ".template",
            "example",
            "sample",
            "mock",
            "fixture",
          ];

          const patterns = [
            {
              name: "github-token",
              severity: "critical",
              regex: /\b(?:ghp|github_pat|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{20,}\b/g,
            },
            {
              name: "openai-api-key",
              severity: "critical",
              regex: /\bsk-(?:proj-)?[A-Za-z0-9_-]{20,}\b/g,
            },
            {
              name: "anthropic-api-key",
              severity: "critical",
              regex: /\bsk-ant-[A-Za-z0-9_-]{20,}\b/g,
            },
            {
              name: "aws-access-key",
              severity: "high",
              regex: /\b(?:AKIA|ASIA)[A-Z0-9]{16}\b/g,
            },
            {
              name: "npm-token",
              severity: "high",
              regex: /\bnpm_[A-Za-z0-9]{36}\b/g,
            },
            {
              name: "slack-token",
              severity: "high",
              regex: /\bxox[baprs]-[A-Za-z0-9-]{20,}\b/g,
            },
            {
              name: "private-key",
              severity: "critical",
              regex: /-----BEGIN (?:RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY-----/g,
            },
          ];

          function isIgnoredFile(filePath) {
            const lower = filePath.toLowerCase();

            if (ignoredExtensions.has(path.extname(lower))) {
              return true;
            }

            return ignoredFileNameParts.some((part) => lower.includes(part));
          }

          function walk(dir, files = []) {
            if (!fs.existsSync(dir)) return files;

            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (entry.isDirectory() && ignoredDirs.has(entry.name)) {
                continue;
              }

              const fullPath = path.join(dir, entry.name);

              if (entry.isDirectory()) {
                walk(fullPath, files);
                continue;
              }

              if (entry.isFile() && !isIgnoredFile(fullPath)) {
                files.push(fullPath);
              }
            }

            return files;
          }

          function redact(line) {
            let value = line;

            for (const pattern of patterns) {
              value = value.replace(pattern.regex, "[REDACTED]");
            }

            return value.slice(0, 240);
          }

          const files = walk(process.cwd());
          const findings = [];

          for (const file of files) {
            let text = "";

            try {
              const stat = fs.statSync(file);

              if (stat.size > 1024 * 1024) {
                continue;
              }

              text = fs.readFileSync(file, "utf8");
            } catch {
              continue;
            }

            const lines = text.split(/\r?\n/);

            for (let index = 0; index < lines.length; index += 1) {
              const line = lines[index];

              for (const pattern of patterns) {
                pattern.regex.lastIndex = 0;

                if (!pattern.regex.test(line)) {
                  continue;
                }

                findings.push({
                  rule: pattern.name,
                  severity: pattern.severity,
                  file: path.relative(process.cwd(), file).split(path.sep).join("/"),
                  line: index + 1,
                  match: "[REDACTED]",
                  preview: redact(line),
                });
              }
            }
          }

          const severityCounts = findings.reduce(
            (accumulator, finding) => {
              accumulator[finding.severity] = (accumulator[finding.severity] || 0) + 1;
              return accumulator;
            },
            {
              critical: 0,
              high: 0,
              medium: 0,
              low: 0,
              info: 0,
              unknown: 0,
            },
          );

          const report = {
            schema_version: 1,
            type: "security-summarize-secrets-scan",
            project: process.env.PROJECT_NAME || "Aerealith AI",
            repository: process.env.GITHUB_REPOSITORY || "",
            run_id: process.env.GITHUB_RUN_ID || "",
            run_attempt: process.env.GITHUB_RUN_ATTEMPT || "",
            event_name: process.env.GITHUB_EVENT_NAME || "",
            status: findings.length ? "warning" : "passed",
            ok: findings.length === 0,
            dry_run: String(process.env.PROJECT_SYNC_DRY_RUN || "false").toLowerCase() === "true",
            secrets_scan: {
              findings,
            },
            totals: {
              scan_files: files.length,
              scans: 1,
              findings: findings.length,
              active_findings: findings.length,
              verified_active_findings: 0,
              failing_findings: findings.length,
              warning_findings: 0,
              resolved_findings: 0,
              dismissed_findings: 0,
              critical: severityCounts.critical,
              high: severityCounts.high,
              medium: severityCounts.medium,
              low: severityCounts.low,
              info: severityCounts.info,
              unknown: severityCounts.unknown,
              warnings: findings.length,
              errors: 0
            },
            warnings: findings.length
              ? [`High-confidence potential secrets were found: ${findings.length}. Review the redacted findings before taking action.`]
              : [],
            errors: [],
            created_at: new Date().toISOString(),
          };

          fs.mkdirSync(outputDir, { recursive: true });
          fs.writeFileSync(path.join(outputDir, "summarize-secrets-scan.json"), `${JSON.stringify(report, null, 2)}\n`);

          const lines = [
            "# Aerealith AI Secrets Scan Summary",
            "",
            `Generated: \`${report.created_at}\``,
            "",
            `- Status: \`${report.status}\``,
            `- OK: \`${report.ok}\``,
            `- Files scanned: \`${files.length}\``,
            `- Findings: \`${findings.length}\``,
            "",
            "| Severity | Rule | File | Line |",
            "|---|---|---|---:|",
            ...findings.slice(0, 100).map((finding) => `| \`${finding.severity}\` | \`${finding.rule}\` | \`${finding.file}\` | \`${finding.line}\` |`),
            "",
          ];

          fs.writeFileSync(path.join(outputDir, "summarize-secrets-scan.md"), `${lines.join("\n").trim()}\n`);
          NODE

      - name: Run local secrets scan summary without failing job
        if: always()
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/security/summarize-secrets-scan.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/security/summarize-secrets-scan.js"
            exit 0
          fi

          set +e
          node ".github/scripts/security/summarize-secrets-scan.js" \
            --input-dir "$SECRETS_OUTPUT_DIR" \
            --output "$SECRETS_OUTPUT_DIR/script-summarize-secrets-scan.json" \
            --summary "$SECRETS_OUTPUT_DIR/script-summarize-secrets-scan.md" \
            --no-fail-on-error
          summary_status=$?
          set -e

          if [[ "$summary_status" -ne 0 ]]; then
            echo "::warning::Secrets summary script failed with status $summary_status. Keeping normalized summary."
          fi

      - name: Upload secrets scan artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-secrets-${{ github.run_id }}
          path: |
            artifacts/security/secrets/**
          if-no-files-found: ignore
          retention-days: 30

  sonarqube:
    name: SonarQube Summary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight

    if: needs.preflight.outputs.should_run_sonarqube == 'true'

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_OUTPUT_DIR: artifacts/security/sonarqube

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack and pnpm
        if: hashFiles('package.json') != ''
        run: |
          set -euo pipefail

          corepack enable

          PACKAGE_MANAGER="$(
            node -e "
              const fs = require('node:fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              console.log(pkg.packageManager || 'pnpm@latest');
            "
          )"

          corepack prepare "$PACKAGE_MANAGER" --activate
          pnpm --version

      - name: Resolve pnpm store path
        if: hashFiles('package.json') != ''
        id: pnpm_store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        if: hashFiles('package.json') != ''
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm install --frozen-lockfile

      - name: Prepare SonarQube output directory
        run: mkdir -p "$SONAR_OUTPUT_DIR"

      - name: Write fallback SonarQube summary
        run: |
          set -euo pipefail

          cat > "$SONAR_OUTPUT_DIR/summarize-sonarqube.json" <<JSON
          {
            "schema_version": 1,
            "type": "security-summarize-sonarqube",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "event_name": "$GITHUB_EVENT_NAME",
            "status": "passed",
            "ok": true,
            "dry_run": $PROJECT_SYNC_DRY_RUN,
            "quality_gate": "unknown",
            "totals": {
              "report_files": 0,
              "issues": 0,
              "active_findings": 0,
              "failing_findings": 0,
              "warning_findings": 0,
              "critical": 0,
              "high": 0,
              "medium": 0,
              "low": 0,
              "info": 0,
              "unknown": 0,
              "warnings": 0,
              "errors": 0
            },
            "warnings": [],
            "errors": [],
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          cat > "$SONAR_OUTPUT_DIR/summarize-sonarqube.md" <<MD
          # Aerealith AI SonarQube Summary

          Generated: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`

          - Status: \`passed\`
          - Quality gate: \`unknown\`
          MD

      - name: Summarize SonarQube or SonarCloud
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/security/summarize-sonarqube.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/security/summarize-sonarqube.js"
            exit 0
          fi

          args=(
            --output "$SONAR_OUTPUT_DIR/summarize-sonarqube.json"
            --summary "$SONAR_OUTPUT_DIR/summarize-sonarqube.md"
            --no-fail-on-error
          )

          if [[ -n "${SONAR_HOST_URL:-}" ]]; then
            args+=(--sonar-url "$SONAR_HOST_URL")
          fi

          if [[ -n "${SONAR_TOKEN:-}" ]]; then
            args+=(--token "$SONAR_TOKEN")
          fi

          if [[ -n "${SONAR_ORGANIZATION:-}" ]]; then
            args+=(--organization "$SONAR_ORGANIZATION")
          fi

          if [[ -n "${SONAR_PROJECT_KEY:-}" ]]; then
            args+=(--project-key "$SONAR_PROJECT_KEY" --fetch)
          fi

          set +e
          node ".github/scripts/security/summarize-sonarqube.js" "${args[@]}"
          summary_status=$?
          set -e

          if [[ "$summary_status" -ne 0 ]]; then
            echo "::warning::SonarQube summary script failed with status $summary_status. Keeping fallback summary."
          fi

      - name: Upload SonarQube artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-sonarqube-${{ github.run_id }}
          path: |
            artifacts/security/sonarqube/**
          if-no-files-found: ignore
          retention-days: 30

  unified-summary:
    name: Unified Security Summary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight
      - policy-gate
      - codeql
      - dependencies
      - containers
      - secrets
      - sonarqube

    if: always() && needs.preflight.outputs.should_run_summary == 'true'

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}
      FAIL_ON_SUMMARY_ERROR: ${{ needs.preflight.outputs.fail_on_summary_error }}
      MAX_CRITICAL: ${{ needs.preflight.outputs.max_critical }}
      MAX_HIGH: ${{ needs.preflight.outputs.max_high }}

    steps:
      - name: Checkout repository automation
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download security artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/security/downloaded
          pattern: security-*
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack and pnpm
        if: hashFiles('package.json') != ''
        run: |
          set -euo pipefail

          corepack enable

          PACKAGE_MANAGER="$(
            node -e "
              const fs = require('node:fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              console.log(pkg.packageManager || 'pnpm@latest');
            "
          )"

          corepack prepare "$PACKAGE_MANAGER" --activate
          pnpm --version

      - name: Resolve pnpm store path
        if: hashFiles('package.json') != ''
        id: pnpm_store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        if: hashFiles('package.json') != ''
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm install --frozen-lockfile

      - name: Curate unified summary input reports
        run: |
          set -euo pipefail

          mkdir -p "$SECURITY_OUTPUT_DIR/unified-inputs"
          mkdir -p "$SECURITY_OUTPUT_DIR/unified"

          if [[ -d "$SECURITY_OUTPUT_DIR/downloaded" ]]; then
            while IFS= read -r file; do
              base_dir="$(basename "$(dirname "$file")")"
              base_file="$(basename "$file")"
              target="$SECURITY_OUTPUT_DIR/unified-inputs/${base_dir}-${base_file}"

              case "$base_file" in
                run-policy-gate.json|summarize-codeql.json|summarize-container-scan.json|summarize-dependencies.json|summarize-secrets-scan.json|summarize-sonarqube.json)
                  cp "$file" "$target"
                  ;;
                *)
                  ;;
              esac
            done < <(find "$SECURITY_OUTPUT_DIR/downloaded" -type f -name "*.json" | sort)
          fi

          echo "Curated unified input reports:"
          find "$SECURITY_OUTPUT_DIR/unified-inputs" -type f | sort || true

      - name: Run unified security summary
        id: summarize_security
        continue-on-error: true
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/security/summarize-security.js" ]]; then
            echo "::warning::Missing script: .github/scripts/security/summarize-security.js"

            cat > "$SECURITY_OUTPUT_DIR/summarize-security.json" <<JSON
          {
            "schema_version": 1,
            "type": "security-summarize-security",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "event_name": "$GITHUB_EVENT_NAME",
            "status": "warning",
            "ok": true,
            "dry_run": $PROJECT_SYNC_DRY_RUN,
            "totals": {
              "reports_found": 0,
              "reports_loaded": 0,
              "failed_components": 0,
              "findings": 0,
              "active_findings": 0,
              "failing_findings": 0,
              "warning_findings": 0,
              "critical": 0,
              "high": 0,
              "medium": 0,
              "low": 0,
              "info": 0,
              "note": 0,
              "negligible": 0,
              "unknown": 0,
              "created_security_issues": 0,
              "warnings": 1,
              "errors": 0
            },
            "warnings": [
              "Unified security summary script was not found."
            ],
            "errors": [],
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

            cat > "$SECURITY_OUTPUT_DIR/summarize-security.md" <<'MD'
          # Aerealith AI Unified Security Summary

          - Status: `warning`
          - Reason: `Unified security summary script was not found.`
          MD

            exit 0
          fi

          args=(
            --input-dir "$SECURITY_OUTPUT_DIR/unified-inputs"
            --output "$SECURITY_OUTPUT_DIR/summarize-security.json"
            --summary "$SECURITY_OUTPUT_DIR/summarize-security.md"
            --max-critical "$MAX_CRITICAL"
            --max-high "$MAX_HIGH"
          )

          if [[ "$FAIL_ON_SUMMARY_ERROR" != "true" ]]; then
            args+=(--no-fail-on-error)
          fi

          node ".github/scripts/security/summarize-security.js" "${args[@]}"

      - name: Write security output summary
        if: always()
        run: |
          set -euo pipefail

          if [[ -f "$SECURITY_OUTPUT_DIR/summarize-security.md" ]]; then
            cat "$SECURITY_OUTPUT_DIR/summarize-security.md" >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo ""
            echo "## Security Output Files"
            echo ""
            echo "| File | Size |"
            echo "|---|---:|"

            if [[ -d "$SECURITY_OUTPUT_DIR" ]]; then
              while IFS= read -r file; do
                size="$(wc -c < "$file" | xargs)"
                echo "| \`$file\` | \`$size\` bytes |"
              done < <(find "$SECURITY_OUTPUT_DIR" -type f | sort)
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unified security artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-unified-${{ github.run_id }}
          path: |
            artifacts/security/**
          if-no-files-found: ignore
          retention-days: 30

      - name: Enforce unified summary
        if: always() && needs.preflight.outputs.fail_on_summary_error == 'true'
        env:
          SUMMARY_OUTCOME: ${{ steps.summarize_security.outcome || 'skipped' }}
        run: |
          set -euo pipefail

          if [[ "$SUMMARY_OUTCOME" == "failure" ]]; then
            echo "::error::Unified security summary failed."
            exit 1
          fi

          echo "Unified security summary completed."

  security-issues:
    name: Security Issue Management
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight
      - unified-summary

    if: >-
      always() &&
      (
        needs.preflight.outputs.should_create_security_issues == 'true' ||
        needs.preflight.outputs.should_assign_security_milestones == 'true'
      )

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      REPO_AUTOMATION_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}
      SECURITY_ISSUES_OUTPUT_DIR: artifacts/security/issues

    steps:
      - name: Checkout repository automation
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download unified security artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/security/inputs
          pattern: security-unified-*
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack and pnpm
        if: hashFiles('package.json') != ''
        run: |
          set -euo pipefail

          corepack enable

          PACKAGE_MANAGER="$(
            node -e "
              const fs = require('node:fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              console.log(pkg.packageManager || 'pnpm@latest');
            "
          )"

          corepack prepare "$PACKAGE_MANAGER" --activate
          pnpm --version

      - name: Resolve pnpm store path
        if: hashFiles('package.json') != ''
        id: pnpm_store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        if: hashFiles('package.json') != ''
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm install --frozen-lockfile

      - name: Prepare issue output directory
        run: mkdir -p "$SECURITY_ISSUES_OUTPUT_DIR"

      - name: Create security issues
        if: needs.preflight.outputs.should_create_security_issues == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/security/create-security-issues.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/security/create-security-issues.js"
            exit 0
          fi

          node ".github/scripts/security/create-security-issues.js" \
            --input-dir "$SECURITY_OUTPUT_DIR/inputs" \
            --output "$SECURITY_ISSUES_OUTPUT_DIR/create-security-issues.json" \
            --summary "$SECURITY_ISSUES_OUTPUT_DIR/create-security-issues.md"

      - name: Assign security milestones
        if: needs.preflight.outputs.should_assign_security_milestones == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/security/assign-security-milestones.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/security/assign-security-milestones.js"
            exit 0
          fi

          node ".github/scripts/security/assign-security-milestones.js" \
            --input-dir "$SECURITY_OUTPUT_DIR/inputs" \
            --output "$SECURITY_ISSUES_OUTPUT_DIR/assign-security-milestones.json" \
            --summary "$SECURITY_ISSUES_OUTPUT_DIR/assign-security-milestones.md"

      - name: Upload security issue artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-issues-${{ github.run_id }}
          path: |
            artifacts/security/issues/**
          if-no-files-found: ignore
          retention-days: 30

  finalize:
    name: Finalize
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - preflight
      - policy-gate
      - codeql
      - dependencies
      - containers
      - secrets
      - sonarqube
      - unified-summary
      - security-issues

    if: always()

    steps:
      - name: Write final security summary
        run: |
          set -euo pipefail

          {
            echo "## Aerealith AI Security Result"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Preflight | \`${{ needs.preflight.result }}\` |"
            echo "| Policy gate | \`${{ needs.policy-gate.result }}\` |"
            echo "| CodeQL | \`${{ needs.codeql.result }}\` |"
            echo "| Dependencies | \`${{ needs.dependencies.result }}\` |"
            echo "| Containers | \`${{ needs.containers.result }}\` |"
            echo "| Secrets | \`${{ needs.secrets.result }}\` |"
            echo "| SonarQube | \`${{ needs.sonarqube.result }}\` |"
            echo "| Unified summary | \`${{ needs.unified-summary.result }}\` |"
            echo "| Security issues | \`${{ needs.security-issues.result }}\` |"
            echo ""
            echo "| Decision | Value |"
            echo "|---|---|"
            echo "| Mode | \`${{ needs.preflight.outputs.mode || 'unknown' }}\` |"
            echo "| Audit level | \`${{ needs.preflight.outputs.audit_level || 'unknown' }}\` |"
            echo "| Dry run | \`${{ needs.preflight.outputs.dry_run || 'unknown' }}\` |"
            echo "| Max critical | \`${{ needs.preflight.outputs.max_critical || 'unknown' }}\` |"
            echo "| Max high | \`${{ needs.preflight.outputs.max_high || 'unknown' }}\` |"
            echo "| Policy gate | \`${{ needs.preflight.outputs.should_run_policy_gate || 'unknown' }}\` |"
            echo "| CodeQL | \`${{ needs.preflight.outputs.should_run_codeql || 'unknown' }}\` |"
            echo "| Dependencies | \`${{ needs.preflight.outputs.should_run_dependency_scan || 'unknown' }}\` |"
            echo "| Containers | \`${{ needs.preflight.outputs.should_run_container_scan || 'unknown' }}\` |"
            echo "| Secrets | \`${{ needs.preflight.outputs.should_run_secrets_scan || 'unknown' }}\` |"
            echo "| SonarQube | \`${{ needs.preflight.outputs.should_run_sonarqube || 'unknown' }}\` |"
            echo "| Create security issues | \`${{ needs.preflight.outputs.should_create_security_issues || 'unknown' }}\` |"
            echo "| Assign security milestones | \`${{ needs.preflight.outputs.should_assign_security_milestones || 'unknown' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce security workflow result
        run: |
          set -euo pipefail

          check_required_job() {
            local name="$1"
            local result="$2"

            if [[ "$result" != "success" ]]; then
              echo "::error::$name failed with result: $result"
              exit 1
            fi
          }

          check_optional_job() {
            local name="$1"
            local result="$2"

            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::$name failed with result: $result"
              exit 1
            fi
          }

          check_required_job "Preflight" "${{ needs.preflight.result }}"
          check_optional_job "Policy gate" "${{ needs.policy-gate.result }}"
          check_optional_job "CodeQL" "${{ needs.codeql.result }}"
          check_optional_job "Dependencies" "${{ needs.dependencies.result }}"
          check_optional_job "Containers" "${{ needs.containers.result }}"
          check_optional_job "Secrets" "${{ needs.secrets.result }}"
          check_optional_job "SonarQube" "${{ needs.sonarqube.result }}"
          check_required_job "Unified security summary" "${{ needs.unified-summary.result }}"
          check_optional_job "Security issues" "${{ needs.security-issues.result }}"

          echo "Security workflow completed."
