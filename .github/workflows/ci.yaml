  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs:
      - lint
      - unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Nx affected SHAs
        shell: bash
        run: |
          set -euo pipefail

          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "NX_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "$ZERO_SHA" ]]; then
            echo "NX_BASE=${{ github.event.before }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          else
            echo "NX_BASE=origin/main" >> "$GITHUB_ENV"
            echo "NX_HEAD=HEAD" >> "$GITHUB_ENV"
          fi

      - name: Run affected builds
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_run }}" == "true" ]]; then
            pnpm nx run-many --target=build --all --parallel=3
          else
            pnpm nx affected --target=build --base="$NX_BASE" --head="$NX_HEAD" --parallel=3
          fi

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            dist
            .next
            apps/**/.next
            apps/**/dist
            libs/**/dist
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Cypress cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CYPRESS_CACHE_FOLDER }}
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            cypress-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Cypress binary when present
        shell: bash
        run: |
          set -euo pipefail

          if pnpm exec cypress --version >/dev/null 2>&1; then
            pnpm exec cypress install
            pnpm exec cypress verify
          else
            echo "Cypress package was not detected at the workspace root. Skipping Cypress binary install."
          fi

      - name: Set Nx affected SHAs
        shell: bash
        run: |
          set -euo pipefail

          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "NX_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "$ZERO_SHA" ]]; then
            echo "NX_BASE=${{ github.event.before }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          else
            echo "NX_BASE=origin/main" >> "$GITHUB_ENV"
            echo "NX_HEAD=HEAD" >> "$GITHUB_ENV"
          fi

      - name: Run affected e2e tests
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_run }}" == "true" ]]; then
            pnpm nx run-many --targets=e2e-ci,coverage --all --parallel=1
          else
            pnpm nx affected --targets=e2e-ci,coverage --base="$NX_BASE" --head="$NX_HEAD" --parallel=1
          fi

      - name: Upload E2E coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-summary
          path: dist/cypress/apps/e2e/**/e2e-summary.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: |
            cypress/screenshots
            apps/**/cypress/screenshots
            apps/**/src/**/cypress/screenshots
            dist/cypress/**/screenshots
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: |
            cypress/videos
            apps/**/cypress/videos
            apps/**/src/**/cypress/videos
            dist/cypress/**/videos
          if-no-files-found: ignore
          retention-days: 14

  discover-dockerfiles:
    name: Discover Dockerfiles
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_dockerfiles: ${{ steps.discover.outputs.has_dockerfiles }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Discover Dockerfiles
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          from pathlib import Path

          workspace = Path.cwd()
          repository = os.environ["GITHUB_REPOSITORY"]
          owner, repo = repository.split("/", 1)

          owner = owner.lower()
          repo = repo.lower()

          ignored_parts = {
              ".git",
              ".github",
              ".next",
              ".nx",
              ".turbo",
              "coverage",
              "dist",
              "node_modules",
              "out-tsc",
              "test-output",
          }

          def slugify(value: str) -> str:
              value = value.lower()
              value = re.sub(r"[^a-z0-9]+", "-", value)
              value = value.strip("-")
              return value or "root"

          entries = []

          for dockerfile in sorted(workspace.rglob("Dockerfile*")):
              relative = dockerfile.relative_to(workspace)

              if any(part in ignored_parts for part in relative.parts):
                  continue

              if not dockerfile.is_file():
                  continue

              context_dir = dockerfile.parent
              context_relative = context_dir.relative_to(workspace)

              if str(context_relative) == ".":
                  context_slug = "root"
              else:
                  context_slug = slugify(str(context_relative))

              if dockerfile.name == "Dockerfile":
                  image_suffix = context_slug
              else:
                  dockerfile_suffix = slugify(dockerfile.name)
                  image_suffix = slugify(f"{context_slug}-{dockerfile_suffix}")

              image_name = f"ghcr.io/{owner}/{repo}"
              if image_suffix != "root":
                  image_name = f"{image_name}-{image_suffix}"

              entries.append(
                  {
                      "name": image_suffix,
                      "context": str(context_relative) if str(context_relative) != "." else ".",
                      "dockerfile": str(relative),
                      "image": image_name,
                  }
              )

          print(f"has_dockerfiles={'true' if entries else 'false'}")
          print(
              "matrix="
              + json.dumps(
                  {"include": entries},
                  separators=(",", ":"),
              )
          )
          PY

      - name: Show discovered Dockerfiles
        shell: bash
        run: |
          echo '${{ steps.discover.outputs.matrix }}' | python -m json.tool

  docker-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - e2e
      - discover-dockerfiles

    if: needs.discover-dockerfiles.outputs.has_dockerfiles == 'true'

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-dockerfiles.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.name }}
            org.opencontainers.image.description=Helix container image built from ${{ matrix.dockerfile }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: true
          sbom: true

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - workspace
      - security
      - lint
      - unit-tests
      - build
      - e2e
      - discover-dockerfiles
      - docker-images

    if: always()

    steps:
      - name: Check CI result
        shell: bash
        run: |
          set -euo pipefail

          check_required_job() {
            local name="$1"
            local result="$2"

            if [[ "$result" != "success" ]]; then
              echo "$name failed with result: $result"
              exit 1
            fi
          }

          check_optional_job() {
            local name="$1"
            local result="$2"

            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "$name failed with result: $result"
              exit 1
            fi
          }

          check_required_job "Workspace validation" "${{ needs.workspace.result }}"
          check_required_job "Dependency security" "${{ needs.security.result }}"
          check_required_job "Lint/typecheck" "${{ needs.lint.result }}"
          check_required_job "Unit tests" "${{ needs.unit-tests.result }}"
          check_required_job "Build" "${{ needs.build.result }}"
          check_required_job "E2E tests" "${{ needs.e2e.result }}"
          check_required_job "Dockerfile discovery" "${{ needs.discover-dockerfiles.result }}"
          check_optional_job "Docker image build/push" "${{ needs.docker-images.result }}"

          echo "CI passed."