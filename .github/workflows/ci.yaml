name: CI

on:
  pull_request:
    branches:
      - main
      - develop

  push:
    branches:
      - main
      - develop

  workflow_dispatch:
    inputs:
      full_run:
        description: Run all projects instead of only affected projects
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read
  actions: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: '24'
  PNPM_HOME: ~/.local/share/pnpm
  NX_DAEMON: 'false'
  NX_VERBOSE_LOGGING: 'true'
  NEXT_TELEMETRY_DISABLED: '1'
  CYPRESS_CACHE_FOLDER: ~/.cache/Cypress
  REGISTRY: ghcr.io

jobs:
  workspace:
    name: Workspace Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Show Nx report
        run: pnpm nx report

      - name: Set Nx affected SHAs
        shell: bash
        run: |
          set -euo pipefail

          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "NX_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "$ZERO_SHA" ]]; then
            echo "NX_BASE=${{ github.event.before }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          else
            echo "NX_BASE=origin/main" >> "$GITHUB_ENV"
            echo "NX_HEAD=HEAD" >> "$GITHUB_ENV"
          fi

      - name: Validate lockfile
        run: pnpm install --frozen-lockfile --offline

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_run }}" == "true" ]]; then
            pnpm nx format:check
          else
            pnpm nx format:check --base="$NX_BASE" --head="$NX_HEAD"
          fi

      - name: Check workspace graph
        run: pnpm nx graph --file=.nx/workspace-graph.html

      - name: Upload workspace graph
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-graph
          path: .nx/workspace-graph.html
          if-no-files-found: ignore
          retention-days: 7

  security:
    name: Dependency Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=critical

  lint:
    name: Lint and Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - workspace

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Nx affected SHAs
        shell: bash
        run: |
          set -euo pipefail

          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "NX_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "$ZERO_SHA" ]]; then
            echo "NX_BASE=${{ github.event.before }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          else
            echo "NX_BASE=origin/main" >> "$GITHUB_ENV"
            echo "NX_HEAD=HEAD" >> "$GITHUB_ENV"
          fi

      - name: Run affected lint and typecheck
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_run }}" == "true" ]]; then
            pnpm nx run-many --targets=lint,typecheck --all --parallel=3
          else
            pnpm nx affected --targets=lint,typecheck --base="$NX_BASE" --head="$NX_HEAD" --parallel=3
          fi

