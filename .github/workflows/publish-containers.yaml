name: Aerealith AI Publish Containers

run-name: >-
  Publish Containers / ${{ github.event_name }} / ${{ github.ref_name || github.event.release.tag_name || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Container publishing mode to run."
        required: true
        default: "publish"
        type: choice
        options:
          - publish
          - build-only
          - discover-only
          - summarize-only
      registry:
        description: "Container registry target."
        required: true
        default: "ghcr"
        type: choice
        options:
          - ghcr
          - dockerhub
          - both
      image_namespace:
        description: "Optional image namespace override. Defaults to repository owner."
        required: false
        default: ""
        type: string
      platforms:
        description: "Comma-separated target platforms."
        required: true
        default: "linux/amd64"
        type: string
      push_latest:
        description: "Push latest tag for default branch builds."
        required: true
        default: true
        type: boolean
      create_sbom:
        description: "Create SBOM metadata during Docker build."
        required: true
        default: true
        type: boolean
      create_provenance:
        description: "Create provenance metadata during Docker build."
        required: true
        default: true
        type: boolean
      dry_run:
        description: "Build and summarize without pushing images."
        required: true
        default: false
        type: boolean

  push:
    branches:
      - main
      - staging
      - develop
      - "release/**"
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

  release:
    types:
      - published

permissions:
  actions: read
  attestations: write
  checks: write
  contents: read
  id-token: write
  packages: write
  security-events: read

concurrency:
  group: >-
    publish-containers-${{ github.event.release.tag_name || github.ref_name || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PROJECT_NAME: Aerealith AI
  NODE_VERSION: "24"
  FORCE_COLOR: "1"
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  CONTAINER_OUTPUT_DIR: artifacts/docker
  PROJECT_SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      mode: ${{ steps.context.outputs.mode }}
      registry: ${{ steps.context.outputs.registry }}
      image_namespace: ${{ steps.context.outputs.image_namespace }}
      platforms: ${{ steps.context.outputs.platforms }}
      push_latest: ${{ steps.context.outputs.push_latest }}
      create_sbom: ${{ steps.context.outputs.create_sbom }}
      create_provenance: ${{ steps.context.outputs.create_provenance }}
      dry_run: ${{ steps.context.outputs.dry_run }}
      publish_enabled: ${{ steps.context.outputs.publish_enabled }}
      should_discover: ${{ steps.context.outputs.should_discover }}
      should_build: ${{ steps.context.outputs.should_build }}
      should_publish: ${{ steps.context.outputs.should_publish }}
      should_summarize: ${{ steps.context.outputs.should_summarize }}

    steps:
      - name: Resolve container publishing context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode || 'publish' }}
          INPUT_REGISTRY: ${{ github.event.inputs.registry || 'ghcr' }}
          INPUT_IMAGE_NAMESPACE: ${{ github.event.inputs.image_namespace || '' }}
          INPUT_PLATFORMS: ${{ github.event.inputs.platforms || 'linux/amd64' }}
          INPUT_PUSH_LATEST: ${{ github.event.inputs.push_latest || 'true' }}
          INPUT_CREATE_SBOM: ${{ github.event.inputs.create_sbom || 'true' }}
          INPUT_CREATE_PROVENANCE: ${{ github.event.inputs.create_provenance || 'true' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          mode="${INPUT_MODE:-publish}"
          registry="${INPUT_REGISTRY:-ghcr}"
          image_namespace="${INPUT_IMAGE_NAMESPACE:-}"
          platforms="${INPUT_PLATFORMS:-linux/amd64}"
          push_latest="${INPUT_PUSH_LATEST:-true}"
          create_sbom="${INPUT_CREATE_SBOM:-true}"
          create_provenance="${INPUT_CREATE_PROVENANCE:-true}"
          dry_run="${INPUT_DRY_RUN:-false}"

          if [[ -z "$image_namespace" ]]; then
            image_namespace="${GITHUB_REPOSITORY_OWNER}"
          fi

          image_namespace="$(printf '%s' "$image_namespace" | tr '[:upper:]' '[:lower:]')"

          should_discover="false"
          should_build="false"
          should_publish="false"
          should_summarize="true"
          publish_enabled="false"

          case "$mode" in
            publish)
              should_discover="true"
              should_build="true"
              should_publish="true"
              ;;
            build-only)
              should_discover="true"
              should_build="true"
              should_publish="false"
              ;;
            discover-only)
              should_discover="true"
              should_build="false"
              should_publish="false"
              ;;
            summarize-only)
              should_discover="false"
              should_build="false"
              should_publish="false"
              should_summarize="true"
              ;;
            *)
              echo "::error::Unsupported container publishing mode: $mode"
              exit 1
              ;;
          esac

          case "$registry" in
            ghcr|dockerhub|both)
              ;;
            *)
              echo "::error::Unsupported registry: $registry"
              exit 1
              ;;
          esac

          if [[ "$dry_run" == "true" ]]; then
            should_publish="false"
          fi

          if [[ "$should_publish" == "true" ]]; then
            publish_enabled="true"
          fi

          {
            echo "mode=$mode"
            echo "registry=$registry"
            echo "image_namespace=$image_namespace"
            echo "platforms=$platforms"
            echo "push_latest=$push_latest"
            echo "create_sbom=$create_sbom"
            echo "create_provenance=$create_provenance"
            echo "dry_run=$dry_run"
            echo "publish_enabled=$publish_enabled"
            echo "should_discover=$should_discover"
            echo "should_build=$should_build"
            echo "should_publish=$should_publish"
            echo "should_summarize=$should_summarize"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Aerealith AI Publish Containers"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Event | \`$EVENT_NAME\` |"
            echo "| Mode | \`$mode\` |"
            echo "| Registry | \`$registry\` |"
            echo "| Image namespace | \`$image_namespace\` |"
            echo "| Platforms | \`$platforms\` |"
            echo "| Push latest | \`$push_latest\` |"
            echo "| SBOM | \`$create_sbom\` |"
            echo "| Provenance | \`$create_provenance\` |"
            echo "| Dry run | \`$dry_run\` |"
            echo "| Publish enabled | \`$publish_enabled\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  discover-images:
    name: Discover container images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - preflight

    if: needs.preflight.outputs.should_discover == 'true'

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_images: ${{ steps.matrix.outputs.has_images }}
      image_count: ${{ steps.matrix.outputs.image_count }}

    env:
      IMAGE_NAMESPACE: ${{ needs.preflight.outputs.image_namespace }}
      CONTAINER_PLATFORMS: ${{ needs.preflight.outputs.platforms }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare Docker output directory
        run: |
          set -euo pipefail
          mkdir -p "$CONTAINER_OUTPUT_DIR"

      - name: Run local image discovery script
        continue-on-error: true
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/docker/discover-images.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/docker/discover-images.js"
            exit 0
          fi

          node ".github/scripts/docker/discover-images.js" \
            --output "$CONTAINER_OUTPUT_DIR/discover-images.raw.json" \
            --summary "$CONTAINER_OUTPUT_DIR/discover-images.raw.md" \
            --no-fail-on-error

      - name: Resolve one-image-per-app matrix
        id: matrix
        run: |
          set -euo pipefail

          python <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          from pathlib import Path

          workspace = Path.cwd()
          repository = os.environ["GITHUB_REPOSITORY"].lower()
          owner, repo = repository.split("/", 1)
          image_namespace = os.environ.get("IMAGE_NAMESPACE", owner).lower()
          platforms = os.environ.get("CONTAINER_PLATFORMS", "linux/amd64")

          output_dir = Path(os.environ.get("CONTAINER_OUTPUT_DIR", "artifacts/docker"))
          raw_discovery_file = output_dir / "discover-images.raw.json"
          normalized_discovery_file = output_dir / "discover-images.json"

          ignored_parts = {
              ".git",
              ".github",
              ".next",
              ".nx",
              ".turbo",
              "artifacts",
              "coverage",
              "dist",
              "node_modules",
              "out-tsc",
              "test-output",
          }

          app_root_markers = {
              "apps",
              "app",
              "packages",
              "package",
              "libs",
              "lib",
              "services",
              "service",
              "workers",
              "worker",
              "frontend",
              "backend",
          }

          blocked_image_names = {
              f"{repo}-apps-frontend",
              f"{repo}-packages-frontend",
          }

          def slugify(value: str) -> str:
              value = str(value or "").lower()
              value = re.sub(r"[^a-z0-9]+", "-", value)
              value = value.strip("-")
              return value or "root"

          def as_posix(value) -> str:
              return Path(str(value or ".")).as_posix()

          def app_name_from_context(context: str) -> str:
              context = as_posix(context)
              parts = [part for part in context.split("/") if part and part != "."]

              if not parts:
                  return "frontend"

              for marker in ("apps", "packages", "services", "workers"):
                  if marker in parts:
                      index = parts.index(marker)
                      if index + 1 < len(parts):
                          return slugify(parts[index + 1])

              if len(parts) >= 2 and parts[0] in app_root_markers:
                  return slugify(parts[1])

              return slugify(parts[-1])

          def dockerfile_priority(entry: dict) -> tuple:
              dockerfile = entry["dockerfile"]
              context = entry["context"]
              dockerfile_name = Path(dockerfile).name

              exact_dockerfile = 0 if dockerfile_name == "Dockerfile" else 1
              apps_preferred = 0 if context.startswith("apps/") else 1
              packages_preferred = 0 if context.startswith("packages/") else 1
              context_depth = len([part for part in context.split("/") if part and part != "."])

              return (
                  exact_dockerfile,
                  apps_preferred,
                  packages_preferred,
                  context_depth,
                  dockerfile,
              )

          def normalize_entry(entry: dict) -> dict | None:
              dockerfile = (
                  entry.get("dockerfile")
                  or entry.get("file")
                  or entry.get("path")
                  or "Dockerfile"
              )

              dockerfile_path = Path(str(dockerfile))
              context = entry.get("context") or dockerfile_path.parent.as_posix()

              if context in ("", "."):
                  context = "."

              context = as_posix(context)
              dockerfile = as_posix(dockerfile)

              explicit_name = (
                  entry.get("app")
                  or entry.get("app_name")
                  or entry.get("application")
                  or entry.get("name")
                  or entry.get("image_name")
                  or ""
              )

              if explicit_name:
                  explicit_slug = slugify(explicit_name)

                  if explicit_slug in {"root", "dockerfile", "apps-frontend", "packages-frontend"}:
                      app_slug = app_name_from_context(context)
                  elif explicit_slug.startswith(f"{repo}-"):
                      app_slug = explicit_slug.removeprefix(f"{repo}-")
                  else:
                      app_slug = explicit_slug
              else:
                  app_slug = app_name_from_context(context)

              if app_slug in {"root", "app", "apps", "package", "packages"}:
                  app_slug = "frontend"

              image_name = f"{repo}-{app_slug}"

              if image_name in blocked_image_names:
                  image_name = f"{repo}-frontend"
                  app_slug = "frontend"

              dockerfile_abs = workspace / dockerfile

              if not dockerfile_abs.exists() or not dockerfile_abs.is_file():
                  return None

              return {
                  "name": image_name,
                  "app": app_slug,
                  "context": context,
                  "dockerfile": dockerfile,
                  "platforms": entry.get("platforms") or platforms,
                  "ghcr_image": f"ghcr.io/{owner}/{image_name}",
                  "dockerhub_image": f"docker.io/{image_namespace}/{image_name}",
              }

          entries = []

          if raw_discovery_file.exists():
              try:
                  data = json.loads(raw_discovery_file.read_text())
                  raw_entries = (
                      data.get("images")
                      or data.get("docker_images")
                      or data.get("container_images")
                      or data.get("discoveries")
                      or data.get("selected_images")
                      or []
                  )

                  if isinstance(raw_entries, list):
                      for item in raw_entries:
                          if isinstance(item, dict):
                              normalized = normalize_entry(item)
                              if normalized:
                                  entries.append(normalized)
              except Exception as error:
                  print(f"::warning::Failed to parse raw discovery file: {error}", file=os.sys.stderr)

          if not entries:
              for dockerfile in sorted(workspace.rglob("Dockerfile*")):
                  relative = dockerfile.relative_to(workspace)

                  if any(part in ignored_parts for part in relative.parts):
                      continue

                  if not dockerfile.is_file():
                      continue

                  context = (
                      "."
                      if dockerfile.parent == workspace
                      else dockerfile.parent.relative_to(workspace).as_posix()
                  )

                  normalized = normalize_entry(
                      {
                          "dockerfile": relative.as_posix(),
                          "context": context,
                          "platforms": platforms,
                      }
                  )

                  if normalized:
                      entries.append(normalized)

          by_app = {}

          for entry in entries:
              key = entry["name"]

              if key not in by_app:
                  by_app[key] = entry
                  continue

              current = by_app[key]

              if dockerfile_priority(entry) < dockerfile_priority(current):
                  by_app[key] = entry

          unique = sorted(by_app.values(), key=lambda item: item["name"])

          matrix = {"include": unique}

          normalized_report = {
              "schema_version": 1,
              "type": "container-image-discovery",
              "project": os.environ.get("PROJECT_NAME", "Aerealith AI"),
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "one_image_per_app": True,
              "naming": {
                  "rule": "repo + app folder name",
                  "example": f"{repo}-frontend",
              },
              "totals": {
                  "raw_entries": len(entries),
                  "selected_images": len(unique),
              },
              "images": unique,
              "matrix": matrix,
          }

          output_dir.mkdir(parents=True, exist_ok=True)
          normalized_discovery_file.write_text(json.dumps(normalized_report, indent=2) + "\n")

          print(f"has_images={'true' if unique else 'false'}")
          print(f"image_count={len(unique)}")
          print("matrix=" + json.dumps(matrix, separators=(",", ":")))
          PY

      - name: Write image discovery summary
        run: |
          set -euo pipefail

          {
            echo "## Container Image Discovery"
            echo ""
            echo "- One image per app: \`true\`"
            echo "- Has images: \`${{ steps.matrix.outputs.has_images }}\`"
            echo "- Image count: \`${{ steps.matrix.outputs.image_count }}\`"
            echo ""
            echo "\`\`\`json"
            echo '${{ steps.matrix.outputs.matrix }}' | python -m json.tool
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload discovery artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-discovery-${{ github.run_id }}
          path: |
            artifacts/docker/**
          if-no-files-found: ignore
          retention-days: 14

  publish-images:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - preflight
      - discover-images

    if: >-
      needs.preflight.outputs.should_build == 'true' &&
      needs.discover-images.outputs.has_images == 'true'

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-images.outputs.matrix) }}

    env:
      REGISTRY_TARGET: ${{ needs.preflight.outputs.registry }}
      PUBLISH_ENABLED: ${{ needs.preflight.outputs.should_publish }}
      PUSH_LATEST: ${{ needs.preflight.outputs.push_latest }}
      CREATE_SBOM: ${{ needs.preflight.outputs.create_sbom }}
      CREATE_PROVENANCE: ${{ needs.preflight.outputs.create_provenance }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve semantic version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
          REF_NAME: ${{ github.ref_name || '' }}
          REF_TYPE: ${{ github.ref_type || '' }}
        run: |
          set -euo pipefail

          raw_version=""

          if [[ -n "$RELEASE_TAG" ]]; then
            raw_version="$RELEASE_TAG"
          elif [[ "$REF_TYPE" == "tag" ]]; then
            raw_version="$REF_NAME"
          elif [[ -f package.json ]]; then
            raw_version="$(node -e "const pkg=require('./package.json'); process.stdout.write(String(pkg.version || '0.0.0'))")"
          else
            raw_version="0.0.0"
          fi

          version="$(printf '%s' "$raw_version" | sed -E 's#^refs/tags/##; s#^[vV]##')"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::warning::Resolved version '$version' is not semantic. Falling back to 0.0.0."
            version="0.0.0"
          fi

          {
            echo "version=$version"
            echo "version_tag=$version"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Semantic Container Version"
            echo ""
            echo "- Image: \`${{ matrix.name }}\`"
            echo "- Version: \`$version\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: >-
          env.PUBLISH_ENABLED == 'true' &&
          (env.REGISTRY_TARGET == 'ghcr' || env.REGISTRY_TARGET == 'both')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        if: >-
          env.PUBLISH_ENABLED == 'true' &&
          (env.REGISTRY_TARGET == 'dockerhub' || env.REGISTRY_TARGET == 'both')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image list
        id: images
        run: |
          set -euo pipefail

          images=()

          if [[ "$REGISTRY_TARGET" == "ghcr" || "$REGISTRY_TARGET" == "both" ]]; then
            images+=("${{ matrix.ghcr_image }}")
          fi

          if [[ "$REGISTRY_TARGET" == "dockerhub" || "$REGISTRY_TARGET" == "both" ]]; then
            images+=("${{ matrix.dockerhub_image }}")
          fi

          {
            echo "images<<EOF"
            printf '%s\n' "${images[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.images }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.version.outputs.version_tag }}
            type=raw,value=latest,enable=${{ env.PUSH_LATEST == 'true' && github.ref_name == github.event.repository.default_branch }}
          labels: |
            org.opencontainers.image.title=Aerealith AI ${{ matrix.app }}
            org.opencontainers.image.description=Aerealith AI container image built from ${{ matrix.dockerfile }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.ref.name=${{ matrix.name }}

      - name: Build and optionally publish image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ env.PUBLISH_ENABLED == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: ${{ env.CREATE_PROVENANCE == 'true' }}
          sbom: ${{ env.CREATE_SBOM == 'true' }}

      - name: Write image build report and hashes
        if: always()
        run: |
          set -euo pipefail

          mkdir -p "$CONTAINER_OUTPUT_DIR/images"
          mkdir -p "$CONTAINER_OUTPUT_DIR/hashes"

          report_file="$CONTAINER_OUTPUT_DIR/images/${{ matrix.name }}.json"
          summary_file="$CONTAINER_OUTPUT_DIR/images/${{ matrix.name }}.md"
          hash_file="$CONTAINER_OUTPUT_DIR/hashes/${{ matrix.name }}.hashes.json"

          cat > "$report_file" <<JSON
          {
            "schema_version": 1,
            "type": "container-image-build",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "one_image_per_app": true,
            "image": {
              "name": "${{ matrix.name }}",
              "app": "${{ matrix.app }}",
              "context": "${{ matrix.context }}",
              "dockerfile": "${{ matrix.dockerfile }}",
              "platforms": "${{ matrix.platforms }}",
              "ghcr_image": "${{ matrix.ghcr_image }}",
              "dockerhub_image": "${{ matrix.dockerhub_image }}",
              "version": "${{ steps.version.outputs.version }}",
              "version_tag": "${{ steps.version.outputs.version_tag }}",
              "digest": "${{ steps.build.outputs.digest || '' }}",
              "metadata": ${{ steps.build.outputs.metadata || '{}' }}
            },
            "publish_enabled": ${{ env.PUBLISH_ENABLED == 'true' && 'true' || 'false' }},
            "registry_target": "$REGISTRY_TARGET",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          cat > "$hash_file" <<JSON
          {
            "schema_version": 1,
            "type": "container-image-hashes",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "image": "${{ matrix.name }}",
            "app": "${{ matrix.app }}",
            "version": "${{ steps.version.outputs.version }}",
            "version_tag": "${{ steps.version.outputs.version_tag }}",
            "digest": "${{ steps.build.outputs.digest || '' }}",
            "tags": ${{ toJSON(steps.meta.outputs.tags) }},
            "metadata": ${{ steps.build.outputs.metadata || '{}' }},
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          {
            echo "# Aerealith AI Container Image"
            echo ""
            echo "Generated: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
            echo ""
            echo "## Image"
            echo ""
            echo "- Name: \`${{ matrix.name }}\`"
            echo "- App: \`${{ matrix.app }}\`"
            echo "- Dockerfile: \`${{ matrix.dockerfile }}\`"
            echo "- Context: \`${{ matrix.context }}\`"
            echo "- Platforms: \`${{ matrix.platforms }}\`"
            echo "- Registry target: \`$REGISTRY_TARGET\`"
            echo "- Published: \`$PUBLISH_ENABLED\`"
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest || 'none' }}\`"
            echo ""
            echo "## Tags"
            echo ""
            echo "\`\`\`txt"
            cat <<'TAGS'
          ${{ steps.meta.outputs.tags }}
          TAGS
            echo "\`\`\`"
          } > "$summary_file"

      - name: Upload image report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-image-${{ matrix.name }}-${{ github.run_id }}
          path: |
            artifacts/docker/images/${{ matrix.name }}.*
            artifacts/docker/hashes/${{ matrix.name }}.hashes.json
          if-no-files-found: ignore
          retention-days: 30

  summarize:
    name: Summarize containers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - preflight
      - discover-images
      - publish-images

    if: always() && needs.preflight.outputs.should_summarize == 'true'

    env:
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download container artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/downloaded-container-artifacts
          pattern: container-*
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare Docker summary directory
        run: |
          set -euo pipefail
          mkdir -p "$CONTAINER_OUTPUT_DIR"

      - name: Run local Docker summary script
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/docker/summarize-images.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/docker/summarize-images.js"
            exit 0
          fi

          node ".github/scripts/docker/summarize-images.js" \
            --input-dir "artifacts/downloaded-container-artifacts" \
            --output "$CONTAINER_OUTPUT_DIR/summarize-images.json" \
            --summary "$CONTAINER_OUTPUT_DIR/summarize-images.md" \
            --no-fail-on-error

      - name: Consolidate image hashes
        if: always()
        run: |
          set -euo pipefail

          mkdir -p "$CONTAINER_OUTPUT_DIR"

          python <<'PY'
          import json
          import os
          from pathlib import Path

          input_root = Path("artifacts/downloaded-container-artifacts")
          output_file = Path(os.environ.get("CONTAINER_OUTPUT_DIR", "artifacts/docker")) / "hashes.json"

          hash_files = sorted(input_root.rglob("*.hashes.json"))
          images = []

          for file in hash_files:
              try:
                  data = json.loads(file.read_text())
                  if isinstance(data, dict):
                      images.append(data)
              except Exception as error:
                  print(f"::warning::Failed to parse hash file {file}: {error}")

          digests = sorted(
              {
                  image.get("digest", "")
                  for image in images
                  if image.get("digest")
              }
          )

          tags = sorted(
              {
                  tag.strip()
                  for image in images
                  for tag in str(image.get("tags", "")).splitlines()
                  if tag.strip()
              }
          )

          report = {
              "schema_version": 1,
              "type": "container-image-hashes",
              "project": os.environ.get("PROJECT_NAME", "Aerealith AI"),
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "one_image_per_app": True,
              "created_at": os.popen("date -u +%Y-%m-%dT%H:%M:%SZ").read().strip(),
              "totals": {
                  "images": len(images),
                  "digests": len(digests),
                  "tags": len(tags),
              },
              "digests": digests,
              "tags": tags,
              "images": images,
          }

          output_file.write_text(json.dumps(report, indent=2) + "\n")
          PY

      - name: Write container publishing summary
        if: always()
        run: |
          set -euo pipefail

          {
            echo "## Aerealith AI Container Publishing Result"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Preflight | \`${{ needs.preflight.result }}\` |"
            echo "| Discover images | \`${{ needs.discover-images.result }}\` |"
            echo "| Publish images | \`${{ needs.publish-images.result }}\` |"
            echo ""
            echo "| Decision | Value |"
            echo "|---|---|"
            echo "| Mode | \`${{ needs.preflight.outputs.mode }}\` |"
            echo "| Registry | \`${{ needs.preflight.outputs.registry }}\` |"
            echo "| One image per app | \`true\` |"
            echo "| Image count | \`${{ needs.discover-images.outputs.image_count || '0' }}\` |"
            echo "| Publish enabled | \`${{ needs.preflight.outputs.publish_enabled }}\` |"
            echo "| Dry run | \`${{ needs.preflight.outputs.dry_run }}\` |"
            echo ""
            echo "## Output Files"
            echo ""
            echo "| File | Size |"
            echo "|---|---:|"

            for dir in "$CONTAINER_OUTPUT_DIR" artifacts/downloaded-container-artifacts; do
              if [[ -d "$dir" ]]; then
                while IFS= read -r file; do
                  size="$(wc -c < "$file" | xargs)"
                  echo "| \`$file\` | \`$size\` bytes |"
                done < <(find "$dir" -type f | sort)
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload container summary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-summary-${{ github.run_id }}
          path: |
            artifacts/docker/**
            artifacts/downloaded-container-artifacts/**
          if-no-files-found: ignore
          retention-days: 30

      - name: Enforce container publishing result
        run: |
          set -euo pipefail

          check_optional_job() {
            local name="$1"
            local result="$2"

            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::$name failed with result: $result"
              exit 1
            fi
          }

          check_optional_job "Discover images" "${{ needs.discover-images.result }}"
          check_optional_job "Publish images" "${{ needs.publish-images.result }}"

          echo "Container publishing workflow completed."
