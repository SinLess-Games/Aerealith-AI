name: Aerealith AI Repository Assistant

run-name: >-
  Aerie Repo Assistant / ${{ github.event_name }} / ${{ github.ref_name || github.head_ref || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Assistant mode to run."
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - all
          - repo-management
          - ai
          - security
          - summarize-only
      dry_run:
        description: "Evaluate actions without writing changes."
        required: true
        default: false
        type: boolean
      use_ai:
        description: "Use OpenAI-backed assistant actions when available."
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - "true"
          - "false"
      run_repo_management:
        description: "Run repository management when a native issue or pull request event is available."
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - "true"
          - "false"
      run_security_triage:
        description: "Run AI-assisted security triage."
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - "true"
          - "false"

  issues:
    types:
      - opened
      - edited
      - reopened
      - transferred

  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft
      - review_requested
      - review_request_removed

  issue_comment:
    types:
      - created
      - edited

  pull_request_review_comment:
    types:
      - created
      - edited

  schedule:
    - cron: "17 11 * * 1"

permissions:
  actions: read
  checks: write
  contents: read
  discussions: write
  issues: write
  pull-requests: write
  repository-projects: write
  security-events: read

concurrency:
  group: >-
    ai-repo-assistant-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref_name || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PROJECT_NAME: Aerealith AI
  NODE_VERSION: "24"
  FORCE_COLOR: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PROJECT_SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
  AI_REPO_ASSISTANT_MODE: ${{ github.event.inputs.mode || 'auto' }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      mode: ${{ steps.context.outputs.mode }}
      dry_run: ${{ steps.context.outputs.dry_run }}
      actor: ${{ steps.context.outputs.actor }}
      event_action: ${{ steps.context.outputs.event_action }}
      item_kind: ${{ steps.context.outputs.item_kind }}
      item_number: ${{ steps.context.outputs.item_number }}
      issue_number: ${{ steps.context.outputs.issue_number }}
      pull_request_number: ${{ steps.context.outputs.pull_request_number }}
      head_branch: ${{ steps.context.outputs.head_branch }}
      base_branch: ${{ steps.context.outputs.base_branch }}
      has_native_item_context: ${{ steps.context.outputs.has_native_item_context }}
      has_native_pr_context: ${{ steps.context.outputs.has_native_pr_context }}
      is_dependency_bot: ${{ steps.context.outputs.is_dependency_bot }}
      should_run_repo_management: ${{ steps.context.outputs.should_run_repo_management }}
      should_enforce_branch_name: ${{ steps.context.outputs.should_enforce_branch_name }}
      should_enforce_pr_rules: ${{ steps.context.outputs.should_enforce_pr_rules }}
      should_assign_labels: ${{ steps.context.outputs.should_assign_labels }}
      should_assign_milestones: ${{ steps.context.outputs.should_assign_milestones }}
      should_assign_assignees: ${{ steps.context.outputs.should_assign_assignees }}
      should_assign_reviewers: ${{ steps.context.outputs.should_assign_reviewers }}
      should_link_issues_prs: ${{ steps.context.outputs.should_link_issues_prs }}
      should_run_ai: ${{ steps.context.outputs.should_run_ai }}
      should_run_security_triage: ${{ steps.context.outputs.should_run_security_triage }}
      should_run_security_summary: ${{ steps.context.outputs.should_run_security_summary }}

    steps:
      - name: Resolve assistant context
        id: context
        env:
          INPUT_MODE: ${{ github.event.inputs.mode || 'auto' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          INPUT_USE_AI: ${{ github.event.inputs.use_ai || 'auto' }}
          INPUT_REPO_MANAGEMENT: ${{ github.event.inputs.run_repo_management || 'auto' }}
          INPUT_SECURITY_TRIAGE: ${{ github.event.inputs.run_security_triage || 'auto' }}
        run: |
          set -euo pipefail

          mode="${INPUT_MODE:-auto}"
          dry_run="${INPUT_DRY_RUN:-false}"
          event_name="${GITHUB_EVENT_NAME}"
          event_action="$(jq -r '.action // ""' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
          actor="$(jq -r '.sender.login // env.GITHUB_ACTOR // ""' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"

          issue_number=""
          pull_request_number=""
          item_kind="unknown"
          item_number=""
          head_branch=""
          base_branch=""
          has_native_item_context="false"
          has_native_pr_context="false"

          case "$event_name" in
            issues)
              issue_number="$(jq -r '.issue.number // empty' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
              item_kind="issue"
              item_number="$issue_number"
              ;;
            pull_request_target)
              pull_request_number="$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
              head_branch="$(jq -r '.pull_request.head.ref // empty' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
              base_branch="$(jq -r '.pull_request.base.ref // empty' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
              item_kind="pull_request"
              item_number="$pull_request_number"
              ;;
            issue_comment)
              issue_number="$(jq -r '.issue.number // empty' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"

              if jq -e '.issue.pull_request? // empty' "$GITHUB_EVENT_PATH" >/dev/null 2>&1; then
                pull_request_number="$issue_number"
                item_kind="pull_request"
                item_number="$pull_request_number"
              else
                item_kind="issue"
                item_number="$issue_number"
              fi
              ;;
            pull_request_review_comment)
              pull_request_number="$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
              head_branch="$(jq -r '.pull_request.head.ref // empty' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
              base_branch="$(jq -r '.pull_request.base.ref // empty' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
              item_kind="pull_request"
              item_number="$pull_request_number"
              ;;
          esac

          if [[ -z "$head_branch" ]]; then
            head_branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}"
          fi

          if [[ -z "$base_branch" ]]; then
            base_branch="${GITHUB_BASE_REF:-}"
          fi

          if [[ "$event_name" == "issues" || "$event_name" == "pull_request_target" ]]; then
            if [[ -n "$item_number" ]]; then
              has_native_item_context="true"
            fi
          fi

          if [[ "$event_name" == "pull_request_target" && -n "$pull_request_number" ]]; then
            has_native_pr_context="true"
          fi

          comment_body="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
          issue_title="$(jq -r '.issue.title // .pull_request.title // ""' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
          issue_body="$(jq -r '.issue.body // .pull_request.body // ""' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
          labels="$(jq -r '[.issue.labels[]?.name, .pull_request.labels[]?.name] | join(" ")' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"

          searchable_text="$comment_body $issue_title $issue_body $labels"

          has_ai_trigger="false"
          if printf '%s' "$searchable_text" | grep -Eiq '(^|[[:space:]])(/aerie|/ai|/repo-assistant|@aerie|@aerealith|repo assistant)([[:space:]]|$)'; then
            has_ai_trigger="true"
          fi

          has_security_signal="false"
          if printf '%s' "$searchable_text" | grep -Eiq '(security|vulnerability|vulnerabilities|cve-[0-9]{4}-[0-9]+|cwe-[0-9]+|secret|secrets|credential|codeql|dependabot|container scan|sonarqube|sonarcloud)'; then
            has_security_signal="true"
          fi

          is_dependency_bot="false"
          if printf '%s\n%s\n' "$actor" "$head_branch" | grep -Eiq 'dependabot|renovate'; then
            is_dependency_bot="true"
          fi

          should_run_repo_management="false"
          should_enforce_branch_name="false"
          should_enforce_pr_rules="false"
          should_assign_labels="false"
          should_assign_milestones="false"
          should_assign_assignees="false"
          should_assign_reviewers="false"
          should_link_issues_prs="false"
          should_run_ai="false"
          should_run_security_triage="false"
          should_run_security_summary="false"

          case "$mode" in
            all)
              should_run_repo_management="true"
              should_run_ai="true"
              should_run_security_triage="true"
              should_run_security_summary="true"
              ;;
            repo-management)
              should_run_repo_management="true"
              ;;
            ai)
              should_run_ai="true"
              ;;
            security)
              should_run_security_triage="true"
              should_run_security_summary="true"
              ;;
            summarize-only)
              should_run_security_summary="true"
              ;;
            auto|*)
              case "$event_name" in
                issues|pull_request_target)
                  should_run_repo_management="true"
                  ;;
                issue_comment|pull_request_review_comment)
                  if [[ "$has_ai_trigger" == "true" ]]; then
                    should_run_ai="true"
                  fi
                  ;;
                schedule)
                  should_run_security_summary="true"
                  ;;
                workflow_dispatch)
                  should_run_security_summary="true"
                  ;;
              esac

              if [[ "$has_security_signal" == "true" ]]; then
                should_run_security_triage="true"
                should_run_security_summary="true"
              fi
              ;;
          esac

          case "${INPUT_REPO_MANAGEMENT:-auto}" in
            true) should_run_repo_management="true" ;;
            false) should_run_repo_management="false" ;;
          esac

          case "${INPUT_USE_AI:-auto}" in
            true) should_run_ai="true" ;;
            false) should_run_ai="false" ;;
          esac

          case "${INPUT_SECURITY_TRIAGE:-auto}" in
            true)
              should_run_security_triage="true"
              should_run_security_summary="true"
              ;;
            false)
              should_run_security_triage="false"
              ;;
          esac

          if [[ "$should_run_repo_management" == "true" && "$has_native_item_context" == "true" ]]; then
            should_assign_labels="true"
            should_assign_milestones="true"
            should_assign_assignees="true"
            should_link_issues_prs="true"
          fi

          if [[ "$should_run_repo_management" == "true" && "$has_native_pr_context" == "true" ]]; then
            should_enforce_pr_rules="true"
            should_assign_reviewers="true"

            if [[ "$is_dependency_bot" != "true" ]]; then
              should_enforce_branch_name="true"
            fi
          fi

          {
            echo "mode=$mode"
            echo "dry_run=$dry_run"
            echo "actor=$actor"
            echo "event_action=$event_action"
            echo "item_kind=$item_kind"
            echo "item_number=$item_number"
            echo "issue_number=$issue_number"
            echo "pull_request_number=$pull_request_number"
            echo "head_branch=$head_branch"
            echo "base_branch=$base_branch"
            echo "has_native_item_context=$has_native_item_context"
            echo "has_native_pr_context=$has_native_pr_context"
            echo "is_dependency_bot=$is_dependency_bot"
            echo "should_run_repo_management=$should_run_repo_management"
            echo "should_enforce_branch_name=$should_enforce_branch_name"
            echo "should_enforce_pr_rules=$should_enforce_pr_rules"
            echo "should_assign_labels=$should_assign_labels"
            echo "should_assign_milestones=$should_assign_milestones"
            echo "should_assign_assignees=$should_assign_assignees"
            echo "should_assign_reviewers=$should_assign_reviewers"
            echo "should_link_issues_prs=$should_link_issues_prs"
            echo "should_run_ai=$should_run_ai"
            echo "should_run_security_triage=$should_run_security_triage"
            echo "should_run_security_summary=$should_run_security_summary"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Aerealith AI Repository Assistant"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Mode | \`$mode\` |"
            echo "| Dry run | \`$dry_run\` |"
            echo "| Event | \`$event_name\` |"
            echo "| Action | \`${event_action:-none}\` |"
            echo "| Actor | \`${actor:-unknown}\` |"
            echo "| Item kind | \`$item_kind\` |"
            echo "| Item number | \`${item_number:-none}\` |"
            echo "| Native item context | \`$has_native_item_context\` |"
            echo "| Native PR context | \`$has_native_pr_context\` |"
            echo "| Head branch | \`${head_branch:-none}\` |"
            echo "| Base branch | \`${base_branch:-none}\` |"
            echo "| Dependency bot | \`$is_dependency_bot\` |"
            echo "| Repo management | \`$should_run_repo_management\` |"
            echo "| Assign labels | \`$should_assign_labels\` |"
            echo "| Assign milestones | \`$should_assign_milestones\` |"
            echo "| Assign assignees | \`$should_assign_assignees\` |"
            echo "| Assign reviewers | \`$should_assign_reviewers\` |"
            echo "| Enforce branch name | \`$should_enforce_branch_name\` |"
            echo "| Enforce PR rules | \`$should_enforce_pr_rules\` |"
            echo "| Link issues/PRs | \`$should_link_issues_prs\` |"
            echo "| AI assistant | \`$should_run_ai\` |"
            echo "| Security triage | \`$should_run_security_triage\` |"
            echo "| Security summary | \`$should_run_security_summary\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  repo-management:
    name: Repository management
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight

    if: needs.preflight.outputs.should_run_repo_management == 'true'

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      REPO_AUTOMATION_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}

    steps:
      - name: Checkout repository automation
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare repository management artifacts
        run: |
          set -euo pipefail

          mkdir -p artifacts/repo
          mkdir -p artifacts/repository
          mkdir -p artifacts/issues
          mkdir -p artifacts/pull-requests

      - name: Skip item-specific repository management without issue or PR context
        if: needs.preflight.outputs.has_native_item_context != 'true'
        run: |
          set -euo pipefail

          {
            echo "## Item-Specific Repository Management Skipped"
            echo ""
            echo "This run does not have a native issue or pull request payload."
            echo "Item-specific scripts such as label, milestone, assignee, reviewer, PR rule, and issue-link automation were skipped to avoid invalid runs."
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Event | \`${GITHUB_EVENT_NAME}\` |"
            echo "| Mode | \`${{ needs.preflight.outputs.mode }}\` |"
            echo "| Item kind | \`${{ needs.preflight.outputs.item_kind }}\` |"
            echo "| Item number | \`${{ needs.preflight.outputs.item_number || 'none' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          cat > artifacts/repo/repo-management-skipped.json <<JSON
          {
            "schema_version": 1,
            "type": "repo-management-skipped",
            "project": "$PROJECT_NAME",
            "repository": "$GITHUB_REPOSITORY",
            "run_id": "$GITHUB_RUN_ID",
            "event_name": "$GITHUB_EVENT_NAME",
            "mode": "${{ needs.preflight.outputs.mode }}",
            "reason": "No native issue or pull request payload was available.",
            "ok": true,
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

      - name: Enforce branch name
        if: needs.preflight.outputs.should_enforce_branch_name == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/repo/enforce-branch-name.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/repo/enforce-branch-name.js"
            exit 0
          fi

          node ".github/scripts/repo/enforce-branch-name.js"

      - name: Skip branch name enforcement for dependency automation
        if: >-
          needs.preflight.outputs.should_enforce_branch_name != 'true' &&
          needs.preflight.outputs.is_dependency_bot == 'true' &&
          needs.preflight.outputs.has_native_pr_context == 'true'
        run: |
          set -euo pipefail

          {
            echo "## Branch Name Enforcement Skipped"
            echo ""
            echo "Dependency automation branch names are allowed to bypass the human branch-name policy."
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Actor | \`${{ needs.preflight.outputs.actor }}\` |"
            echo "| Head branch | \`${{ needs.preflight.outputs.head_branch }}\` |"
            echo "| Pull request | \`${{ needs.preflight.outputs.pull_request_number || 'none' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce pull request rules
        if: needs.preflight.outputs.should_enforce_pr_rules == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/repo/enforce-pr-rules.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/repo/enforce-pr-rules.js"
            exit 0
          fi

          node ".github/scripts/repo/enforce-pr-rules.js"

      - name: Assign labels
        if: needs.preflight.outputs.should_assign_labels == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/repo/assign-labels.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/repo/assign-labels.js"
            exit 0
          fi

          node ".github/scripts/repo/assign-labels.js"

      - name: Assign milestones
        if: needs.preflight.outputs.should_assign_milestones == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/repo/assign-milestones.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/repo/assign-milestones.js"
            exit 0
          fi

          node ".github/scripts/repo/assign-milestones.js"

      - name: Assign assignees
        if: needs.preflight.outputs.should_assign_assignees == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/repo/assign-assignees.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/repo/assign-assignees.js"
            exit 0
          fi

          node ".github/scripts/repo/assign-assignees.js"

      - name: Assign reviewers
        if: needs.preflight.outputs.should_assign_reviewers == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/repo/assign-reviewers.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/repo/assign-reviewers.js"
            exit 0
          fi

          node ".github/scripts/repo/assign-reviewers.js"

      - name: Link issues and pull requests
        if: needs.preflight.outputs.should_link_issues_prs == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/repo/link-issues-prs.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/repo/link-issues-prs.js"
            exit 0
          fi

          node ".github/scripts/repo/link-issues-prs.js"

      - name: Summarize repository management
        if: always()
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/repo/summarize-repo-management.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/repo/summarize-repo-management.js"
            exit 0
          fi

          node ".github/scripts/repo/summarize-repo-management.js" || true

      - name: Upload repository management artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repo-management-${{ github.run_id }}
          path: |
            artifacts/repo/**
            artifacts/repository/**
            artifacts/issues/**
            artifacts/pull-requests/**
          if-no-files-found: ignore
          retention-days: 14

  ai-assistant:
    name: AI assistant
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight

    if: >-
      needs.preflight.outputs.should_run_ai == 'true' ||
      needs.preflight.outputs.should_run_security_triage == 'true'

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      REPO_AUTOMATION_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AI_REPO_ASSISTANT_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}
      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}

    steps:
      - name: Checkout repository automation
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare AI assistant artifacts
        run: |
          set -euo pipefail

          mkdir -p artifacts/ai
          mkdir -p artifacts/security
          mkdir -p artifacts/repo

      - name: Link pull requests to issues
        if: needs.preflight.outputs.should_run_ai == 'true'
        run: |
          set -euo pipefail

          if [[ -f ".github/scripts/ai/link-pr-to-issue.js" ]]; then
            node ".github/scripts/ai/link-pr-to-issue.js"
          else
            echo "::notice::Skipping missing script: .github/scripts/ai/link-pr-to-issue.js"
          fi

      - name: Run AI security triage
        if: needs.preflight.outputs.should_run_security_triage == 'true'
        run: |
          set -euo pipefail

          if [[ ! -f ".github/scripts/ai/security-triage.js" ]]; then
            echo "::notice::Skipping missing script: .github/scripts/ai/security-triage.js"
            exit 0
          fi

          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "::notice::OPENAI_API_KEY is not configured. Skipping AI-backed security triage."
            exit 0
          fi

          node ".github/scripts/ai/security-triage.js"

      - name: Upload AI assistant artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-assistant-${{ github.run_id }}
          path: |
            artifacts/ai/**
            artifacts/security/**
            artifacts/repo/**
          if-no-files-found: ignore
          retention-days: 14

  security-summary:
    name: Security summary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight
      - repo-management
      - ai-assistant

    if: >-
      always() &&
      needs.preflight.outputs.should_run_security_summary == 'true'

    env:
      GITHUB_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN || github.token }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      PROJECT_SYNC_DRY_RUN: ${{ needs.preflight.outputs.dry_run }}

    steps:
      - name: Checkout repository automation
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare security summary artifacts
        run: |
          set -euo pipefail

          mkdir -p artifacts/security

      - name: Generate security summaries
        run: |
          set -euo pipefail

          run_optional() {
            local file="$1"
            shift || true

            if [[ ! -f "$file" ]]; then
              echo "::notice::Skipping missing script: $file"
              return 0
            fi

            echo "::group::$file"

            if ! node "$file" "$@"; then
              echo "::warning::Security summary script reported a non-zero exit: $file"
            fi

            echo "::endgroup::"
          }

          run_optional ".github/scripts/security/summarize-codeql.js" --no-fail-on-error
          run_optional ".github/scripts/security/summarize-container-scan.js" --no-fail-on-error
          run_optional ".github/scripts/security/summarize-dependencies.js" --no-fail-on-error
          run_optional ".github/scripts/security/summarize-secrets-scan.js" --no-fail-on-error
          run_optional ".github/scripts/security/summarize-sonarqube.js" --no-fail-on-error
          run_optional ".github/scripts/security/summarize-security.js" --no-fail-on-error

      - name: Upload security summary artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-summary-${{ github.run_id }}
          path: |
            artifacts/security/**
          if-no-files-found: ignore
          retention-days: 30

  finalize:
    name: Finalize
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - preflight
      - repo-management
      - ai-assistant
      - security-summary

    if: always()

    steps:
      - name: Write final assistant summary
        run: |
          set -euo pipefail

          {
            echo "## Aerealith AI Repository Assistant Result"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Preflight | \`${{ needs.preflight.result }}\` |"
            echo "| Repository management | \`${{ needs.repo-management.result }}\` |"
            echo "| AI assistant | \`${{ needs.ai-assistant.result }}\` |"
            echo "| Security summary | \`${{ needs.security-summary.result }}\` |"
            echo ""
            echo "| Decision | Value |"
            echo "|---|---|"
            echo "| Mode | \`${{ needs.preflight.outputs.mode }}\` |"
            echo "| Dry run | \`${{ needs.preflight.outputs.dry_run }}\` |"
            echo "| Actor | \`${{ needs.preflight.outputs.actor || 'unknown' }}\` |"
            echo "| Item kind | \`${{ needs.preflight.outputs.item_kind }}\` |"
            echo "| Item number | \`${{ needs.preflight.outputs.item_number || 'none' }}\` |"
            echo "| Native item context | \`${{ needs.preflight.outputs.has_native_item_context }}\` |"
            echo "| Native PR context | \`${{ needs.preflight.outputs.has_native_pr_context }}\` |"
            echo "| Head branch | \`${{ needs.preflight.outputs.head_branch || 'none' }}\` |"
            echo "| Dependency bot | \`${{ needs.preflight.outputs.is_dependency_bot }}\` |"
            echo "| Repo management requested | \`${{ needs.preflight.outputs.should_run_repo_management }}\` |"
            echo "| Branch enforcement requested | \`${{ needs.preflight.outputs.should_enforce_branch_name }}\` |"
            echo "| PR rules requested | \`${{ needs.preflight.outputs.should_enforce_pr_rules }}\` |"
            echo "| Assign labels requested | \`${{ needs.preflight.outputs.should_assign_labels }}\` |"
            echo "| Assign milestones requested | \`${{ needs.preflight.outputs.should_assign_milestones }}\` |"
            echo "| Assign assignees requested | \`${{ needs.preflight.outputs.should_assign_assignees }}\` |"
            echo "| Assign reviewers requested | \`${{ needs.preflight.outputs.should_assign_reviewers }}\` |"
            echo "| Link issues/PRs requested | \`${{ needs.preflight.outputs.should_link_issues_prs }}\` |"
            echo "| AI requested | \`${{ needs.preflight.outputs.should_run_ai }}\` |"
            echo "| Security triage requested | \`${{ needs.preflight.outputs.should_run_security_triage }}\` |"
            echo "| Security summary requested | \`${{ needs.preflight.outputs.should_run_security_summary }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce assistant result
        run: |
          set -euo pipefail

          check_required_job() {
            local name="$1"
            local result="$2"

            if [[ "$result" != "success" ]]; then
              echo "::error::$name failed with result: $result"
              exit 1
            fi
          }

          check_optional_job() {
            local name="$1"
            local result="$2"

            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::$name failed with result: $result"
              exit 1
            fi
          }

          check_required_job "Preflight" "${{ needs.preflight.result }}"

          if [[ "${{ needs.preflight.outputs.should_run_repo_management }}" == "true" ]]; then
            check_required_job "Repository management" "${{ needs.repo-management.result }}"
          else
            check_optional_job "Repository management" "${{ needs.repo-management.result }}"
          fi

          if [[ "${{ needs.preflight.outputs.should_run_ai }}" == "true" || "${{ needs.preflight.outputs.should_run_security_triage }}" == "true" ]]; then
            check_required_job "AI assistant" "${{ needs.ai-assistant.result }}"
          else
            check_optional_job "AI assistant" "${{ needs.ai-assistant.result }}"
          fi

          if [[ "${{ needs.preflight.outputs.should_run_security_summary }}" == "true" ]]; then
            check_required_job "Security summary" "${{ needs.security-summary.result }}"
          else
            check_optional_job "Security summary" "${{ needs.security-summary.result }}"
          fi

          echo "Aerealith AI Repository Assistant completed."
