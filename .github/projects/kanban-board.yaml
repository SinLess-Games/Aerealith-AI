    Target Version: "V0.1.0"

  "V0.2.0 — Automation Core":
    Target Version: "V0.2.0"

  "V0.3.0 — CI/CD Expansion":
    Target Version: "V0.3.0"

  "V0.4.0 — Security Automation":
    Target Version: "V0.4.0"

  "V0.5.0 — Release Automation":
    Target Version: "V0.5.0"

  "V0.6.0 — Publishing Pipeline":
    Target Version: "V0.6.0"

  "V0.7.0 — Cloudflare Platform":
    Target Version: "V0.7.0"

  "V0.8.0 — AI Repository Assistant":
    Target Version: "V0.8.0"

  "V0.9.0 — Release Candidate":
    Target Version: "V0.9.0"

  "V1.0.0 — General Availability":
    Target Version: "V1.0.0"

# ----------------------------------------------------------
# Views
# ----------------------------------------------------------
views:
  - name: "Kanban"
    layout: board
    group_by: "Status"
    sort_by:
      - field: "Priority"
        direction: "desc"
    fields:
      - Status
      - Priority
      - Area
      - Type
      - Release Impact
      - Story Points
    filters: ""

  - name: "Backlog"
    layout: table
    fields:
      - Status
      - Priority
      - Area
      - Type
      - Story Points
      - Target Version
    filters: 'Status = "Backlog" OR Status = "Todo"'

  - name: "Ready for Work"
    layout: table
    fields:
      - Status
      - Priority
      - Area
      - Type
      - Story Points
      - Target Version
    filters: 'Status = "Ready"'

  - name: "Blocked"
    layout: table
    fields:
      - Status
      - Priority
      - Severity
      - Area
      - Type
      - Merge Policy
    filters: 'Status = "Blocked" OR Merge Policy = "Do Not Merge"'

  - name: "Security"
    layout: table
    fields:
      - Status
      - Priority
      - Severity
      - Area
      - Type
      - Merge Policy
      - Automation Source
    filters: 'Area = "Security" OR Type = "Security" OR Severity != "None"'

  - name: "Dependencies"
    layout: table
    fields:
      - Status
      - Priority
      - Area
      - Type
      - Automation Source
      - Merge Policy
      - Release Impact
    filters: 'Area = "Dependencies" OR Automation Source = "Renovate" OR Automation Source = "Dependabot" OR Automation Source = "Mend"'

  - name: "CI/CD"
    layout: table
    fields:
      - Status
      - Priority
      - Area
      - Type
      - Story Points
      - Target Version
    filters: 'Area = "CI/CD" OR Type = "CI/CD"'

  - name: "Cloudflare"
    layout: board
    group_by: "Environment"
    fields:
      - Status
      - Priority
      - Area
      - Environment
      - Type
      - Story Points
    filters: 'Area = "Cloudflare" OR Environment = "Preview" OR Environment = "Staging" OR Environment = "Production"'

  - name: "Publishing"
    layout: table
    fields:
      - Status
      - Priority
      - Area
      - Type
      - Release Impact
      - Target Version
    filters: 'Area = "NPM" OR Area = "GHCR" OR Area = "Docker" OR Area = "Artifacts" OR Type = "Release"'

  - name: "Releases"
    layout: table
    fields:
      - Status
      - Priority
      - Area
      - Type
      - Release Impact
      - Target Version
      - Target Date
    filters: 'Release Impact = "Patch" OR Release Impact = "Minor" OR Release Impact = "Major" OR Type = "Release"'

  - name: "AI Automation"
    layout: table
    fields:
      - Status
      - Priority
      - Area
      - Type
      - Automation Source
      - Merge Policy
    filters: 'Area = "AI Automation" OR Automation Source = "OpenAI"'

  - name: "Self Hosted"
    layout: table
    fields:
      - Status
      - Priority
      - Area
      - Environment
      - Type
      - Story Points
      - Target Version
    filters: 'Environment = "Self Hosted" OR Area = "Self Hosted" OR Area = "Helm" OR Area = "Kubernetes"'

  - name: "Roadmap"
    layout: roadmap
    date_field: "Target Date"
    fields:
      - Status
      - Priority
      - Area
      - Target Version
      - Target Date
    filters: ""

  - name: "All Items"
    layout: table
    fields:
      - Status
      - Priority
      - Severity
      - Area
      - Type
      - Environment
      - Release Impact
      - Automation Source
      - Merge Policy
      - Story Points
      - Target Version
      - Target Date
    filters: ""

# ----------------------------------------------------------
# Default Item Values
# ----------------------------------------------------------
defaults:
  issue:
    Status: "Backlog"
    Priority: "Medium"
    Severity: "None"
    Type: "Chore"
    Area: "Repo Management"
    Environment: "None"
    Release Impact: "No Release"
    Automation Source: "Human"
    Merge Policy: "Manual"

  pull_request:
    Status: "Review"
    Priority: "Medium"
    Severity: "None"
    Type: "Chore"
    Area: "Repo Management"
    Environment: "None"
    Release Impact: "No Release"
    Automation Source: "Human"
    Merge Policy: "Manual"

  draft_pull_request:
    Status: "In Progress"
    Priority: "Medium"
    Severity: "None"
    Type: "Chore"
    Area: "Repo Management"
    Environment: "None"
    Release Impact: "No Release"
    Automation Source: "Human"
    Merge Policy: "Manual"

# ----------------------------------------------------------
# Automation Rules
# ----------------------------------------------------------
automation_rules:
  - name: "Mark closed issues as done"
    when:
      item_type: issue
      state: closed
    set:
      Status: "Done"

  - name: "Mark merged pull requests as done"
    when:
      item_type: pull_request
      merged: true
    set:
      Status: "Done"

  - name: "Mark open pull requests as review"
    when:
      item_type: pull_request
      state: open
      draft: false
    set:
      Status: "Review"

  - name: "Mark draft pull requests as in progress"
    when:
      item_type: pull_request
      state: open
      draft: true
    set:
      Status: "In Progress"

  - name: "Block do-not-merge items"
    when:
      labels:
        - do-not-merge
    set:
      Status: "Blocked"
      Merge Policy: "Do Not Merge"

  - name: "Block security-blocked items"
    when:
      labels:
        - blocked-by-security
    set:
      Status: "Blocked"
      Merge Policy: "Do Not Merge"
      Severity: "Critical"

  - name: "Mark dependency auto-merge candidates"
    when:
      labels:
        - dependencies
        - auto-merge
        - no-release
    set:
      Automation Source: "Renovate"
      Merge Policy: "Auto Merge Eligible"
      Release Impact: "No Release"

  - name: "Mark OpenAI-created work for review"
    when:
      labels:
        - automation:openai
    set:
      Automation Source: "OpenAI"
      Merge Policy: "Needs Maintainer Review"
      Status: "Review"
