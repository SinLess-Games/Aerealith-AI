# .github/projects/kanban-board.yaml
# ==========================================================
# Aerealith AI GitHub Project Configuration
# GitHub Projects v2 Kanban / Roadmap Source of Truth
# ==========================================================
# Purpose:
#   Declarative configuration consumed by repository automation scripts.
#
# Used by:
#   - .github/workflows/repo-management.yaml
#   - .github/scripts/repo/sync-projects.js
#   - .github/scripts/repo/assign-milestones.js
#   - .github/scripts/repo/link-issues-prs.js
#
# Notes:
#   - GitHub Projects v2 does not natively read this file.
#   - This file is for your repo-management automation.
#   - Keep field names aligned with repo-management scripts.
#   - Keep label mappings aligned with .github/labels.yaml.
# ==========================================================

project:
  name: "Aerealith AI Task Board"
  description: "Central Kanban board for tracking Aerealith AI development across frontend, services, connectors, engines, integrations, Cloudflare, CI/CD, security, releases, publishing, AI automation, and future self-hosted deployment."
  owner: "SinLess-Games"
  repository: "Aerealith-AI"
  public: true

# ----------------------------------------------------------
# Project Behavior
# ----------------------------------------------------------
behavior:
  auto_add:
    enabled: true
    issues: true
    pull_requests: true

  archive:
    enabled: true
    completed_after_days: 30

  automation:
    dry_run_supported: true
    allow_project_creation: true
    allow_field_creation: true
    allow_view_creation: true
    allow_item_updates: true
    allow_item_archival: true

  safety:
    do_not_delete_project: true
    do_not_delete_fields: true
    do_not_delete_views: true
    do_not_remove_items: true

# ----------------------------------------------------------
# Fields
# ----------------------------------------------------------
fields:
  - type: single_select
    name: Status
    description: "Current workflow state."
    options:
      - { name: "Backlog", color: "GRAY" }
      - { name: "Todo", color: "GRAY" }
      - { name: "Ready", color: "GREEN" }
      - { name: "In Progress", color: "BLUE" }
      - { name: "Review", color: "PURPLE" }
      - { name: "Blocked", color: "RED" }
      - { name: "Done", color: "GREEN" }

  - type: single_select
    name: Priority
    description: "Work priority."
    options:
      - { name: "Critical", color: "RED" }
      - { name: "High", color: "ORANGE" }
      - { name: "Medium", color: "YELLOW" }
      - { name: "Low", color: "GRAY" }

  - type: single_select
    name: Severity
    description: "Security, bug, or operational severity."
    options:
      - { name: "Critical", color: "RED" }
      - { name: "High", color: "ORANGE" }
      - { name: "Medium", color: "YELLOW" }
      - { name: "Low", color: "GRAY" }
      - { name: "None", color: "GRAY" }

  - type: single_select
    name: Type
    description: "Primary work type."
    options:
      - { name: "Bug", color: "RED" }
      - { name: "Feature", color: "GREEN" }
      - { name: "Chore", color: "GRAY" }
      - { name: "Maintenance", color: "GRAY" }
      - { name: "Refactor", color: "PURPLE" }
      - { name: "Security", color: "RED" }
      - { name: "Documentation", color: "BLUE" }
      - { name: "Test", color: "BLUE" }
      - { name: "CI/CD", color: "GREEN" }
      - { name: "Deployment", color: "BLUE" }
      - { name: "Release", color: "ORANGE" }

  - type: single_select
    name: Area
    description: "Primary repository area."
    options:
      - { name: "Frontend", color: "BLUE" }
      - { name: "Connectors", color: "BLUE" }
      - { name: "E2E", color: "BLUE" }
      - { name: "Engines", color: "PURPLE" }
      - { name: "Integrations", color: "BLUE" }
      - { name: "Services", color: "BLUE" }
      - { name: "Libraries", color: "PURPLE" }
      - { name: "UI", color: "PURPLE" }
      - { name: "Config", color: "GRAY" }
      - { name: "Database", color: "YELLOW" }
      - { name: "Security", color: "RED" }
      - { name: "Dependencies", color: "BLUE" }
      - { name: "GitHub Actions", color: "GRAY" }
      - { name: "Repo Management", color: "PURPLE" }
      - { name: "CI/CD", color: "GREEN" }
      - { name: "Cloudflare", color: "ORANGE" }
      - { name: "Docker", color: "BLUE" }
      - { name: "GHCR", color: "GRAY" }
      - { name: "NPM", color: "RED" }
      - { name: "Artifacts", color: "PURPLE" }
      - { name: "Cache", color: "GRAY" }
      - { name: "Observability", color: "YELLOW" }
      - { name: "AI Automation", color: "PURPLE" }
      - { name: "Self Hosted", color: "BLUE" }
      - { name: "Helm", color: "BLUE" }
      - { name: "Kubernetes", color: "BLUE" }
      - { name: "Documentation", color: "BLUE" }

  - type: single_select
    name: Environment
    description: "Deployment or validation environment."
    options:
      - { name: "None", color: "GRAY" }
      - { name: "Preview", color: "BLUE" }
      - { name: "Staging", color: "YELLOW" }
      - { name: "Production", color: "RED" }
      - { name: "Self Hosted", color: "PURPLE" }

  - type: single_select
    name: Release Impact
    description: "How this item affects release automation."
    options:
      - { name: "No Release", color: "GRAY" }
      - { name: "Patch", color: "YELLOW" }
      - { name: "Minor", color: "ORANGE" }
      - { name: "Major", color: "RED" }
      - { name: "Blocked", color: "RED" }

  - type: single_select
    name: Automation Source
    description: "Automation system responsible for the item."
    options:
      - { name: "Human", color: "GRAY" }
      - { name: "GitHub Actions", color: "GRAY" }
      - { name: "Renovate", color: "BLUE" }
      - { name: "Dependabot", color: "BLUE" }
      - { name: "Mend", color: "BLUE" }
      - { name: "OpenAI", color: "PURPLE" }

  - type: single_select
    name: Merge Policy
    description: "Merge behavior hint for automation."
    options:
      - { name: "Manual", color: "GRAY" }
      - { name: "Auto Merge Eligible", color: "GREEN" }
      - { name: "Needs Maintainer Review", color: "YELLOW" }
      - { name: "Needs Security Review", color: "ORANGE" }
      - { name: "Do Not Merge", color: "RED" }

  - type: number
    name: "Story Points"
    description: "Estimated complexity or effort."

  - type: text
    name: "Target Version"
    description: "Target version such as V0.5.0 or V1.0.0."

  - type: date
    name: "Target Date"
    description: "Expected completion, release, or review date."

