      Area: "Integrations"

    area:services:
      Area: "Services"

    area:libs:
      Area: "Libraries"

    area:ui:
      Area: "UI"

    area:config:
      Area: "Config"

    area:db:
      Area: "Database"

    area:security:
      Area: "Security"

    area:dependencies:
      Area: "Dependencies"

    area:github-actions:
      Area: "GitHub Actions"

    area:repo-management:
      Area: "Repo Management"

    area:ci:
      Area: "CI/CD"

    area:cloudflare:
      Area: "Cloudflare"

    area:docker:
      Area: "Docker"

    area:ghcr:
      Area: "GHCR"

    area:npm:
      Area: "NPM"

    area:artifacts:
      Area: "Artifacts"

