# .github/milestones.yaml
# ==========================================================
# 🧭 Helix AI Milestones Configuration
# Managed by sync-milestones workflow
# ==========================================================
# Each milestone entry:
# - title: Required unique milestone name
# - description: Markdown-supported summary
# - state: open | closed
# ==========================================================

# ----------------------------------------------------------
# 🚀 Release Train
# ----------------------------------------------------------
- title: 🧬 v0.1.0 — MVP
  description: |
    The **Minimum Viable Product** milestone for Helix AI.
    - Core architecture using Next.js, Cloudflare Workers, and Nx
    - Authentication foundation
    - Discord bot base with command framework
    - Continuous Integration and automated testing setup
    - Initial API routes for AI inference
  state: open

- title: ⚙️ v0.2.0 — Beta
  description: |
    Beta release introducing Helix's assistant and modular Discord bot integrations.
    - DynoBot / ProBot feature parity
    - Ticket system and moderation tools
    - Observability stack with Grafana, Loki, Prometheus, and OpenTelemetry
    - Persistent memory system and RBAC layer
    - Early access onboarding
  state: open

- title: 🧩 v0.3.0 — Core Expansion
  description: |
    Feature expansion and deeper integration milestone.
    - Advanced plugin runtime
    - Hybrid inference routing
    - RBAC/ABAC hybrid with tenant awareness
    - GitHub and Discord OAuth linking
    - Enhanced monitoring and audit logging
  state: open

- title: 💸 v0.4.0 — Marketplace & Billing
  description: |
    Launch of Helix Marketplace and subscription system.
    - Stripe and PayPal integration for tiers and entitlements
    - Plugin publishing flow and sandboxing
    - Per-tenant billing and usage metrics
    - CI/CD enhancements and versioning system
  state: open

- title: 📊 v0.5.0 — Analytics & Memory
  description: |
    Empowering users with insight and continuity.
    - Grafana dashboards with per-user analytics
    - Long-term memory management and pruning
    - Event-based triggers for automations
    - Improved vector search and embedding control
  state: open

- title: 🧠 v0.6.0 — Hybrid Intelligence
  description: |
    Transition into distributed AI orchestration.
    - Multi-agent cognition model
    - Node federation with vector memory syncing
    - Air-gapped deployment support
    - Advanced audit logging with signed append-only logs
  state: open

- title: 🧪 v0.9.0 — Release Candidate
  description: |
    Final release stabilization and performance optimization.
    - Load and stress testing
    - CI pipeline hardening
    - UI/UX polish and accessibility improvements
    - Documentation and deployment templates
  state: open

- title: 🌐 v1.0.0 — General Availability
  description: |
    Official **Helix AI 1.0 GA release**.
    - Public API documentation and SDKs
    - Enterprise onboarding and SSO
    - SLA metrics and uptime guarantees
    - Security review and final compliance pass
  state: open

