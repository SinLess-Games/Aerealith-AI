    - Validate migrations and bindings before deployment
    - Run post-deployment smoke tests
    - Preserve staging deployment logs
    - Use staging as release verification before production
  state: open

- title: "Cloudflare — Production Environment"
  description: |
    Production deployment milestone.

    - Deploy production only from release tags
    - Require GitHub Environment approval
    - Validate release artifacts before deployment
    - Run production smoke checks
    - Support rollback procedures
    - Preserve production deployment evidence
  state: open

