# .github/milestones.yaml
# ==========================================================
# Aerealith AI Milestones Configuration
# Managed by sync-milestones workflow
# ==========================================================
# Each milestone entry:
# - title: Required unique milestone name
# - description: Markdown-supported summary
# - state: open | closed
# ==========================================================

# ----------------------------------------------------------
# Release Train
# ----------------------------------------------------------
- title: "V0.1.0 — Foundation"
  description: |
    Initial foundation milestone for Aerealith AI.

    - Establish the Nx and pnpm monorepo workflow baseline
    - Stabilize the frontend, libraries, services, connectors, integrations, and engines structure
    - Build the initial GitHub Actions CI workflow
    - Add strict linting, formatting, typechecking, testing, and build validation
    - Prepare baseline Cloudflare deployment support
    - Establish repository management source-of-truth files
  state: open

- title: "V0.2.0 — Automation Core"
  description: |
    Core automation milestone for repository and workflow management.

    - Sync labels, milestones, assignees, reviewers, and project metadata
    - Enforce branch naming rules
    - Link issues and pull requests automatically
    - Assign issues and pull requests to milestones
    - Add dry-run support to all automation scripts
    - Add workflow-safe logging and structured summaries
  state: open

- title: "V0.3.0 — CI/CD Expansion"
  description: |
    Expansion milestone for full CI/CD coverage across the monorepo.

    - Detect affected Nx projects
    - Detect Jest, Cypress, Playwright, and e2e test targets
    - Run Nx targets in the correct validation order
    - Detect Dockerfiles and validate container builds
    - Generate build artifacts, checksums, and artifact manifests
    - Add readable cache keys for pnpm, Nx, Docker, Cypress, and Playwright
  state: open

- title: "V0.4.0 — Security Automation"
  description: |
    Strict automated security milestone for pull requests and main branch checks.

    - Add CodeQL scanning
    - Add SonarQube Cloud quality gates
    - Add dependency review and vulnerability policy gates
    - Add container scanning for Docker builds
    - Add secret scanning-compatible workflow checks
    - Create security issues from actionable findings
    - Assign security labels, assignees, and milestones automatically
  state: open

- title: "V0.5.0 — Release Automation"
  description: |
    Release automation milestone for controlled main-branch releases.

    - Release only from merged pull requests on main
    - Require release labels: release:major, release:minor, or release:patch
    - Block dependency-only and no-release pull requests from creating releases
    - Generate V-prefixed release tags such as V1.2.3
    - Generate changelogs from merged pull requests
    - Create GitHub Releases
    - Post release announcements to the Announcements discussion category
  state: open

- title: "V0.6.0 — Publishing Pipeline"
  description: |
    Publishing milestone for npm packages, GHCR containers, and release assets.

    - Publish npm packages only when package.json has private set to false
    - Build and publish every detected Dockerfile to GHCR
    - Use image tags for release channels such as alpha, beta, test, and release
    - Generate SHA256SUMS and SHA512SUMS
    - Generate artifact-manifest.json
    - Generate SBOM files in SPDX JSON format
    - Generate attestations only on release and publish jobs
  state: open

- title: "V0.7.0 — Cloudflare Platform"
  description: |
    Cloudflare deployment milestone for hosted Aerealith AI environments.

    - Deploy preview environments from pull requests
    - Deploy staging automatically from main
    - Deploy production from release tags with approval
    - Support Cloudflare Workers
    - Support Cloudflare Queues
    - Support Cloudflare R2
    - Support Cloudflare D1
    - Support Cloudflare KV
    - Support Cloudflare Secrets Store
    - Validate Wrangler deployment workflows
  state: open

- title: "V0.8.0 — AI Repository Assistant"
  description: |
    OpenAI-powered repository assistant milestone.

    - Generate changelog drafts from merged pull requests
    - Create issues from pull requests when no related issue exists
    - Link pull requests to existing issues when a strong match exists
    - Create pull requests from approved automation issues
    - Draft security triage summaries
    - Draft release announcements
    - Ensure AI automation never pushes directly to main
  state: open

- title: "V0.9.0 — Release Candidate"
  description: |
    Release candidate milestone for stabilization and final hardening.

    - Complete strict CI and security gate validation
    - Harden release and publishing workflows
    - Validate rollback procedures
    - Validate cache cleanup and artifact retention
    - Complete documentation for contributors and maintainers
    - Confirm production deployment approval flow
    - Run full release rehearsal before general availability
  state: open

- title: "V1.0.0 — General Availability"
  description: |
    General availability milestone for the first stable Aerealith AI release.

    - Production-ready hosted deployment
    - Stable npm package publishing
    - Stable GHCR container publishing
    - Documented release process
    - Documented security process
    - Documented deployment process
    - Verified changelog and announcement automation
    - Final compliance and operational readiness review
  state: open

# ----------------------------------------------------------
# Repository Management
# ----------------------------------------------------------
- title: "Repo Management — Labels"
  description: |
    Source-of-truth label management milestone.

    - Sync labels from .github/labels.yaml
    - Create missing labels
    - Update changed labels
    - Delete unmanaged labels
    - Keep release, dependency, security, automation, area, priority, and status labels consistent
  state: open

- title: "Repo Management — Milestones"
  description: |
    Source-of-truth milestone management milestone.

    - Sync milestones from .github/milestones.yaml
    - Create missing milestones
    - Update milestone descriptions and states
    - Avoid destructive milestone deletion
    - Keep release, security, dependency, and operations milestones consistent
  state: open

- title: "Repo Management — Issues & Pull Requests"
  description: |
    Automated issue and pull request management milestone.

    - Assign labels based on changed paths and issue content
    - Assign reviewers from CODEOWNERS and reviewer rules
    - Assign assignees from repository rules
    - Associate pull requests with issues
    - Associate issues with pull requests
    - Assign pull requests and issues to milestones
    - Enforce pull request readiness rules before merge
  state: open

- title: "Repo Management — Branch Policy"
  description: |
    Branch policy enforcement milestone.

    - Enforce feature branch naming rules
    - Allow trusted automation branch patterns
    - Require pull requests into main
    - Prevent direct changes to main outside approved automation
    - Support feature, fix, chore, docs, refactor, test, security, release, renovate, dependabot, mend, and openai branch patterns
  state: open

# ----------------------------------------------------------
# CI/CD
# ----------------------------------------------------------
- title: "CI/CD — Pull Request Validation"
  description: |
    Pull request validation milestone.

    - Install dependencies with pnpm 10.23.0
    - Use Node.js 24.15.0
    - Restore pnpm and Nx caches
    - Run Nx formatting checks
    - Run Nx lint targets
    - Run Nx typecheck targets
    - Run detected test targets
    - Run affected builds
    - Validate Docker builds without publishing
    - Upload artifacts and workflow summaries
  state: open

- title: "CI/CD — Main Branch Verification"
  description: |
    Main branch verification milestone.

    - Re-run full validation after merge to main
    - Run strict security checks against main
    - Build production-ready artifacts
    - Generate artifact hashes
    - Generate artifact manifests
    - Preserve main build artifacts for configured retention windows
    - Prevent dependency automation from triggering releases
  state: open

- title: "CI/CD — Cache Management"
  description: |
    Cache management milestone for faster and cleaner workflows.

    - Use human-readable cache names
    - Cache pnpm store data
    - Cache Nx computation data
    - Cache Docker BuildKit layers
    - Cache Cypress binaries when present
    - Cache Playwright browsers when present
    - Run scheduled weekly cache cleanup
    - Summarize cache usage and cleanup actions
  state: open

- title: "CI/CD — Artifacts & Hashes"
  description: |
    Build artifact and checksum milestone.

    - Collect build outputs from affected projects
    - Generate SHA256SUMS
    - Generate SHA512SUMS
    - Generate artifact-manifest.json
    - Generate SBOM SPDX JSON files
    - Upload pull request artifacts for short retention
    - Upload main branch artifacts for medium retention
    - Upload release artifacts for long retention
  state: open

# ----------------------------------------------------------
# Security & Compliance
# ----------------------------------------------------------
- title: "Security — Strict Pull Request Gate"
  description: |
    Strict security gate milestone for pull requests.

    - Block critical vulnerabilities
    - Block high vulnerabilities
    - Block failed CodeQL checks
    - Block failed SonarQube Cloud quality gates
    - Block dependency review failures
    - Block secret findings
    - Block disallowed license findings
    - Require all tests, linting, formatting, and builds to pass before merge
  state: open

- title: "Security — Main Branch Monitoring"
  description: |
    Scheduled security monitoring milestone for main.

    - Regularly scan main for vulnerabilities
    - Review dependency and supply-chain alerts
    - Review container vulnerabilities
    - Review CodeQL findings
    - Review SonarQube Cloud findings
    - Create actionable security issues automatically
    - Assign security findings to the correct milestone and labels
  state: open

- title: "Security — Dependency Vulnerability Response"
  description: |
    Dependency vulnerability remediation milestone.

    - Process Renovate, Mend, and Dependabot security updates
    - Automatically merge passing security patch pull requests
    - Apply security:dependency and no-release labels
    - Prevent vulnerability remediation PRs from creating releases
    - Track unresolved high-priority dependency findings
  state: open

- title: "Security — Supply Chain Integrity"
  description: |
    Supply-chain security milestone for releases and published artifacts.

    - Generate SBOM SPDX JSON files
    - Generate artifact checksums
    - Generate attestations only on release and publish jobs
    - Validate npm publishing provenance where supported
    - Validate GHCR container publishing provenance
    - Preserve release evidence for audit review
  state: open

# ----------------------------------------------------------
# Dependency Automation
# ----------------------------------------------------------
- title: "Dependencies — Renovate Weekly Updates"
  description: |
    Weekly dependency automation milestone.

    - Group safe dependency updates by ecosystem
    - Label Renovate pull requests as dependencies and no-release
    - Automerge safe patch and minor updates when checks pass
    - Keep pnpm lockfiles current
    - Avoid release creation from dependency-only pull requests
  state: open

- title: "Dependencies — Major Upgrade Program"
  description: |
    Manual review milestone for major dependency upgrades.

    - Review major updates through the dependency dashboard
    - Require manual approval for breaking changes
    - Validate framework, Nx, Cloudflare, database, and test tooling migrations
    - Track migration notes and rollback plans
    - Merge only after strict CI and security checks pass
  state: open

- title: "Dependencies — Mend Management"
  description: |
    Mend dependency and security management milestone.

    - Coordinate Mend findings with Renovate and Dependabot
    - Track remediation work through security issues
    - Prioritize vulnerable dependency updates
    - Ensure dependency PRs are excluded from release automation
    - Maintain security reporting visibility
  state: open

