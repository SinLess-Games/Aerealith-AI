- title: 📦 Renovate — Monthly Rollup
  description: |
    Consolidated review and merge of outstanding dependency PRs.
    - Combine deferred updates into controlled review batches
    - Manual validation of lockfile and changelogs
    - Re-run integration tests before merge
  state: open

- title: 🚀 Renovate — Major Upgrade Program
  description: |
    Managed major version upgrades.
    - Framework migrations
