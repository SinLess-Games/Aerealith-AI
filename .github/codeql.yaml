# .github/codeql.yaml
# =============================================================================
# Aerealith AI CodeQL Configuration
# -----------------------------------------------------------------------------
# Used by:
#   - .github/workflows/codeql.yaml
#   - .github/workflows/security.yaml
#
# Purpose:
#   Configure GitHub CodeQL advanced setup for the Aerealith AI Nx monorepo.
#
# Notes:
#   - Workflow triggers belong in .github/workflows/codeql.yaml.
#   - This file controls query suites, analyzed paths, ignored paths, and filters.
#   - JavaScript and TypeScript are analyzed through CodeQL's javascript-typescript
#     language in the workflow.
#   - Keep this strict enough for security gates, but avoid noisy generated,
#     vendored, build, cache, and test-output paths.
# =============================================================================

name: "Aerealith AI CodeQL Config"

# Keep GitHub's default security queries enabled.
disable-default-queries: false

# Add stronger query coverage on top of the default security suite.
queries:
  - uses: security-extended
  - uses: security-and-quality

# Analyze real source, automation, and tooling code.
paths:
  - "apps"
  - "libs"
  - "tools"
  - "scripts"
  - ".github/actions"
  - ".github/scripts"

# Exclude generated, vendored, build, cache, docs, public assets, and test outputs.
paths-ignore:
  # Dependency/vendor folders
  - "**/node_modules/**"
  - "**/.pnpm/**"

  # Framework/build outputs
  - "**/.next/**"
  - "**/.open-next/**"
  - "**/.wrangler/**"
  - "**/dist/**"
  - "**/out/**"
  - "**/build/**"
  - "**/.output/**"
  - "**/.vercel/**"

  # Test and coverage outputs
  - "**/coverage/**"
  - "**/.nyc_output/**"
  - "**/test-results/**"
  - "**/playwright-report/**"
  - "**/cypress/videos/**"
  - "**/cypress/screenshots/**"

  # Caches and temporary files
  - "**/.cache/**"
  - "**/.nx/**"
  - "**/.turbo/**"
  - "**/tmp/**"
  - "**/temp/**"

  # Generated files
  - "**/*.generated.*"
  - "**/*.gen.*"
  - "**/*.d.ts"
  - "**/generated/**"
  - "**/.generated/**"

  # Test source files
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.cy.ts"
  - "**/*.cy.tsx"
  - "**/*.e2e.ts"
  - "**/*.e2e.tsx"
  - "**/__tests__/**"
  - "**/__mocks__/**"

  # Documentation and static design/public assets
  - "docs/**"
  - "Docs/**"
  - "design-assets/**"
  - "apps/frontend/public/**"

  # Workflow YAML is handled by workflow/security tooling, not JS/TS CodeQL.
  - ".github/workflows/**"

# Exclude only specific noisy low-value JavaScript/TypeScript quality queries.
# Security-relevant findings should remain enabled.
query-filters:
  - exclude:
      id: js/useless-assignment-to-local

  - exclude:
      id: js/redundant-assignment

# Use the standard JavaScript/TypeScript query pack.
packs:
  javascript:
    - codeql/javascript-queries
