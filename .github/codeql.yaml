# .github/codeql.yaml
# =============================================================================
# Helix AI CodeQL Config
# -----------------------------------------------------------------------------
# Used by:
#   - .github/workflows/codeQL.yaml
#
# Purpose:
#   Configure GitHub CodeQL advanced setup for the Helix AI Nx monorepo.
#
# Notes:
#   - Keep workflow triggers in .github/workflows/codeQL.yaml.
#   - Keep analyzed source paths here.
#   - JavaScript and TypeScript are both analyzed through CodeQL's
#     javascript-typescript language.
# =============================================================================

name: "Helix AI CodeQL Config"

# Keep GitHub's default security queries enabled.
# This file adds security-and-quality on top of the default suite.
disable-default-queries: false

# Run the built-in security-and-quality query suite.
queries:
  - uses: security-and-quality

# Limit CodeQL analysis to real source/config areas in this monorepo.
paths:
  - "apps"
  - "libs"
  - "tools"
  - "scripts"
  - ".github/actions"
  - ".github/scripts"

# Exclude generated, vendored, build, cache, docs, and test artifact paths.
paths-ignore:
  - "**/node_modules/**"
  - "**/.next/**"
  - "**/.open-next/**"
  - "**/.wrangler/**"
  - "**/dist/**"
  - "**/out/**"
  - "**/build/**"
  - "**/coverage/**"
  - "**/.cache/**"
  - "**/.nx/**"
  - "**/tmp/**"
  - "**/*.generated.*"
  - "**/*.gen.*"
  - "**/*.d.ts"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/__tests__/**"
  - "**/__mocks__/**"
  - "docs/**"
  - "Docs/**"
  - "design-assets/**"
  - "apps/frontend/public/**"
  - ".github/workflows/**"

# Exclude noisy low-value queries.
query-filters:
  - exclude:
      id: js/useless-assignment-to-local

  - exclude:
      id: js/redundant-assignment

  - exclude:
      problem.severity:
        - recommendation

# Use the standard JavaScript/TypeScript query pack.
# The nested map format is valid for custom config files.
packs:
  javascript:
    - codeql/javascript-queries