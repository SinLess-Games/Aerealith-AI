# .github/labels.yaml
# ==========================================================
# Aerealith AI GitHub Labels Configuration
# Managed by repo-management / sync-labels workflow
# ==========================================================
# Each label entry:
# - name: Visible label name
# - color: Hex color code without "#"
# - description: Short explanation
# ==========================================================

# ----------------------------------------------------------
# Kind Labels
# ----------------------------------------------------------
- name: kind:bug
  color: D73A4A
  description: Something is broken or not working as intended

- name: kind:feature
  color: 0E8A16
  description: New feature, capability, or enhancement

- name: kind:chore
  color: C5DEF5
  description: Maintenance, cleanup, tooling, dependency, or routine work

- name: kind:maintenance
  color: C5DEF5
  description: Repository, workflow, dependency, or operational maintenance

- name: kind:refactor
  color: 5319E7
  description: Code restructuring without intended behavior change

- name: kind:security
  color: B60205
  description: Security vulnerability, hardening, policy, or patch work

- name: kind:documentation
  color: 0075CA
  description: Documentation, README, ADR, MkDocs, or guide change

- name: kind:test
  color: 1D76DB
  description: Unit, integration, e2e, fixture, Cypress, Playwright, Jest, or test config work

- name: kind:release
  color: FF8C00
  description: Release, changelog, versioning, publishing, or packaging work

- name: kind:deployment
  color: 0052CC
  description: Deployment, hosting, rollout, preview, staging, or production delivery work

- name: kind:ci
  color: 2CBE4E
  description: CI/CD, validation, workflow, cache, artifact, or automation pipeline work

# ----------------------------------------------------------
# Status Labels
# ----------------------------------------------------------
- name: status:triage
  color: D4C5F9
  description: Needs initial review, classification, labels, or routing

- name: status:backlog
  color: D4C5F9
  description: Accepted or planned for future work

- name: status:ready
  color: 0E8A16
  description: Ready for development, review, automation, or merge

- name: status:in-progress
  color: FBCA04
  description: Work is actively in progress

- name: status:needs-info
  color: FEF2C0
  description: More information is required before work can proceed

- name: status:needs-review
  color: FBCA04
  description: Requires maintainer, code, security, or architecture review

- name: status:changes-requested
  color: D93F0B
  description: Changes were requested before this can proceed

- name: status:blocked
  color: 5319E7
  description: Blocked by dependency, decision, secret, approval, or prerequisite

- name: status:ready-to-merge
  color: 0E8A16
  description: All required checks and approvals are complete

- name: status:merged
  color: C2E0C6
  description: Work has been merged or completed

# ----------------------------------------------------------
# Priority Labels
# ----------------------------------------------------------
- name: priority:critical
  color: B60205
  description: Production-impacting, security-critical, or must fix immediately

- name: priority:high
  color: D93F0B
  description: Important and should be addressed soon

- name: priority:medium
  color: FBCA04
  description: Normal priority item

- name: priority:low
  color: C2E0C6
  description: Low urgency, polish, cleanup, or nice-to-have

# ----------------------------------------------------------
# Severity Labels
# ----------------------------------------------------------
- name: severity:critical
  color: B60205
  description: Critical impact requiring immediate mitigation

- name: severity:high
  color: D93F0B
  description: High-impact issue with significant risk or disruption

- name: severity:medium
  color: FBCA04
  description: Moderate impact issue with manageable risk

- name: severity:low
  color: C2E0C6
  description: Low-impact issue with limited risk

