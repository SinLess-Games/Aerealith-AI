# .github/labels.yaml
# ==========================================================
# GitHub Labels Configuration
# Managed by .github/workflows/sync-labels.yaml
# ==========================================================
# Each label entry:
# - name: Visible label name
# - color: Hex color code without "#"
# - description: Short explanation
# ==========================================================

# -----------------------------
# 🧩 Kind Labels
# -----------------------------
- name: kind:bug
  color: D73A4A
  description: Something is broken or not working as intended

- name: kind:feature
  color: 0E8A16
  description: New feature, capability, or enhancement

- name: kind:chore
  color: C5DEF5
  description: Maintenance, cleanup, tooling, or routine work

- name: kind:refactor
  color: 5319E7
  description: Code restructuring without intended behavior change

- name: kind:security
  color: B60205
  description: Security vulnerability, hardening, policy, or patch

- name: kind:documentation
  color: 0075CA
  description: Documentation, README, ADR, or MkDocs change

- name: kind:test
  color: 1D76DB
  description: Unit, integration, E2E, fixture, or test config work

- name: kind:release
  color: FF8C00
  description: Release, changelog, versioning, publishing, or packaging work

# -----------------------------
# 🚦 Status Labels
# -----------------------------
- name: status:backlog
  color: D4C5F9
  description: Planned or accepted for future work

- name: status:ready
  color: 0E8A16
  description: Ready for development, review, or merge

- name: status:in-progress
  color: FBCA04
  description: Work is actively in progress

- name: status:needs-info
  color: FEF2C0
  description: More information is required before work can proceed

- name: status:blocked
  color: 5319E7
  description: Blocked by dependency, decision, secret, or prerequisite

# -----------------------------
# ⚡ Priority Labels
# -----------------------------
- name: priority:critical
  color: B60205
  description: Production-impacting, security-critical, or must fix immediately

- name: priority:high
  color: D93F0B
  description: Important and should be addressed soon

- name: priority:medium
  color: FBCA04
  description: Normal priority item

- name: priority:low
  color: C2E0C6
  description: Low urgency, polish, cleanup, or nice-to-have

# -----------------------------
# 🚨 Severity Labels
# -----------------------------
- name: severity:critical
  color: B60205
  description: Critical impact requiring immediate mitigation

- name: severity:high
  color: D93F0B
  description: High-impact issue with significant risk or disruption

- name: severity:medium
  color: FBCA04
  description: Moderate impact issue with manageable risk

- name: severity:low
  color: C2E0C6
  description: Low-impact issue with limited risk

