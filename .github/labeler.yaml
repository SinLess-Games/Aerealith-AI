# .github/labeler.yaml
---
# =============================================================================
# Aerealith AI Labeler Configuration
# -----------------------------------------------------------------------------
# Used by:
#   - .github/workflows/repo-management.yaml
#   - .github/workflows/branch-policy.yaml
#   - any pull-request labeler workflow using actions/labeler
#
# Purpose:
#   Apply path-based and branch-based labels to pull requests.
#
# Notes:
#   - This file is intentionally changed-file and branch-name based.
#   - Intelligent issue/PR labeling, milestone assignment, reviewer assignment,
#     issue/PR linking, OpenAI triage, and release decisions are handled by
#     repository automation scripts under .github/scripts.
#   - Keep labels aligned with .github/labels.yaml.
#   - Do not auto-apply release:major, release:minor, or release:patch here.
# =============================================================================

# -----------------------------------------------------------------------------
