# .github/dependabot.yaml
# =============================================================================
# Aerealith AI Dependabot Configuration
# -----------------------------------------------------------------------------
# Purpose:
#   Use Dependabot for GitHub Actions updates and npm security updates.
#
# Dependency ownership:
#   - Renovate / Mend Renovate manages normal pnpm/npm dependency version updates.
#   - Dependabot manages npm security update PRs only.
#   - Dependabot manages GitHub Actions version updates.
#
# Release policy:
#   - Dependabot PRs must never trigger a release.
#   - All Dependabot PRs are labeled no-release.
#   - Security dependency PRs are labeled security:dependency.
#   - Auto-merge is handled by dependency-auto-merge workflow after CI/security pass.
#
# Notes:
#   - GitHub officially documents the file as .github/dependabot.yml.
#   - This repo uses .github/dependabot.yaml.
#   - Dependabot ignores labels that do not already exist in the repository.
#   - Keep .github/labels.yaml synced before enabling this.
#   - Reviewers should be handled through CODEOWNERS and repo-management rules.
# =============================================================================

version: 2

updates:
  # ---------------------------------------------------------------------------
  # npm / pnpm security updates only
  # ---------------------------------------------------------------------------
  # Normal npm and pnpm version updates are managed by Renovate.
  # open-pull-requests-limit: 0 disables normal version update PRs while allowing
  # this ecosystem block to customize Dependabot security update PRs.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"

    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "America/Boise"

    open-pull-requests-limit: 0

    assignees:
      - "Sinless777"

    labels:
      - "dependencies"
      - "security:dependency"
      - "kind:security"
      - "area:dependencies"
      - "area:security"
      - "priority:critical"
      - "status:ready"
      - "automation"
      - "automation:dependabot"
      - "auto-merge"
      - "no-release"

    commit-message:
      prefix: "chore(deps-security)"
      prefix-development: "chore(deps-dev-security)"
      include: "scope"

    pull-request-branch-name:
      separator: "-"

    rebase-strategy: "auto"

    groups:
      npm-production-security:
        applies-to: "security-updates"
        patterns:
          - "*"
        dependency-type: "production"
        update-types:
          - "patch"
          - "minor"
          - "major"

      npm-development-security:
        applies-to: "security-updates"
        patterns:
          - "*"
        dependency-type: "development"
        update-types:
          - "patch"
          - "minor"
          - "major"

  # ---------------------------------------------------------------------------
  # GitHub Actions dependency updates
  # ---------------------------------------------------------------------------
  # Dependabot owns GitHub Actions updates.
  # Renovate should not also manage GitHub Actions unless you intentionally want
  # duplicate automation coverage.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "daily"
      time: "06:30"
      timezone: "America/Boise"

    open-pull-requests-limit: 5

    assignees:
      - "Sinless777"

    labels:
      - "dependencies"
      - "actions-update"
      - "kind:chore"
      - "area:github-actions"
      - "area:ci"
      - "automation"
      - "automation:dependabot"
      - "status:ready"
      - "no-release"

    commit-message:
      prefix: "chore(actions)"
      include: "scope"

    pull-request-branch-name:
      separator: "-"

    rebase-strategy: "auto"

    groups:
      github-actions-patch-minor:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

      github-actions-major:
        patterns:
          - "*"
        update-types:
          - "major"
