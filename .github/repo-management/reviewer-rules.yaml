# .github/repo-management/reviewer-rules.yaml
# =============================================================================
# Aerealith AI Reviewer Rules
# -----------------------------------------------------------------------------
# Purpose:
#   Source-of-truth reviewer routing, review requirements, CODEOWNERS alignment,
#   team reviewer support, security review routing, release review routing,
#   dependency review policy, AI automation review policy, and automation safety.
#
# Used by:
#   - .github/CODEOWNERS
#   - .github/assignees.yaml
#   - .github/workflows/repo-management.yaml
#   - .github/workflows/branch-policy.yaml
#   - .github/workflows/dependency-auto-merge.yaml
#   - .github/scripts/repo/assign-reviewers.js
#   - .github/scripts/repo/enforce-pr-rules.js
#   - .github/scripts/repo/assign-labels.js
#   - .github/scripts/repo/assign-milestones.js
#   - .github/scripts/security/run-policy-gate.js
#
# Notes:
#   - User reviewers must be GitHub usernames without "@".
#   - Team reviewers must use "owner/team-slug" format.
#   - GitHub issue assignees cannot be teams, but PR reviewers can be users or teams.
#   - If GitHub rejects a reviewer or team, automation should warn and continue
#     unless the rule is marked required.
#   - Reviewers should not be requested from the PR author.
#   - Bots should not be requested as reviewers.
#   - This file routes review requests. Branch protection remains the final gate.
# =============================================================================

version: 1

repository:
  owner: SinLess-Games
  name: Aerealith-AI
  default_branch: main

# -----------------------------------------------------------------------------
# Global Review Policy
# -----------------------------------------------------------------------------
policy:
  enabled: true
  dry_run_supported: true
  debug_supported: true

  request_reviewers_on_pull_request_opened: true
  request_reviewers_on_pull_request_ready_for_review: true
  request_reviewers_on_pull_request_synchronize: false
  request_reviewers_on_label_change: true
  request_reviewers_on_milestone_change: false

  remove_reviewers_when_no_longer_matching: false
  rerequest_review_after_changes_requested: true
  rerequest_review_after_security_label_added: true
  rerequest_review_after_release_label_added: true

  skip_draft_pull_requests: true
  review_draft_pull_requests_if_security_related: true
  review_draft_pull_requests_if_release_related: true

  do_not_request_pr_author_as_reviewer: true
  do_not_request_bot_reviewers: true
  do_not_request_duplicate_reviewers: true
  do_not_request_reviewers_on_closed_prs: true
  do_not_request_reviewers_on_merged_prs: true

  max_user_reviewers: 5
  max_team_reviewers: 3

  default_review_required: true
  default_review_count: 1

  security_review_required: true
  release_review_required: true
  architecture_review_required: true
  production_review_required: true
  ai_automation_review_required: true

  dependency_patch_review_required: false
  dependency_minor_review_required: false
  dependency_major_review_required: true
  dependency_security_patch_review_required: false

  codeowners_are_authoritative: true
  reviewer_rules_extend_codeowners: true

# -----------------------------------------------------------------------------
# Known Users, Teams, and Bots
# -----------------------------------------------------------------------------
actors:
  maintainers:
    - Sinless777

  security_reviewers:
    - Sinless777

  release_reviewers:
    - Sinless777

  architecture_reviewers:
    - Sinless777

  cloudflare_reviewers:
    - Sinless777

  dependency_reviewers:
    - Sinless777

  ai_reviewers:
    - Sinless777

  documentation_reviewers:
    - Sinless777

  automation_accounts:
    - github-actions[bot]
    - dependabot[bot]
    - renovate[bot]
    - mend[bot]
    - github-copilot[bot]

  optional_team_reviewers:
    platform: []
    security: []
    release: []
    cloudflare: []
    dependencies: []
    ai: []
    docs: []

# -----------------------------------------------------------------------------
# Reviewer Groups
# -----------------------------------------------------------------------------
reviewer_groups:
  default:
    description: Default fallback reviewer group.
    reviewers:
      - Sinless777
    team_reviewers: []
    required: true
    review_count: 1

  maintainers:
    description: Maintainer review group.
    reviewers:
      - Sinless777
    team_reviewers: []
    required: true
    review_count: 1

  security:
    description: Security-sensitive review group.
    reviewers:
      - Sinless777
    team_reviewers: []
    required: true
    review_count: 1
    labels:
      - needs-security-review

  release:
    description: Release and publishing review group.
    reviewers:
      - Sinless777
    team_reviewers: []
    required: true
    review_count: 1
    labels:
      - needs-maintainer-review

  architecture:
    description: Architecture and ADR review group.
    reviewers:
      - Sinless777
    team_reviewers: []
    required: true
    review_count: 1
    labels:
      - needs-architecture-review

  cloudflare:
    description: Cloudflare deployment review group.
    reviewers:
      - Sinless777
    team_reviewers: []
    required: true
    review_count: 1

  dependencies:
    description: Dependency update review group.
    reviewers:
      - Sinless777
    team_reviewers: []
    required: false
    review_count: 1

  ai_automation:
    description: OpenAI automation and AI-generated repository change review group.
    reviewers:
      - Sinless777
    team_reviewers: []
    required: true
    review_count: 1
    labels:
      - automation:needs-review

  documentation:
    description: Documentation review group.
    reviewers:
      - Sinless777
    team_reviewers: []
    required: false
    review_count: 1

# -----------------------------------------------------------------------------
# Default Reviewer Behavior
# -----------------------------------------------------------------------------
defaults:
  pull_request:
    reviewer_group: default
    reviewers:
      - Sinless777
    team_reviewers: []
    review_count: 1
    labels:
      - needs-maintainer-review

  draft_pull_request:
    reviewer_group: default
    reviewers:
      - Sinless777
    team_reviewers: []
    review_count: 1
    request_review: false

  dependency_pull_request:
    reviewer_group: dependencies
    reviewers:
      - Sinless777
    team_reviewers: []
    review_count: 0
    request_review: false
    labels:
      - dependencies
      - no-release

  security_dependency_pull_request:
    reviewer_group: security
    reviewers:
      - Sinless777
    team_reviewers: []
    review_count: 0
    request_review: false
    labels:
      - security:dependency
      - dependencies
      - no-release

  release_pull_request:
    reviewer_group: release
    reviewers:
      - Sinless777
    team_reviewers: []
    review_count: 1
    request_review: true
    labels:
      - needs-maintainer-review

  unknown:
    reviewer_group: default
    reviewers:
      - Sinless777
    team_reviewers: []
    review_count: 1
    request_review: true

