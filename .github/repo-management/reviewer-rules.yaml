  "^release/V[0-9]+\\.[0-9]+\\.[0-9]+$":
    reviewer_group: release
    priority: 100
    required: true

  "^deploy/[0-9]+-[a-z0-9][a-z0-9-]*[a-z0-9]$":
    reviewer_group: cloudflare
    priority: 85
    required: true

  "^deployment/[0-9]+-[a-z0-9][a-z0-9-]*[a-z0-9]$":
    reviewer_group: cloudflare
    priority: 85
    required: true

  "^ai/.+$":
    reviewer_group: ai_automation
    priority: 95
    required: true

  "^openai/.+$":
    reviewer_group: ai_automation
    priority: 95
    required: true

  "^renovate/.+$":
    reviewer_group: dependencies
    priority: 70
    required: false
    request_review: false

  "^dependabot/.+$":
    reviewer_group: dependencies
    priority: 70
    required: false
    request_review: false

  "^mend/.+$":
    reviewer_group: dependencies
    priority: 80
    required: false
    request_review: false

# -----------------------------------------------------------------------------
# Title-Based Reviewer Routing
# -----------------------------------------------------------------------------
title_routing:
  "^\\[Security\\]:":
    reviewer_group: security
    priority: 100
    required: true

  "^\\[Release\\]:":
    reviewer_group: release
    priority: 95
    required: true

  "^\\[Cloudflare\\]:":
    reviewer_group: cloudflare
    priority: 90
    required: true

  "^\\[AI Automation\\]:":
    reviewer_group: ai_automation
    priority: 95
    required: true

  "^\\[Architecture\\]:":
    reviewer_group: architecture
    priority: 95
    required: true

  "^\\[Self-Hosted\\]:":
    reviewer_group: architecture
    priority: 90
    required: true

  "^\\[Docs\\]:":
    reviewer_group: documentation
    priority: 60
    required: false

  "^\\[CI/CD\\]:":
    reviewer_group: maintainers
    priority: 80
    required: true

# -----------------------------------------------------------------------------
# Dependency Review Policy
# -----------------------------------------------------------------------------
dependency_review:
  enabled: true

  authors:
    - renovate[bot]
    - dependabot[bot]
    - mend[bot]

  default:
    request_review: false
    required: false
    labels:
      - dependencies
      - no-release

  patch:
    request_review: false
    required: false
    auto_merge_allowed: true

  minor:
    request_review: false
    required: false
    auto_merge_allowed: true

  major:
    request_review: true
    required: true
    reviewer_group: dependencies
    labels:
      - needs-maintainer-review
      - status:needs-review
    auto_merge_allowed: false

  security_patch:
    request_review: false
    required: false
    reviewer_group: security
    labels:
      - security:dependency
      - auto-merge
      - no-release
    auto_merge_allowed: true

  require_review_if_files_changed:
    - ".github/**"
    - "nx.json"
    - "tsconfig.base.json"
    - "package.json"
    - "pnpm-workspace.yaml"
    - "**/wrangler.toml"
    - "**/wrangler.jsonc"
    - "**/Dockerfile"
    - "**/Dockerfile.*"

  block_auto_merge_if_review_requested: true
  block_auto_merge_if_changes_requested: true

# -----------------------------------------------------------------------------
# Required Review Gates
# -----------------------------------------------------------------------------
review_gates:
  default:
    required_approvals: 1
    dismiss_stale_reviews: true
    require_code_owner_review: true

  security:
    labels:
      - kind:security
      - area:security
      - needs-security-review
      - blocked-by-security
      - area:secrets
    required_approvals: 1
    require_security_review: true
    dismiss_stale_reviews: true

  release:
    labels:
      - release
      - kind:release
      - release:major
      - release:minor
      - release:patch
      - publishing
    required_approvals: 1
    require_release_review: true
    dismiss_stale_reviews: true

  production:
    labels:
      - production
    required_approvals: 1
    require_environment_approval: true
    require_cloudflare_review: true
    dismiss_stale_reviews: true

  architecture:
    labels:
      - needs-architecture-review
      - breaking-change
      - area:self-hosted
      - area:helm
      - area:kubernetes
    required_approvals: 1
    require_architecture_review: true
    dismiss_stale_reviews: true

  ai_automation:
    labels:
      - automation:openai
      - area:ai
      - area:openai
      - automation:needs-review
    required_approvals: 1
    require_ai_review: true
    dismiss_stale_reviews: true

# -----------------------------------------------------------------------------
# Review Request Conflict Resolution
# -----------------------------------------------------------------------------
conflict_resolution:
  enabled: true

  strategy: highest_priority_then_union

  # Highest-priority rule controls required status and review gate.
  # Reviewer lists are merged up to max_user_reviewers / max_team_reviewers.
  merge_reviewers_from_matching_rules: true
  merge_team_reviewers_from_matching_rules: true

  tie_breaker_order:
    - blocked_security
    - security
    - release
    - production
    - architecture
    - ai_automation
    - exact_path
    - label
    - branch
    - title
    - default

  protected_review_groups:
    - security
    - release
    - architecture
    - ai_automation
    - cloudflare

  never_downgrade_required_review: true
  never_remove_security_review: true
  never_remove_release_review: true
  never_remove_architecture_review: true

# -----------------------------------------------------------------------------
# Status Label Handling
# -----------------------------------------------------------------------------
status_label_behavior:
  add_needs_review_when_review_requested: true
  remove_needs_review_when_approved: false
  add_ready_to_merge_when_approved_and_checks_pass: true
  do_not_modify_status_if_blocked: true

  review_requested_labels:
    - status:needs-review

  approved_labels:
    - approved

  ready_to_merge_labels:
    - status:ready-to-merge

  blocked_labels:
    - do-not-merge
    - blocked-by-security
    - status:blocked

# -----------------------------------------------------------------------------
# Reporting
# -----------------------------------------------------------------------------
reporting:
  add_pr_comment_on_review_request: false
  add_pr_comment_on_required_review_missing: true
  add_workflow_summary: true

  comment_footer:
    start: "<!-- reviewer-routing:start -->"
    end: "<!-- reviewer-routing:end -->"

  summary:
    include_pr_number: true
    include_pr_author: true
    include_branch: true
    include_base_branch: true
    include_matched_rules: true
    include_reviewers: true
    include_team_reviewers: true
    include_required_review_groups: true
    include_required_approval_count: true
    include_dry_run: true
    include_skipped_reason: true

# -----------------------------------------------------------------------------
# Enforcement
# -----------------------------------------------------------------------------
enforcement:
  on_missing_reviewer_config:
    action: fail
    message: |
      Reviewer rules configuration is missing or invalid.

  on_unknown_reviewer:
    action: warn
    message: |
      GitHub rejected one or more requested reviewers. Check usernames and repository permissions.

  on_unknown_team_reviewer:
    action: warn
    message: |
      GitHub rejected one or more requested team reviewers. Check team slug, visibility, and repository permissions.

  on_pr_author_selected_as_reviewer:
    action: skip_reviewer
    message: |
      The pull request author cannot be requested as a reviewer.

  on_bot_selected_as_reviewer:
    action: skip_reviewer
    message: |
      Bot accounts should not be requested as reviewers.

  on_security_review_missing:
    action: fail
    message: |
      Security-sensitive changes require security review before merge.

  on_release_review_missing:
    action: fail
    message: |
      Release-related changes require release review before merge.

  on_architecture_review_missing:
    action: fail
    message: |
      Architecture-sensitive changes require architecture review before merge.

  on_ai_review_missing:
    action: fail
    message: |
      OpenAI automation changes require AI automation review before merge.

  on_production_review_missing:
    action: fail
    message: |
      Production deployment changes require deployment review before merge.

# -----------------------------------------------------------------------------
# Safety
# -----------------------------------------------------------------------------
safety:
  dry_run_supported: true
  debug_supported: true

  do_not_merge_pull_requests: true
  do_not_approve_pull_requests: true
  do_not_dismiss_reviews: true
  do_not_remove_codeowner_reviewers: true
  do_not_request_review_from_pr_author: true
  do_not_request_review_from_bots: true

  do_not_auto_merge_if_required_review_missing: true
  do_not_auto_merge_if_changes_requested: true
  do_not_auto_merge_if_review_pending_for_required_group: true

  protected_labels:
    - do-not-merge
    - blocked-by-security
    - needs-security-review
    - needs-maintainer-review
    - needs-architecture-review
    - automation:needs-review
    - release:major
    - release:minor
    - release:patch

  required_review_labels:
    - needs-maintainer-review
    - needs-security-review
    - needs-architecture-review
    - automation:needs-review
