# .github/repo-management/milestone-rules.yaml
# =============================================================================
# Aerealith AI Milestone Rules
# -----------------------------------------------------------------------------
# Purpose:
#   Source-of-truth milestone routing, milestone assignment, release milestone
#   behavior, issue/PR milestone policy, dependency milestone policy, security
#   milestone policy, and automation safety.
#
# Used by:
#   - .github/milestones.yaml
#   - .github/assignees.yaml
#   - .github/projects/kanban-board.yaml
#   - .github/workflows/repo-management.yaml
#   - .github/workflows/release.yaml
#   - .github/scripts/repo/sync-milestones.js
#   - .github/scripts/repo/assign-milestones.js
#   - .github/scripts/repo/assign-labels.js
#   - .github/scripts/repo/link-issues-prs.js
#   - .github/scripts/release/determine-release-version.js
#   - .github/scripts/release/summarize-release.js
#
# Repository policy:
#   - Milestones are managed from .github/milestones.yaml.
#   - Automation may create/update milestones only through sync-milestones.
#   - Assignment scripts may assign milestones but must not create or delete them.
#   - Release milestones should match V-prefixed release planning.
#   - Dependency PRs are routed to dependency milestones and must not trigger release milestones.
#   - Security issues are routed by severity and remediation type.
# =============================================================================

version: 1

repository:
  owner: SinLess-Games
  name: Aerealith-AI
  default_branch: main

# -----------------------------------------------------------------------------
# Global Milestone Policy
# -----------------------------------------------------------------------------
policy:
  source_of_truth: .github/milestones.yaml

  allow_create: true
  allow_update: true
  allow_delete: false
  allow_close: true
  allow_reopen: true

  assignment_scripts_can_create_milestones: false
  assignment_scripts_can_delete_milestones: false
  assignment_scripts_can_close_milestones: false

  require_existing_milestone_for_assignment: true
  fallback_milestone: Backlog

  dry_run_supported: true
  debug_supported: true

  # Milestone descriptions can be long because they are managed from YAML.
  preserve_markdown_descriptions: true

  # Keeps sync behavior safe. Unlisted remote milestones should be reported,
  # not deleted.
  report_unmanaged_milestones: true
  close_unmanaged_milestones: false
  delete_unmanaged_milestones: false

  # Keep release creation tied to PR labels, not milestone names alone.
  milestones_do_not_trigger_releases: true

# -----------------------------------------------------------------------------
# Milestone Groups
# -----------------------------------------------------------------------------
milestone_groups:
  release_train:
    description: Versioned release planning milestones.
    milestones:
      - V0.1.0 — Foundation
      - V0.2.0 — Automation Core
      - V0.3.0 — CI/CD Expansion
      - V0.4.0 — Security Automation
      - V0.5.0 — Release Automation
      - V0.6.0 — Publishing Pipeline
      - V0.7.0 — Cloudflare Platform
      - V0.8.0 — AI Repository Assistant
      - V0.9.0 — Release Candidate
      - V1.0.0 — General Availability

  repository_management:
    description: Repository management automation and governance milestones.
    milestones:
      - Repo Management — Labels
      - Repo Management — Milestones
      - Repo Management — Issues & Pull Requests
      - Repo Management — Branch Policy

  ci_cd:
    description: CI/CD validation, caching, artifacts, and workflow milestones.
    milestones:
      - CI/CD — Pull Request Validation
      - CI/CD — Main Branch Verification
      - CI/CD — Cache Management
      - CI/CD — Artifacts & Hashes

  security:
    description: Security gates, monitoring, dependency response, and supply-chain integrity.
    milestones:
      - Security — Strict Pull Request Gate
      - Security — Main Branch Monitoring
      - Security — Dependency Vulnerability Response
      - Security — Supply Chain Integrity

  dependencies:
    description: Dependency automation, Renovate, Mend, Dependabot, and major upgrade planning.
    milestones:
      - Dependencies — Renovate Weekly Updates
      - Dependencies — Major Upgrade Program
      - Dependencies — Mend Management

  cloudflare:
    description: Cloudflare preview, staging, and production deployment milestones.
    milestones:
      - Cloudflare — Preview Environments
      - Cloudflare — Staging Environment
      - Cloudflare — Production Environment

  publishing:
    description: npm package publishing and GHCR container publishing milestones.
    milestones:
      - Publishing — npm Packages
      - Publishing — GHCR Containers

  ai_automation:
    description: OpenAI-assisted changelogs, issue/PR intelligence, and security triage.
    milestones:
      - AI Automation — Changelogs
      - AI Automation — Issue & PR Intelligence
      - AI Automation — Security Triage

  self_hosted:
    description: Future self-hosted Helm and Kubernetes deployment milestones.
    milestones:
      - Self-Hosted — Helm Chart
      - Self-Hosted — Kubernetes Manifests

  operations:
    description: Observability, runbooks, and operational readiness milestones.
    milestones:
      - Observability — Grafana Cloud
      - Operations — Runbooks

  documentation:
    description: Developer documentation and architecture documentation milestones.
    milestones:
      - Documentation — Developer Experience
      - Documentation — Architecture

  planning:
    description: General backlog and future planning.
    milestones:
      - Backlog

# -----------------------------------------------------------------------------
# Default Routing
# -----------------------------------------------------------------------------
defaults:
  issue:
    milestone: Backlog
    labels:
      - status:backlog

  pull_request:
    milestone: Backlog
    labels:
      - status:ready

  draft_pull_request:
    milestone: Backlog
    labels:
      - status:in-progress

  dependency_pull_request:
    milestone: Dependencies — Renovate Weekly Updates
    labels:
      - dependencies
      - no-release

  security_dependency_pull_request:
    milestone: Security — Dependency Vulnerability Response
    labels:
      - dependencies
      - security:dependency
      - no-release

  release_pull_request:
    milestone: V0.5.0 — Release Automation
