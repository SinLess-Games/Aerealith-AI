    Backlog: Repo Management

# -----------------------------------------------------------------------------
# Milestone Conflict Resolution
# -----------------------------------------------------------------------------
conflict_resolution:
  enabled: true

  # Higher priority wins when multiple rules match.
  strategy: highest_priority

  tie_breaker_order:
    - blocked_security
    - security_dependency
    - release_label
    - production_deployment
    - explicit_title_rule
    - exact_path_rule
    - label_rule
    - path_rule
    - default

  protected_milestones:
    - Security — Strict Pull Request Gate
    - Security — Dependency Vulnerability Response
    - Cloudflare — Production Environment
    - V0.5.0 — Release Automation
    - V1.0.0 — General Availability

  do_not_override_if_current_milestone_is_protected: true

  allow_override_when:
    current_milestone_is_backlog: true
    current_milestone_is_empty: true
    new_rule_priority_at_least: 85

  manual_override_labels:
    - needs-maintainer-review
    - needs-security-review
    - needs-architecture-review

# -----------------------------------------------------------------------------
# Issue and PR Relationship Rules
# -----------------------------------------------------------------------------
relationships:
  inherit_milestone_from_linked_issue:
    enabled: true
    apply_to_pull_requests: true
    require_issue_milestone_exists: true

  inherit_milestone_from_linked_pr:
    enabled: true
    apply_to_issues: false

  prefer_pr_release_milestone_when_release_label_present: true
  prefer_security_milestone_when_security_blocker_present: true
  prefer_dependency_milestone_for_dependency_authors: true

  linked_issue_keywords:
    - fixes
    - fixed
    - closes
    - closed
    - resolves
    - resolved
    - related to
    - refs
    - references

  create_issue_when_missing:
    enabled: true
    default_milestone: Backlog
    ai_created_issue_milestone: V0.8.0 — AI Repository Assistant

# -----------------------------------------------------------------------------
# Sync Rules
# -----------------------------------------------------------------------------
sync:
  enabled: true

  source_file: .github/milestones.yaml

  create_missing: true
  update_existing: true
  close_when_state_closed: true
  reopen_when_state_open: true

  delete_unmanaged: false
  close_unmanaged: false
  report_unmanaged: true

  fields_to_sync:
    - title
    - description
    - state

  title_matching:
    case_sensitive: true
    trim_whitespace: true

  description_matching:
    normalize_line_endings: true
    preserve_markdown: true

  state_matching:
    allowed_states:
      - open
      - closed

# -----------------------------------------------------------------------------
# Closing Rules
# -----------------------------------------------------------------------------
closing:
  enabled: true

  # Only sync-milestones may close milestones from YAML state.
  allow_close_from_yaml_state: true

  # Do not automatically close milestones just because all issues are closed.
  close_when_all_items_closed: false

  release_milestones:
    close_on_release_success: false
    require_manual_close: true

  backlog:
    never_auto_close: true

  protected_from_auto_close:
    - Backlog
    - Security — Strict Pull Request Gate
    - Security — Dependency Vulnerability Response
    - Cloudflare — Production Environment
    - V1.0.0 — General Availability

# -----------------------------------------------------------------------------
# Reporting
# -----------------------------------------------------------------------------
reporting:
  add_pr_comment_on_assignment: false
  add_pr_comment_on_change: false
  add_workflow_summary: true
  report_unmanaged_milestones: true
  report_missing_milestones: true
  report_assignment_reason: true

  comment_footer:
    start: "<!-- milestone-routing:start -->"
    end: "<!-- milestone-routing:end -->"

  summary:
    include_item_number: true
    include_item_type: true
    include_current_milestone: true
    include_new_milestone: true
    include_matched_rules: true
    include_priority: true
    include_reason: true
    include_dry_run: true
    include_skipped_reason: true

# -----------------------------------------------------------------------------
# Enforcement
# -----------------------------------------------------------------------------
enforcement:
  on_missing_source_file:
    action: fail
    message: |
      .github/milestones.yaml is required because it is the milestone source of truth.

  on_invalid_milestone_yaml:
    action: fail
    message: |
      Milestone configuration is invalid. Each entry must include title, description, and state.

  on_missing_target_milestone:
    action: warn
    fallback: Backlog
    message: |
      Requested milestone does not exist. Falling back to Backlog.

  on_unmanaged_remote_milestone:
    action: warn
    message: |
      A GitHub milestone exists that is not managed by .github/milestones.yaml.

  on_duplicate_milestone_title:
    action: fail
    message: |
      Duplicate milestone title detected. Milestone titles must be unique.

  on_assignment_script_attempts_create:
    action: fail
    message: |
      Assignment scripts must not create milestones. Use sync-milestones instead.

  on_assignment_script_attempts_delete:
    action: fail
    message: |
      Milestones must not be deleted by automation.

  on_dependency_pr_assigned_release_milestone:
    action: replace
    milestone: Dependencies — Renovate Weekly Updates
    message: |
      Dependency PRs must not be assigned to release-triggering milestones.

  on_security_dependency_pr_assigned_release_milestone:
    action: replace
    milestone: Security — Dependency Vulnerability Response
    message: |
      Security dependency PRs must not be assigned to release-triggering milestones.

  on_release_label_without_release_milestone:
    action: assign
    milestone: V0.5.0 — Release Automation
    message: |
      Release-labeled PR assigned to release automation milestone.

# -----------------------------------------------------------------------------
# Safety
# -----------------------------------------------------------------------------
safety:
  dry_run_supported: true
  debug_supported: true

  do_not_delete_milestones: true
  do_not_delete_issues: true
  do_not_close_issues: true
  do_not_merge_pull_requests: true
  do_not_create_releases: true
  do_not_publish_packages: true
  do_not_deploy: true

  assignment_does_not_trigger_release: true
  release_labels_required_for_release: true

  never_assign_dependency_pr_to:
    - V0.1.0 — Foundation
    - V0.2.0 — Automation Core
    - V0.3.0 — CI/CD Expansion
    - V0.4.0 — Security Automation
    - V0.5.0 — Release Automation
    - V0.6.0 — Publishing Pipeline
    - V0.7.0 — Cloudflare Platform
    - V0.8.0 — AI Repository Assistant
    - V0.9.0 — Release Candidate
    - V1.0.0 — General Availability

  protected_milestones:
    - Backlog
    - Security — Strict Pull Request Gate
    - Security — Dependency Vulnerability Response
    - Security — Supply Chain Integrity
    - Cloudflare — Production Environment
    - V1.0.0 — General Availability
