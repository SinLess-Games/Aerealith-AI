    milestone: Documentation — Developer Experience
    labels:
      - area:docs
      - kind:documentation
      - no-release
    priority: 70

  "SECURITY.md":
    milestone: Security — Strict Pull Request Gate
    labels:
      - area:security
      - kind:documentation
    priority: 90

# -----------------------------------------------------------------------------
# Title and Template-Based Routing
# -----------------------------------------------------------------------------
title_routing:
  "^\\[Bug\\]:":
    milestone: Backlog
    labels:
      - kind:bug
    priority: 50

  "^\\[Feature\\]:":
    milestone: Backlog
    labels:
      - kind:feature
    priority: 40

  "^\\[Maintenance\\]:":
    milestone: Backlog
    labels:
      - kind:maintenance
      - no-release
    priority: 40

  "^\\[Security\\]:":
    milestone: Security — Strict Pull Request Gate
    labels:
      - kind:security
      - area:security
    priority: 95

  "^\\[Implementation\\]:":
    milestone: Backlog
    labels:
      - kind:chore
    priority: 45

  "^\\[CI/CD\\]:":
    milestone: V0.3.0 — CI/CD Expansion
    labels:
      - kind:ci
      - area:ci
    priority: 85

  "^\\[Release\\]:":
    milestone: V0.5.0 — Release Automation
    labels:
      - kind:release
      - release
    priority: 90

  "^\\[Docs\\]:":
    milestone: Documentation — Developer Experience
    labels:
      - kind:documentation
      - area:docs
      - no-release
    priority: 75

  "^\\[Architecture\\]:":
    milestone: Documentation — Architecture
    labels:
      - discussion
      - needs-architecture-review
    priority: 85

  "^\\[Cloudflare\\]:":
    milestone: V0.7.0 — Cloudflare Platform
    labels:
      - cloudflare
      - deployment
      - area:cloudflare
    priority: 90

  "^\\[AI Automation\\]:":
    milestone: V0.8.0 — AI Repository Assistant
    labels:
      - area:ai
      - automation:openai
    priority: 90

  "^\\[Self-Hosted\\]:":
    milestone: Self-Hosted — Helm Chart
    labels:
      - area:self-hosted
      - deployment
      - no-release
    priority: 80

# -----------------------------------------------------------------------------
# Release Milestone Rules
# -----------------------------------------------------------------------------
release_milestones:
  enabled: true

  version_pattern: "^V[0-9]+\\.[0-9]+\\.[0-9]+"
  release_tag_pattern: "^V[0-9]+\\.[0-9]+\\.[0-9]+$"

  # Release labels determine release type. Milestones only help organize work.
  release_type_source: pr_label

  valid_release_labels:
    - release:major
    - release:minor
    - release:patch

  release_blocking_labels:
    - no-release
    - dependencies
    - security:dependency
    - do-not-merge
    - blocked-by-security
    - status:blocked

  assign_release_prs_to_release_automation_milestone: true
  default_release_automation_milestone: V0.5.0 — Release Automation

  version_to_milestone:
    V0.1.0: V0.1.0 — Foundation
    V0.2.0: V0.2.0 — Automation Core
    V0.3.0: V0.3.0 — CI/CD Expansion
    V0.4.0: V0.4.0 — Security Automation
    V0.5.0: V0.5.0 — Release Automation
    V0.6.0: V0.6.0 — Publishing Pipeline
    V0.7.0: V0.7.0 — Cloudflare Platform
    V0.8.0: V0.8.0 — AI Repository Assistant
    V0.9.0: V0.9.0 — Release Candidate
    V1.0.0: V1.0.0 — General Availability

  close_version_milestone_on_successful_release: false
  close_release_automation_milestone_on_successful_release: false

  include_in_release_notes:
    labels:
      - release:major
      - release:minor
      - release:patch

  exclude_from_release_notes:
    labels:
      - no-release
      - dependencies
      - security:dependency

# -----------------------------------------------------------------------------
# Dependency Milestone Rules
# -----------------------------------------------------------------------------
dependency_milestones:
  enabled: true

  default_milestone: Dependencies — Renovate Weekly Updates
  major_upgrade_milestone: Dependencies — Major Upgrade Program
  mend_milestone: Dependencies — Mend Management
  security_dependency_milestone: Security — Dependency Vulnerability Response

  authors:
    renovate[bot]:
      milestone: Dependencies — Renovate Weekly Updates
      labels:
        - renovate
        - dependencies
        - no-release

    dependabot[bot]:
      milestone: Dependencies — Renovate Weekly Updates
      labels:
        - dependabot
        - dependencies
        - no-release

    mend[bot]:
      milestone: Dependencies — Mend Management
      labels:
        - mend
        - dependencies
        - no-release

  update_types:
    patch:
      milestone: Dependencies — Renovate Weekly Updates
      labels:
        - dependencies
        - auto-merge
        - no-release

    minor:
      milestone: Dependencies — Renovate Weekly Updates
      labels:
        - dependencies
        - auto-merge
        - no-release

    major:
      milestone: Dependencies — Major Upgrade Program
      labels:
        - dependencies
        - needs-maintainer-review
        - no-release

    security:
      milestone: Security — Dependency Vulnerability Response
      labels:
        - dependencies
        - security:dependency
        - no-release

    lockfile:
      milestone: Dependencies — Renovate Weekly Updates
      labels:
        - dependencies
        - lockfile
        - no-release

  package_groups:
    nx:
      milestone: Dependencies — Major Upgrade Program

    next:
      milestone: Dependencies — Major Upgrade Program

    react:
      milestone: Dependencies — Major Upgrade Program

    cloudflare:
      milestone: Cloudflare — Staging Environment

    wrangler:
      milestone: Cloudflare — Staging Environment

    database:
      milestone: Dependencies — Major Upgrade Program

    openai:
      milestone: V0.8.0 — AI Repository Assistant

    github_automation:
      milestone: V0.2.0 — Automation Core

    security_tools:
      milestone: Security — Supply Chain Integrity

    docker:
      milestone: Publishing — GHCR Containers

    helm:
      milestone: Self-Hosted — Helm Chart

    kubernetes:
      milestone: Self-Hosted — Kubernetes Manifests

# -----------------------------------------------------------------------------
# Security Milestone Rules
# -----------------------------------------------------------------------------
security_milestones:
  enabled: true

  default_security_milestone: Security — Strict Pull Request Gate
  monitoring_milestone: Security — Main Branch Monitoring
  dependency_response_milestone: Security — Dependency Vulnerability Response
  supply_chain_milestone: Security — Supply Chain Integrity

  severity:
    critical:
      milestone: Security — Strict Pull Request Gate
      labels:
        - severity:critical
        - priority:critical
        - blocked-by-security

    high:
      milestone: Security — Strict Pull Request Gate
      labels:
        - severity:high
        - priority:high
        - needs-security-review

    medium:
      milestone: Security — Main Branch Monitoring
      labels:
        - severity:medium
        - priority:medium

    low:
      milestone: Security — Main Branch Monitoring
      labels:
        - severity:low
        - priority:low

  finding_types:
    dependency_vulnerability:
      milestone: Security — Dependency Vulnerability Response
      labels:
        - security:dependency
        - dependencies

    codeql:
      milestone: Security — Strict Pull Request Gate
      labels:
        - area:security

    sonarqube:
      milestone: Security — Strict Pull Request Gate
      labels:
        - area:security

    secret_exposure:
      milestone: Security — Strict Pull Request Gate
      labels:
        - area:secrets
        - blocked-by-security

    container_vulnerability:
      milestone: Security — Supply Chain Integrity
      labels:
        - area:docker
        - area:security

    sbom:
      milestone: Security — Supply Chain Integrity
      labels:
        - sbom

    attestation:
      milestone: Security — Supply Chain Integrity
      labels:
        - attestations

    license_violation:
      milestone: Security — Supply Chain Integrity
      labels:
        - area:dependencies
        - area:security

# -----------------------------------------------------------------------------
# Project Field Mapping
# -----------------------------------------------------------------------------
project_fields:
  enabled: true

  target_project: Aerealith AI Task Board

  milestone_to_target_version:
    V0.1.0 — Foundation: V0.1.0
    V0.2.0 — Automation Core: V0.2.0
    V0.3.0 — CI/CD Expansion: V0.3.0
    V0.4.0 — Security Automation: V0.4.0
    V0.5.0 — Release Automation: V0.5.0
    V0.6.0 — Publishing Pipeline: V0.6.0
    V0.7.0 — Cloudflare Platform: V0.7.0
    V0.8.0 — AI Repository Assistant: V0.8.0
    V0.9.0 — Release Candidate: V0.9.0
    V1.0.0 — General Availability: V1.0.0

  milestone_to_area:
    Repo Management — Labels: Repo Management
    Repo Management — Milestones: Repo Management
    Repo Management — Issues & Pull Requests: Repo Management
    Repo Management — Branch Policy: Repo Management

    CI/CD — Pull Request Validation: CI/CD
    CI/CD — Main Branch Verification: CI/CD
