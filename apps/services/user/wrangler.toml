# =============================================================================
# Helix User Service — Cloudflare Worker
# -----------------------------------------------------------------------------
# Deploy:
#   pnpm exec wrangler deploy --config apps/services/user/wrangler.toml
#
# Deploy preview:
#   pnpm exec wrangler deploy --config apps/services/user/wrangler.toml --env preview
#
# Deploy production:
#   pnpm exec wrangler deploy --config apps/services/user/wrangler.toml --env production
#
# Dev:
#   pnpm exec wrangler dev --config apps/services/user/wrangler.toml
#
# Dev with frontend/auth service bindings:
#   pnpm exec wrangler dev \
#     --config apps/frontend/wrangler.toml \
#     --config apps/services/auth/wrangler.toml \
#     --config apps/services/user/wrangler.toml
#
# Secrets:
#   Do not put DATABASE_URL, JWT secrets, OAuth secrets, API keys, or tokens here.
#   Use `.dev.vars` for local development and `wrangler secret put <NAME>` for
#   deployed environments.
# =============================================================================

"$schema" = "../../../node_modules/wrangler/config-schema.json"

name = "helix-user-service"
main = "src/main.ts"

compatibility_date = "2026-05-09"
compatibility_flags = [
  "nodejs_compat",
  "nodejs_compat_populate_process_env",
]

account_id = "9517bf561f1f713ab87d1523193c7cc5"

workers_dev = true
preview_urls = true

minify = true
keep_names = true

# -----------------------------------------------------------------------------
# Bundling aliases
# -----------------------------------------------------------------------------
# MikroORM/Knex includes optional dialect loaders for MariaDB and SQLite even
# though this service uses PostgreSQL. Wrangler may still see those require()
# calls during bundling, so alias unused optional drivers to a Worker-safe shim.
# -----------------------------------------------------------------------------

[alias]
"pg" = "./src/shims/pg.cjs"
"mariadb/callback" = "./src/shims/unused-db-driver.ts"
"better-sqlite3" = "./src/shims/unused-db-driver.ts"
"libsql" = "./src/shims/unused-db-driver.ts"

# -----------------------------------------------------------------------------
# Service bindings
# -----------------------------------------------------------------------------
# AUTH_SERVICE lets the user service validate auth/session/ownership decisions
# without calling the auth Worker through a public URL.
# -----------------------------------------------------------------------------

[[services]]
binding = "AUTH_SERVICE"
service = "helix-auth-service"

# -----------------------------------------------------------------------------
# Non-secret runtime variables
# -----------------------------------------------------------------------------

[vars]
NODE_ENV = "development"
SERVICE_NAME = "helix-user-service"
SERVICE_DISPLAY_NAME = "Helix User Service"
API_VERSION = "v1"
API_BASE_PATH = "/api/V1/users"
LOG_LEVEL = "debug"

AUTH_SERVICE_NAME = "helix-auth-service"
AUTH_SERVICE_BASE_PATH = "/api/V1/auth"

FRONTEND_SERVICE_NAME = "helix-ai-frontend"
FRONTEND_ORIGIN = "https://helixaibot.com"

DATABASE_PROVIDER = "postgresql"
DATABASE_SSL_ENABLED = "true"
DATABASE_SSL_MODE = "verify-full"
DATABASE_SSL_REJECT_UNAUTHORIZED = "true"
DATABASE_POOL_MIN = "0"
DATABASE_POOL_MAX = "1"
DATABASE_APPLICATION_NAME = "helix-user-service"

MIKRO_ORM_DEBUG = "false"

# -----------------------------------------------------------------------------
# Observability
# -----------------------------------------------------------------------------

[observability]
enabled = true
head_sampling_rate = 1.0

[observability.traces]
enabled = true
head_sampling_rate = 1.0

# -----------------------------------------------------------------------------
# Local development
# -----------------------------------------------------------------------------

[dev]
ip = "127.0.0.1"
port = 8788
local_protocol = "http"

# =============================================================================
# Preview environment
# =============================================================================

[env.preview]
name = "helix-user-service-preview"
workers_dev = true
preview_urls = true

[[env.preview.services]]
binding = "AUTH_SERVICE"
service = "helix-auth-service-preview"

[env.preview.vars]
NODE_ENV = "preview"
SERVICE_NAME = "helix-user-service-preview"
SERVICE_DISPLAY_NAME = "Helix User Service Preview"
API_VERSION = "v1"
API_BASE_PATH = "/api/V1/users"
LOG_LEVEL = "debug"

AUTH_SERVICE_NAME = "helix-auth-service-preview"
AUTH_SERVICE_BASE_PATH = "/api/V1/auth"

FRONTEND_SERVICE_NAME = "helix-ai-frontend-preview"
FRONTEND_ORIGIN = "https://helixaibot.com"

DATABASE_PROVIDER = "postgresql"
DATABASE_SSL_ENABLED = "true"
DATABASE_SSL_MODE = "verify-full"
DATABASE_SSL_REJECT_UNAUTHORIZED = "true"
DATABASE_POOL_MIN = "0"
DATABASE_POOL_MAX = "1"
DATABASE_APPLICATION_NAME = "helix-user-service-preview"

MIKRO_ORM_DEBUG = "false"

[env.preview.observability]
enabled = true
head_sampling_rate = 1.0

[env.preview.observability.traces]
enabled = true
head_sampling_rate = 1.0

# =============================================================================
# Production environment
# =============================================================================

[env.production]
name = "helix-user-service"
workers_dev = false
preview_urls = false

# Keep this commented while the frontend Worker owns helixaibot.com.
# The frontend can call this Worker privately through USER_SERVICE.
#
# [[env.production.routes]]
# pattern = "helixaibot.com/api/V1/users*"
# zone_name = "helixaibot.com"

[[env.production.services]]
binding = "AUTH_SERVICE"
service = "helix-auth-service"

[env.production.vars]
NODE_ENV = "production"
SERVICE_NAME = "helix-user-service"
SERVICE_DISPLAY_NAME = "Helix User Service"
API_VERSION = "v1"
API_BASE_PATH = "/api/V1/users"
LOG_LEVEL = "info"

AUTH_SERVICE_NAME = "helix-auth-service"
AUTH_SERVICE_BASE_PATH = "/api/V1/auth"

FRONTEND_SERVICE_NAME = "helix-ai-frontend"
FRONTEND_ORIGIN = "https://helixaibot.com"

DATABASE_PROVIDER = "postgresql"
DATABASE_SSL_ENABLED = "true"
DATABASE_SSL_MODE = "verify-full"
DATABASE_SSL_REJECT_UNAUTHORIZED = "true"
DATABASE_POOL_MIN = "0"
DATABASE_POOL_MAX = "1"
DATABASE_APPLICATION_NAME = "helix-user-service"

MIKRO_ORM_DEBUG = "false"

[env.production.observability]
enabled = true
head_sampling_rate = 0.1

[env.production.observability.traces]
enabled = true
head_sampling_rate = 0.05
