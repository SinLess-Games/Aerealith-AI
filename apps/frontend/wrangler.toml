"$schema" = "../../node_modules/wrangler/config-schema.json"

name = "aerealith-ai-frontend"
main = "./src/worker.ts"
compatibility_date = "2026-05-09"
workers_dev = true

compatibility_flags = [
  "nodejs_compat",
  "nodejs_compat_populate_process_env",
  "global_fetch_strictly_public",
]

# =============================================================================
# Production custom domain for default deploys
# =============================================================================

[[routes]]
pattern = "helixaibot.com"
custom_domain = true

# =============================================================================
# Static assets
# =============================================================================

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# =============================================================================
# Service bindings
# =============================================================================

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "aerealith-ai-frontend"

[[services]]
binding = "AUTH_SERVICE"
service = "aerealith-auth-service"

[[services]]
binding = "USER_SERVICE"
service = "aerealith-user-service"

# =============================================================================
# Default/local vars
# =============================================================================

[vars]
NEXTJS_ENV = "development"
NEXT_PUBLIC_APP_NAME = "Aerealith AI"
NEXT_PUBLIC_APP_ENV = "development"
AEREALITH_ENVIRONMENT = "development"
SERVICE_NAME = "aerealith-ai-frontend"
OTEL_SERVICE_NAME = "aerealith-ai-frontend"
PYROSCOPE_APPLICATION_NAME = "aerealith-ai-frontend"

NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME = "helix-ai"
NEXT_PUBLIC_CLOUDINARY_API_KEY = "__SET_CLOUDINARY_API_KEY__"

DATABASE_PROVIDER = "postgresql"
DATABASE_SSL_ENABLED = "true"
DATABASE_SSL_MODE = "verify-full"
DATABASE_SSL_REJECT_UNAUTHORIZED = "true"
DATABASE_POOL_MIN = "0"
DATABASE_POOL_MAX = "1"
DATABASE_APPLICATION_NAME = "helix-frontend-dev"

MIKRO_ORM_DEBUG = "false"

AUTH_SERVICE_NAME = "aerealith-auth-service"
AUTH_SERVICE_BASE_PATH = "/api/V1/auth"

AUTH_SERVICE_URL = "http://localhost:8787"
AUTH_SERVICE_INTERNAL_URL = "http://localhost:8787"

AUTH_SERVICE_SIGNUP_PATH = "/auth/signup"
AUTH_SERVICE_LOGIN_PATH = "/auth/login"
AUTH_SERVICE_LOGOUT_PATH = "/auth/logout"
AUTH_SERVICE_REFRESH_PATH = "/auth/refresh"
AUTH_SERVICE_VERIFY_EMAIL_PATH = "/auth/verify-email"
AUTH_SERVICE_RESEND_VERIFICATION_PATH = "/auth/resend-verification"
AUTH_SERVICE_USERNAME_PATH_PREFIX = "/auth"

AUTH_SERVICE_SIGNUP_URL = "http://localhost:8787/auth/signup"
AUTH_SERVICE_LOGIN_URL = "http://localhost:8787/auth/login"

USER_SERVICE_NAME = "aerealith-user-service"
USER_SERVICE_BASE_PATH = "/api/V1/users"

USER_SERVICE_URL = "http://localhost:8788"
USER_SERVICE_INTERNAL_URL = "http://localhost:8788"

USER_SERVICE_ME_PATH = "/users/me"
USER_SERVICE_PROFILE_PATH_PREFIX = "/users"
USER_SERVICE_PREFERENCES_PATH_PREFIX = "/users"
USER_SERVICE_CONSENT_PATH_PREFIX = "/users"

AUTH_PUBLIC_URL = "http://localhost:8787"
FRONTEND_PUBLIC_URL = "http://localhost:3000"
AUTH_VERIFY_EMAIL_PATH = "/api/V1/auth/verify-email"

# Feature flags (Flagship)
CLOUDFLARE_FLAGSHIP_APP_ID = "2a1ca9ba-b446-4cb8-b8eb-ab0f3985679f"
CLOUDFLARE_FLAGSHIP_AUTH_TOKEN = "__SET_FLAGSHIP_AUTH_TOKEN__"
AEREALITH_FLAGS_PROVIDER_NAME = "aerealith-flagship"

# Pyroscope profiling (optional)
PYROSCOPE_SERVER_ADDRESS = ""
PYROSCOPE_BASIC_AUTH_USER = ""
PYROSCOPE_BASIC_AUTH_PASSWORD = ""

# =============================================================================
# Observability
# =============================================================================

[observability]
enabled = true

[observability.logs]
enabled = true

[observability.traces]
enabled = true

# =============================================================================
# Secrets
# -----------------------------------------------------------------------------
# Do not place DATABASE_URL, POSTGRES_URL, POSTGRES_PASSWORD, or
# CLOUDINARY_API_SECRET directly in this file.
#
# NEXT_PUBLIC_* values are browser-visible public config.
#
# Set secrets with:
#   pnpm exec wrangler secret put POSTGRES_URL --name helix-ai-frontend
#   pnpm exec wrangler secret put POSTGRES_PASSWORD --name helix-ai-frontend
#   pnpm exec wrangler secret put CLOUDINARY_API_SECRET --name helix-ai-frontend
#
# Environment-specific secrets:
#   pnpm exec wrangler secret put POSTGRES_URL --name helix-ai-frontend --env preview
#   pnpm exec wrangler secret put POSTGRES_URL --name helix-ai-frontend --env production
#   pnpm exec wrangler secret put CLOUDINARY_API_SECRET --name helix-ai-frontend --env production
# =============================================================================

# =============================================================================
# Preview environment
# =============================================================================

[env.preview]
name = "aerealith-ai-frontend-preview"
workers_dev = true
preview_urls = true

[[env.preview.services]]
binding = "WORKER_SELF_REFERENCE"
service = "aerealith-ai-frontend-preview"

[[env.preview.services]]
binding = "AUTH_SERVICE"
service = "aerealith-auth-service-preview"

[[env.preview.services]]
binding = "USER_SERVICE"
service = "aerealith-user-service-preview"

[env.preview.vars]
NEXTJS_ENV = "preview"
NEXT_PUBLIC_APP_NAME = "Aerealith AI"
NEXT_PUBLIC_APP_ENV = "preview"
AEREALITH_ENVIRONMENT = "preview"
SERVICE_NAME = "aerealith-ai-frontend-preview"
OTEL_SERVICE_NAME = "aerealith-ai-frontend-preview"
PYROSCOPE_APPLICATION_NAME = "aerealith-ai-frontend-preview"

NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME = "helix-ai"
NEXT_PUBLIC_CLOUDINARY_API_KEY = "__SET_CLOUDINARY_API_KEY__"

DATABASE_PROVIDER = "postgresql"
DATABASE_SSL_ENABLED = "true"
DATABASE_SSL_MODE = "verify-full"
DATABASE_SSL_REJECT_UNAUTHORIZED = "true"
DATABASE_POOL_MIN = "0"
DATABASE_POOL_MAX = "1"
DATABASE_APPLICATION_NAME = "helix-frontend-preview"

MIKRO_ORM_DEBUG = "false"

AUTH_SERVICE_NAME = "aerealith-auth-service-preview"
AUTH_SERVICE_BASE_PATH = "/api/V1/auth"

AUTH_SERVICE_URL = "https://helixaibot.com/api/V1/auth"
AUTH_SERVICE_INTERNAL_URL = "https://helixaibot.com/api/V1/auth"

AUTH_SERVICE_SIGNUP_PATH = "/signup"
AUTH_SERVICE_LOGIN_PATH = "/login"
AUTH_SERVICE_LOGOUT_PATH = "/logout"
AUTH_SERVICE_REFRESH_PATH = "/refresh"
AUTH_SERVICE_VERIFY_EMAIL_PATH = "/verify-email"
AUTH_SERVICE_RESEND_VERIFICATION_PATH = "/resend-verification"
AUTH_SERVICE_USERNAME_PATH_PREFIX = ""

AUTH_SERVICE_SIGNUP_URL = "https://helixaibot.com/api/V1/auth/signup"
AUTH_SERVICE_LOGIN_URL = "https://helixaibot.com/api/V1/auth/login"

USER_SERVICE_NAME = "aerealith-user-service-preview"
USER_SERVICE_BASE_PATH = "/api/V1/users"

USER_SERVICE_URL = "https://helixaibot.com/api/V1/users"
USER_SERVICE_INTERNAL_URL = "https://helixaibot.com/api/V1/users"

USER_SERVICE_ME_PATH = "/me"
USER_SERVICE_PROFILE_PATH_PREFIX = ""
USER_SERVICE_PREFERENCES_PATH_PREFIX = ""
USER_SERVICE_CONSENT_PATH_PREFIX = ""

AUTH_PUBLIC_URL = "https://helixaibot.com/api/V1/auth"
FRONTEND_PUBLIC_URL = "https://helixaibot.com"
AUTH_VERIFY_EMAIL_PATH = "/api/V1/auth/verify-email"

[env.preview.observability]
enabled = true

[env.preview.observability.logs]
enabled = true

[env.preview.observability.traces]
enabled = true

# =============================================================================
# Production environment
# =============================================================================

[env.production]
name = "aerealith-ai-frontend"
workers_dev = false
preview_urls = false

[[env.production.routes]]
pattern = "helixaibot.com"
custom_domain = true

[[env.production.services]]
binding = "WORKER_SELF_REFERENCE"
service = "aerealith-ai-frontend"

[[env.production.services]]
binding = "AUTH_SERVICE"
service = "aerealith-auth-service"

[[env.production.services]]
binding = "USER_SERVICE"
service = "aerealith-user-service"

[env.production.vars]
NEXTJS_ENV = "production"
NEXT_PUBLIC_APP_NAME = "Aerealith AI"
NEXT_PUBLIC_APP_ENV = "production"
AEREALITH_ENVIRONMENT = "production"
SERVICE_NAME = "aerealith-ai-frontend"
OTEL_SERVICE_NAME = "aerealith-ai-frontend"
PYROSCOPE_APPLICATION_NAME = "aerealith-ai-frontend"

NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME = "helix-ai"
NEXT_PUBLIC_CLOUDINARY_API_KEY = "__SET_CLOUDINARY_API_KEY__"

DATABASE_PROVIDER = "postgresql"
DATABASE_SSL_ENABLED = "true"
DATABASE_SSL_MODE = "verify-full"
DATABASE_SSL_REJECT_UNAUTHORIZED = "true"
DATABASE_POOL_MIN = "0"
DATABASE_POOL_MAX = "1"
DATABASE_APPLICATION_NAME = "helix-frontend-production"

MIKRO_ORM_DEBUG = "false"

AUTH_SERVICE_NAME = "aerealith-auth-service"
AUTH_SERVICE_BASE_PATH = "/api/V1/auth"

AUTH_SERVICE_URL = "https://helixaibot.com/api/V1/auth"
AUTH_SERVICE_INTERNAL_URL = "https://helixaibot.com/api/V1/auth"

AUTH_SERVICE_SIGNUP_PATH = "/signup"
AUTH_SERVICE_LOGIN_PATH = "/login"
AUTH_SERVICE_LOGOUT_PATH = "/logout"
AUTH_SERVICE_REFRESH_PATH = "/refresh"
AUTH_SERVICE_VERIFY_EMAIL_PATH = "/verify-email"
AUTH_SERVICE_RESEND_VERIFICATION_PATH = "/resend-verification"
AUTH_SERVICE_USERNAME_PATH_PREFIX = ""

AUTH_SERVICE_SIGNUP_URL = "https://helixaibot.com/api/V1/auth/signup"
AUTH_SERVICE_LOGIN_URL = "https://helixaibot.com/api/V1/auth/login"

USER_SERVICE_NAME = "aerealith-user-service"
USER_SERVICE_BASE_PATH = "/api/V1/users"

USER_SERVICE_URL = "https://helixaibot.com/api/V1/users"
USER_SERVICE_INTERNAL_URL = "https://helixaibot.com/api/V1/users"

USER_SERVICE_ME_PATH = "/me"
USER_SERVICE_PROFILE_PATH_PREFIX = ""
USER_SERVICE_PREFERENCES_PATH_PREFIX = ""
USER_SERVICE_CONSENT_PATH_PREFIX = ""

AUTH_PUBLIC_URL = "https://helixaibot.com/api/V1/auth"
FRONTEND_PUBLIC_URL = "https://helixaibot.com"
AUTH_VERIFY_EMAIL_PATH = "/api/V1/auth/verify-email"

[env.production.observability]
