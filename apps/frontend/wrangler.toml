# apps/frontend/wrangler.toml
# =============================================================================
# Aerealith AI — Frontend Worker
# -----------------------------------------------------------------------------
# This Worker is the public frontend edge service for Aerealith AI.
#
# Runtime:
#   - Next.js/OpenNext Worker entrypoint
#   - Static assets served from .open-next/assets
#   - Node.js compatibility enabled for framework/runtime packages
#
# Secrets:
#   - The Postgres connection URL is stored in Cloudflare Secrets Store.
#   - It is bound as POSTGRES_URL_SECRET.
#   - Access it in Worker code with:
#       const postgresUrl = await env.POSTGRES_URL_SECRET.get()
#
# IMPORTANT:
#   Replace <CLOUDFLARE_SECRETS_STORE_ID> with the real Secrets Store ID.
#   The account secret name should be POSTGRES_URL unless you intentionally
#   named it differently in Cloudflare Secrets Store.
# =============================================================================

"$schema" = "../../node_modules/wrangler/config-schema.json"

name = "aerealith-frontend"
main = "./src/worker.ts"
compatibility_date = "2026-05-08"
workers_dev = true

compatibility_flags = [
  "nodejs_compat",
  "nodejs_compat_populate_process_env",
  "global_fetch_strictly_public"
]

# -----------------------------------------------------------------------------
# Routes / Domains
# -----------------------------------------------------------------------------
# Keep workers_dev enabled while bringing the production custom domains online.
# Once production DNS/routes are confirmed, you can disable workers_dev if desired.
# -----------------------------------------------------------------------------

routes = [
  { pattern = "aerealith.com", custom_domain = true },
  { pattern = "www.aerealith.com", custom_domain = true }
]

# -----------------------------------------------------------------------------
# Static Assets
# -----------------------------------------------------------------------------
# OpenNext emits assets here. The ASSETS binding lets the Worker serve static
# files directly from Cloudflare's asset pipeline.
# -----------------------------------------------------------------------------

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# -----------------------------------------------------------------------------
# Service Bindings
# -----------------------------------------------------------------------------
# Frontend self-reference is useful for framework internals, middleware behavior,
# and future internal calls.
#
# Add more service bindings here as microservices come online:
#   AUTH_SERVICE
#   USER_SERVICE
#   MEMORY_SERVICE
#   AUTOMATION_SERVICE
#   INTEGRATION_SERVICE
# -----------------------------------------------------------------------------

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "aerealith-frontend"

# Example future microservice bindings.
# Uncomment after those Workers exist and are deployed.
#
# [[services]]
# binding = "AUTH_SERVICE"
# service = "aerealith-auth"
#
# [[services]]
# binding = "USER_SERVICE"
# service = "aerealith-users"
#
# [[services]]
# binding = "MEMORY_SERVICE"
# service = "aerealith-memory"
#
# [[services]]
# binding = "AUTOMATION_SERVICE"
# service = "aerealith-automations"
#
# [[services]]
# binding = "INTEGRATION_SERVICE"
# service = "aerealith-integrations"


# -----------------------------------------------------------------------------
# Public / Non-sensitive Runtime Variables
# -----------------------------------------------------------------------------
# Safe values only. Do not place database URLs, API keys, tokens, passwords, or
# private credentials in [vars].
# -----------------------------------------------------------------------------

[vars]
APP_NAME = "Aerealith AI"
APP_SERVICE = "frontend"
APP_ENVIRONMENT = "production"
APP_PUBLIC_DOMAIN = "aerealith.com"
APP_PUBLIC_APP_DOMAIN = "aerealith.app"

DATABASE_PROVIDER = "postgresql"
DATABASE_URL_SOURCE = "cloudflare-secrets-store"
DATABASE_URL_SECRET_BINDING = "POSTGRES_URL_SECRET"
DATABASE_SSL_ENABLED = "true"
DATABASE_SSL_MODE = "verify-full"
DATABASE_SSL_REJECT_UNAUTHORIZED = "true"
DATABASE_POOL_MIN = "0"
DATABASE_POOL_MAX = "1"
DATABASE_APPLICATION_NAME = "aerealith-frontend"

MIKRO_ORM_DEBUG = "false"
LOG_LEVEL = "info"
ENABLE_OBSERVABILITY = "true"

# -----------------------------------------------------------------------------
# Required Worker Secrets
# -----------------------------------------------------------------------------
# This validates traditional Worker secrets, not Secrets Store account secrets.
# Leave this empty unless you also add per-Worker secrets with:
#   wrangler secret put SOME_SECRET
# -----------------------------------------------------------------------------

[secrets]
required = []

# -----------------------------------------------------------------------------
# Observability
# -----------------------------------------------------------------------------

[observability]
enabled = true

[observability.logs]
enabled = true

[observability.traces]
enabled = true

# =============================================================================
# Environment Overrides
# =============================================================================

[env.preview]
name = "aerealith-frontend-preview"
workers_dev = true
routes = []

[env.preview.vars]
APP_NAME = "Aerealith AI"
APP_SERVICE = "frontend"
APP_ENVIRONMENT = "preview"
APP_PUBLIC_DOMAIN = "preview.aerealith.com"
APP_PUBLIC_APP_DOMAIN = "preview.aerealith.app"
DATABASE_PROVIDER = "postgresql"
DATABASE_URL_SOURCE = "cloudflare-secrets-store"
DATABASE_URL_SECRET_BINDING = "POSTGRES_URL_SECRET"
DATABASE_SSL_ENABLED = "true"
DATABASE_SSL_MODE = "verify-full"
DATABASE_SSL_REJECT_UNAUTHORIZED = "true"
DATABASE_POOL_MIN = "0"
DATABASE_POOL_MAX = "1"
DATABASE_APPLICATION_NAME = "aerealith-frontend-preview"
MIKRO_ORM_DEBUG = "false"
LOG_LEVEL = "debug"
ENABLE_OBSERVABILITY = "true"

[[env.preview.secrets_store_secrets]]
binding = "POSTGRES_URL_SECRET"
store_id = "ab6f1fdec6a246578177e0577e94f40b"
secret_name = "PREVIEW_POSTGRES_URL"

[[env.preview.services]]
binding = "WORKER_SELF_REFERENCE"
service = "aerealith-frontend-preview"

[env.staging]
name = "aerealith-frontend-staging"
workers_dev = true
routes = [
  { pattern = "staging.aerealith.com", custom_domain = true },
  { pattern = "staging.aerealith.app", custom_domain = true }
]

[env.staging.vars]
APP_NAME = "Aerealith AI"
APP_SERVICE = "frontend"
APP_ENVIRONMENT = "staging"
APP_PUBLIC_DOMAIN = "staging.aerealith.com"
APP_PUBLIC_APP_DOMAIN = "staging.aerealith.app"
DATABASE_PROVIDER = "postgresql"
DATABASE_URL_SOURCE = "cloudflare-secrets-store"
DATABASE_URL_SECRET_BINDING = "POSTGRES_URL_SECRET"
DATABASE_SSL_ENABLED = "true"
DATABASE_SSL_MODE = "verify-full"
DATABASE_SSL_REJECT_UNAUTHORIZED = "true"
DATABASE_POOL_MIN = "0"
DATABASE_POOL_MAX = "1"
DATABASE_APPLICATION_NAME = "aerealith-frontend-staging"
MIKRO_ORM_DEBUG = "false"
LOG_LEVEL = "info"
ENABLE_OBSERVABILITY = "true"

[[env.staging.secrets_store_secrets]]
binding = "POSTGRES_URL_SECRET"
store_id = "<CLOUDFLARE_SECRETS_STORE_ID>"
secret_name = "STAGING_POSTGRES_URL"

[[env.staging.services]]
binding = "WORKER_SELF_REFERENCE"
service = "aerealith-frontend-staging"

[env.production]
name = "aerealith-frontend"
workers_dev = true
routes = [
  { pattern = "aerealith.com", custom_domain = true },
  { pattern = "www.aerealith.com", custom_domain = true },
  { pattern = "aerealith.app", custom_domain = true },
  { pattern = "www.aerealith.app", custom_domain = true }
]

[env.production.vars]
APP_NAME = "Aerealith AI"
APP_SERVICE = "frontend"
APP_ENVIRONMENT = "production"
APP_PUBLIC_DOMAIN = "aerealith.com"
APP_PUBLIC_APP_DOMAIN = "aerealith.app"
DATABASE_PROVIDER = "postgresql"
DATABASE_URL_SOURCE = "cloudflare-secrets-store"
DATABASE_URL_SECRET_BINDING = "POSTGRES_URL_SECRET"
DATABASE_SSL_ENABLED = "true"
DATABASE_SSL_MODE = "verify-full"
DATABASE_SSL_REJECT_UNAUTHORIZED = "true"
DATABASE_POOL_MIN = "0"
DATABASE_POOL_MAX = "1"
DATABASE_APPLICATION_NAME = "aerealith-frontend-production"
MIKRO_ORM_DEBUG = "false"
LOG_LEVEL = "info"
ENABLE_OBSERVABILITY = "true"

[[env.production.secrets_store_secrets]]
