# apps/frontend/wrangler.toml
# =============================================================================
# Aerealith AI — Frontend Worker
# -----------------------------------------------------------------------------
# This Worker is the public frontend edge service for Aerealith AI.
#
# Runtime:
#   - Next.js Worker entrypoint
#   - Static build assets served from .next/static
#   - Node.js compatibility enabled for framework/runtime packages
#
# Secrets:
#   - The Postgres connection URL is stored in Cloudflare Secrets Store.
#   - It is bound as POSTGRES_URL_SECRET.
#   - Access it in Worker code with:
#       const postgresUrl = await env.POSTGRES_URL_SECRET.get()
#
# IMPORTANT:
#   The account secret names should exist in Cloudflare Secrets Store:
#     - PREVIEW_POSTGRES_URL
#     - STAGING_POSTGRES_URL
#     - PRODUCTION_POSTGRES_URL
# =============================================================================

"$schema" = "../../node_modules/wrangler/config-schema.json"

name = "aerealith-frontend"
main = "./src/worker.ts"
compatibility_date = "2026-05-08"
workers_dev = true

compatibility_flags = [
  "nodejs_compat",
  "nodejs_compat_populate_process_env",
  "global_fetch_strictly_public"
]

# -----------------------------------------------------------------------------
# Routes / Domains
# -----------------------------------------------------------------------------

routes = [
  { pattern = "aerealith.com", custom_domain = true },
  { pattern = "www.aerealith.com", custom_domain = true }
]

# -----------------------------------------------------------------------------
# Static Assets
# -----------------------------------------------------------------------------
# Your current frontend build runs:
#   next build && node ./scripts/ensure-middleware-manifest.mjs
#
# That creates .next/static, not .open-next/assets.
# If you later switch to OpenNext output, change this back to:
#   directory = ".open-next/assets"
# -----------------------------------------------------------------------------

[assets]
directory = ".next/static"
binding = "ASSETS"

# -----------------------------------------------------------------------------
# Service Bindings
# -----------------------------------------------------------------------------

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "aerealith-frontend"

# Example future microservice bindings.
# Uncomment after those Workers exist and are deployed.
#
# [[services]]
# binding = "AUTH_SERVICE"
# service = "aerealith-auth"
#
# [[services]]
# binding = "USER_SERVICE"
# service = "aerealith-users"
#
# [[services]]
# binding = "MEMORY_SERVICE"
# service = "aerealith-memory"
#
# [[services]]
# binding = "AUTOMATION_SERVICE"
# service = "aerealith-automations"
#
# [[services]]
# binding = "INTEGRATION_SERVICE"
# service = "aerealith-integrations"

# -----------------------------------------------------------------------------
# Cloudflare Secrets Store
# -----------------------------------------------------------------------------

[[secrets_store_secrets]]
binding = "POSTGRES_URL_SECRET"
store_id = "ab6f1fdec6a246578177e0577e94f40b"
secret_name = "PRODUCTION_POSTGRES_URL"

# -----------------------------------------------------------------------------
# Public / Non-sensitive Runtime Variables
# -----------------------------------------------------------------------------
# Safe values only. Do not place database URLs, API keys, tokens, passwords, or
# private credentials in [vars].
# -----------------------------------------------------------------------------

[vars]
APP_NAME = "Aerealith AI"
APP_SERVICE = "frontend"
APP_ENVIRONMENT = "production"
APP_PUBLIC_DOMAIN = "aerealith.com"
APP_PUBLIC_APP_DOMAIN = "aerealith.app"

DATABASE_PROVIDER = "postgresql"
DATABASE_URL_SOURCE = "cloudflare-secrets-store"
DATABASE_URL_SECRET_BINDING = "POSTGRES_URL_SECRET"
DATABASE_SSL_ENABLED = "true"
DATABASE_SSL_MODE = "verify-full"
DATABASE_SSL_REJECT_UNAUTHORIZED = "true"
DATABASE_POOL_MIN = "0"
DATABASE_POOL_MAX = "1"
DATABASE_APPLICATION_NAME = "aerealith-frontend"

MIKRO_ORM_DEBUG = "false"
LOG_LEVEL = "info"
ENABLE_OBSERVABILITY = "true"

# -----------------------------------------------------------------------------
# Required Worker Secrets
# -----------------------------------------------------------------------------
# This validates traditional Worker secrets, not Secrets Store account secrets.
# Keep this empty unless you also add per-Worker secrets with:
#   wrangler secret put SOME_SECRET
# -----------------------------------------------------------------------------

[secrets]
required = []

# -----------------------------------------------------------------------------
# Observability
# -----------------------------------------------------------------------------

[observability]
enabled = true

[observability.logs]
enabled = true

[observability.traces]
enabled = true

# =============================================================================
# Environment Overrides
# =============================================================================

